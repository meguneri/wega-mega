  playTimeTracker: JobPilot
  isSubRole: true # Corvax-Wega-add
  requirements:
  - !type:DepartmentTimeRequirement
    department: Security
    time: 20h
  - !type:TraitsRequirement
    inverted: true
    traits:
    - Muted
  startingGear: PilotGear
  icon: "JobIconPilot"
  supervisors: job-supervisors-hos
  access:
