# Перчатки алой жатвы корниворы (перенос из lust-station / Sunrise).
# Когти с автоатакой + впрыск токсина при ударе (InjectOnHit).
# Warfarin из оригинала убран (тянет кастомный статус-эффект), оставлены Hemorrhinol + Lexorin.
- type: entity
  parent: ClothingHandsGlovesNorthStar
  id: CornivoreGloves
  name: gloves of cornivore
  description: We don't know if you're thirsty for blood... but... these gloves definitely are!!! They're saturated with a special toxin.
  components:
  - type: Sprite
    sprite: _Sunrise/Clothing/Hands/Gloves/cornivoregloves.rsi
  - type: Clothing
    sprite: _Sunrise/Clothing/Hands/Gloves/cornivoregloves.rsi
  - type: MeleeWeapon
    autoAttack: true
    attackRate: 4
    damage:
      types:
        Slash: 8
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
    soundSwing:
      path: /Audio/Weapons/punchmiss.ogg
  - type: InjectOnHit
    limit: 20
    sound:
      path: /Audio/Weapons/bladeslice.ogg
    reagents:
      - ReagentId: Hemorrhinol
        Quantity: 5
      - ReagentId: Lexorin
        Quantity: 0.2
  - type: Fiber
    fiberMaterial: fibers-leather
    fiberColor: fibers-blue
  - type: FingerprintMask
  - type: MeleeSpeech
  - type: ActivatableUI
    key: enum.MeleeSpeechUiKey.Key
    verbOnly: true
  - type: Actions
  - type: UserInterface
    interfaces:
      enum.MeleeSpeechUiKey.Key:
        type: MeleeSpeechBoundUserInterface
  - type: Insulated
  - type: StaticPrice
    price: 2500
  - type: Tag
    tags:
    - Kangaroo
    - WhitelistChameleon
