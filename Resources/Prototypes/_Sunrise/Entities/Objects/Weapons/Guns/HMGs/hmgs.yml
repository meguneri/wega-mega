
- type: entity
  id: PowerpackMinigunMG100
  parent: [ BasePowerpackMG100, ClothingBackpack ]
  components:
  - type: Item
    size: Ginormous
  - type: BallisticAmmoProvider
    mayTransfer: True
    proto: CartridgeRifle
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,5,3
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: ItemSlots
    slots:
      weapon_slot:
        ejectOnInteract: true
        whitelist:
          components:
          - ClothingSlotAmmoProvider
  - type: ContainerFill
    containers:
      weapon_slot:
      - WeaponMinigunMG100

- type: entity
  id: PowerpackMinigunMG100Incendiary
  parent: PowerpackMinigunMG100
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeRifleIncendiary

- type: entity
  id: BasePowerpackMG100
  parent: BaseItem
  abstract: true
  components:
  - type: Tag
  - type: Clothing
    slots: BACK
    sprite: _Sunrise/Objects/Weapons/Guns/Powerpacks/Powerpacks/backpack.rsi
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - CartridgeLightRifle
    capacity: 1600
  - type: ClothingSpeedModifier
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      storagebase: !type:Container
      weapon_slot: !type:ContainerSlot
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Powerpacks/Powerpacks/backpack.rsi
    layers:
    - state: mag-0
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  name: DL6902 Powerpack
  id: PowerpackDL6902
  parent: [ BasePowerpackMG100, ClothingBackpack ]
  components:
  - type: Item
    size: Ginormous
  - type: Clothing
    slots: BACK
    sprite: _Sunrise/Objects/Weapons/Guns/Powerpacks/Powerpacks/syndie_backpack.rsi
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Powerpacks/Powerpacks/syndie_backpack.rsi
    layers:
    - state: mag-0
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - CartridgeLightRifle
    proto: CartridgeLightRifle
    capacity: 900
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,6,4
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: CrazyGlue
      weapon_slot: !type:AllSelector
        children:
        - id: WeaponDL6902PowerPack
  - type: ItemSlots
    slots:
      weapon_slot:
        ejectOnInteract: true
        whitelist:
          components:
          - ClothingSlotAmmoProvider
  - type: StaticPrice
    price: 5500
  - type: Tag
