# Sunrise PPSH drum magazine, fed with .10 rifle (minigun) ammo
- type: entity
  id: MagazinePistolSubMachineGunPPSHExtended
  name: PPSH magazine
  parent: BaseItem
  components:
  - type: Tag
    tags:
    - MagazineSMGPPSH
  - type: BallisticAmmoProvider
    mayTransfer: true
    proto: CartridgeMinigun  # .10
    whitelist:
      tags:
      - CartridgeHeavyRifle  # .10
    capacity: 71
  - type: Item
    size: Normal
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Ammunition/Magazines/ppsh41.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
