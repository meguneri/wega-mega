# Ported from lust-station (_Sunrise): XL 12g drum magazines for the AS-12 'Minotaur'.
# All carry the MagazineShotgun tag, so they fit any drum-fed shotgun (Minotaur, Bulldog…).
# Only the variants whose shells already exist in this repo are ported (pellet/slug/incendiary);
# the flechette XL is skipped because ShellShotgunFlechette is absent here.
- type: entity
  abstract: true
  parent: [ BaseItem, BaseSecurityContraband ]
  id: BaseMagazineShotgunXL
  name: XL ammo drum (.50 shells)
  components:
  - type: Tag
    tags:
    - MagazineShotgun
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - ShellShotgun
    capacity: 16
    soundRack:
      path: /Audio/Weapons/Guns/Cock/smg_cock.ogg
  - type: Item
    shape:
    - 0,0,1,1
    size: Small
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#d73307"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#d73307"
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    scale: 1.05,1.05
    sprite: _Sunrise/Objects/Weapons/Guns/Ammunition/Magazines/Shotgun/m16.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 17
    zeroVisible: false
  - type: Appearance

- type: entity
  parent: BaseMagazineShotgunXL
  id: MagazineShotgunXL
  name: XL ammo drum (.50 pellet)
  description: An extra-large drum magazine used by some military-grade automatic shotguns. Intended to hold general-purpose kinetic ammunition.
  components:
  - type: BallisticAmmoProvider
    proto: ShellShotgun
  - type: Sprite
    layers:
    - state: pellets
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#ba7710"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#ba7710"

- type: entity
  parent: BaseMagazineShotgunXL
  id: MagazineShotgunSlugXL
  name: XL ammo drum (.50 slug)
  description: An extra-large drum magazine used by some military-grade automatic shotguns. Intended to hold long-ranged slug ammunition.
  components:
  - type: BallisticAmmoProvider
    proto: ShellShotgunSlug
  - type: Sprite
    layers:
    - state: slug
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#72382d"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#72382d"

- type: entity
  parent: BaseMagazineShotgunXL
  id: MagazineShotgunIncendiaryXL
  name: XL ammo drum (.50 incendiary)
  description: An extra-large drum magazine used by some military-grade automatic shotguns. Intended to hold self-igniting incendiary ammunition.
  components:
  - type: BallisticAmmoProvider
    proto: ShellShotgunIncendiary
  - type: Sprite
    layers:
    - state: flame
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#72382d"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#72382d"
