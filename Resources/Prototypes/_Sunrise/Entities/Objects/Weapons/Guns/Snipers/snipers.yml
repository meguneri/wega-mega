- type: entity
  name: Dragunov
  parent: [ BaseWeaponRifle, BaseGunWieldable ]
  id: WeaponSniperDragunov
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/dragunov/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/dragunov/tiny.rsi
  - type: Item
    size: Huge
    shape:
    - 0,0,5,1
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/dragunov/tiny.rsi
  - type: GunWieldBonus
    minAngle: -23
    maxAngle: -44
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    minAngle: 25
    maxAngle: 46
    fireRate: 4
    soundGunshot:
      path: /Audio/_Sunrise/Weapons/Guns/Snipers/Dragunov/dragunov_shot.ogg
      params:
        volume: -1
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Sunrise/Weapons/Guns/Snipers/Dragunov/dragunov_cocked.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifle
        insertSound: /Audio/_Sunrise/Weapons/Guns/Snipers/Dragunov/dragunov_reload.ogg
        ejectSound: /Audio/_Sunrise/Weapons/Guns/Snipers/Dragunov/dragunov_unload.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeRifle
        priority: 1
        whitelist:
          tags:
          - CartridgeRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
      ballistic-ammo: !type:Container
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: SpeedModifiedOnWield
    walkModifier: 0.25
    sprintModifier: 0.25
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 13
    pvsIncrease: 1.3
  - type: UseDelay
    delay: 1
  - type: GunRequiresWield
  - type: StaticPrice
    price: 5000

