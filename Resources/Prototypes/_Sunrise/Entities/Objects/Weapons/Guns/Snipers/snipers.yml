- type: entity
  name: N2524 Repeater
  parent: [ BaseWeaponSniper, BaseGunWieldable, BaseMinorContraband ]
  id: WeaponSniperRepeater
  description: A civilian grade lever action firearm, favored by space cowboys for its reliability and stopping power. Uses .45 magnum ammo.
  components:
  - type: Item
    size: Normal
    shape:
    - 0,0,3,1
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/n2524/repeater_inhands_64x.rsi
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/n2524/repeater.rsi
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/Snipers/n2524/repeater.rsi
  - type: StaticPrice
    price: 850
  - type: Gun
    fireRate: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      collection: m3
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CartridgeMagnum
    capacity: 7
    proto: CartridgeMagnum
  - type: Wieldable
  - type: UseDelay
    delay: 0.5

# Смазанная винтовка для ящика винтовок
# Self-contained after WeaponRifleBauer127 was removed — was previously its child.
- type: entity
  parent: [ BaseWeaponRifle, BaseGunWieldable ]
  name: Type 88
  id: WeaponRifleType88AMR
  description: The standard issue AMR of the USSP, the Type 88 typically loaded with armor-piercing 15mm rounds in a 7 round magazine.
