- type: entity
  name: Spas-12
  parent: [BaseWeaponShotgun, BaseSecurityContraband]
  id: WeaponShotgunSPAS12
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Shotguns/spas_12_2/tiny.rsi
  - type: Item
    size: Large
    sprite: _Sunrise/Objects/Weapons/Guns/Shotguns/spas_12_2/big.rsi
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/Shotguns/spas_12_2/tiny.rsi
  - type: BallisticAmmoProvider
    capacity: 8
  - type: Wieldable
    # Повторный use-in-hand (Z) передёргивает затвор, а не убирает оружие в одну руку — как у базовых wega-стволов.
    unwieldOnUse: false
  - type: GunRequiresWield
  - type: Gun
    fireRate: 2
    soundGunshot:
      path: /Audio/_Sunrise/Weapons/Guns/Shotguns/spas_12/spas12_shot.ogg

