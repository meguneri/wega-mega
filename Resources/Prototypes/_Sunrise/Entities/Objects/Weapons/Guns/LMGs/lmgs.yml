- type: entity
  name: MG-60
  parent: BaseWeaponLightMachineGun
  id: WeaponLightMachineGunMG60
  components:
  - type: Sprite
    scale: 0.9,0.9
    sprite: _Sunrise/Objects/Weapons/Guns/LMGs/mg60/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/LMGs/mg60/tiny.rsi
  - type: Item
    size: Ginormous
    sprite: _Sunrise/Objects/Weapons/Guns/LMGs/mg60/tiny.rsi
  - type: GunWieldBonus
    minAngle: 0
    maxAngle: 0
  - type: Gun
    minAngle: 5
    maxAngle: 60
    angleIncrease: 1
    angleDecay: 20
    fireRate: 6.5
    soundGunshot:
      collection: m249 # Sunrise-Edit
      params:
        volume: 10
        pitch: 1.1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLightRifleBox
        insertSound: /Audio/_Sunrise/Weapons/Guns/LMGs/reload.ogg
        ejectSound: /Audio/_Sunrise/Weapons/Guns/LMGs/unload.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineLightRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeRifle
        priority: 1
        whitelist:
          tags:
          - CartridgeRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Wieldable
  - type: UseDelay
    delay: 1
  - type: GunRequiresWield
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Sunrise/Weapons/Guns/LMGs/cocked.ogg
  - type: SpeedModifiedOnWield
    walkModifier: 0.75
    sprintModifier: 0.75
  - type: ClothingSpeedModifier
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: HeldSpeedModifier

