- type: entity
  name: pirate cannon
  parent: BaseWeaponLightMachineGun
  id: WeaponLightMachineGunPirateCannon
  description: Kaboom!
  components:
    - type: Sprite
      sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon.rsi
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-3
        map: ["enum.GunVisualLayers.Mag"]
