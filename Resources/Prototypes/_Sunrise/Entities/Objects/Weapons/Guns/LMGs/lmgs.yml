    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-3
      map: ["enum.GunVisualLayers.Mag"]
  - type: GunWieldBonus
    minAngle: 0
    maxAngle: 0
  - type: Gun
    minAngle: 12
    maxAngle: 90
    angleIncrease: 1.75
    angleDecay: 35
    fireRate: 8
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot:
      collection: m249
      params:
        volume: 10
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: Appearance
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineLightRifleBox
        insertSound: /Audio/Weapons/Guns/MagIn/hpistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineLightRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeLightRifle
        priority: 1
        whitelist:
          tags:
          - CartridgeLightRifle
  - type: SpeedModifiedOnWield
    walkModifier: 0.85
    sprintModifier: 0.85
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: GunRequiresWield
  - type: StaticPrice
    price: 10000

- type: entity
  name: pirate cannon
  parent: BaseWeaponLightMachineGun
  id: WeaponLightMachineGunPirateCannon
  description: Kaboom!
  components:
    - type: Sprite
      sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon.rsi
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-3
        map: ["enum.GunVisualLayers.Mag"]
        type: ContainerContainer
    - type: Clothing
      sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon.rsi
    - type: Item
      size: Huge
      shape:
      - 0,0,4,3
      sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon_inhands_64x.rsi
      storedSprite:
        state: storage
        sprite: _Sunrise/Objects/Weapons/Guns/LMGs/piratecannon_storage_64x.rsi
    - type: Gun
      fireRate: 6.5
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/mateba.ogg
        params:
          volume: -1
          pitch: 1.2
      projectileSpeed: 20
      selectedMode: FullAuto
      availableModes:
        - FullAuto
    - type: GunRequiresWield
    - type: ChamberMagazineAmmoProvider
      soundRack:
        path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
        params:
          volume: -10
          pitch: 0.8
      soundAutoEject:
        path: /Audio/Weapons/Guns/MagOut/lmg_magout.ogg
      autoEject: true
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: MagazineLightRifleBox
          insertSound: /Audio/_Sunrise/Weapons/Guns/LMGs/reload.ogg
          ejectSound: /Audio/_Sunrise/Weapons/Guns/LMGs/unload.ogg
          priority: 2
          whitelist:
            tags:
            - MagazineLightRifle
        gun_chamber:
          name: Chamber
          startingItem: CartridgeRifle
          priority: 1
          whitelist:
            tags:
            - CartridgeRifle
    - type: SpeedModifiedOnWield
      walkModifier: 0.75
      sprintModifier: 0.75
    - type: Appearance
    - type: MagazineVisuals
      magState: mag
      steps: 6
      zeroVisible: true
    - type: StaticPrice
      price: 4000