- type: entity
  name: Famas
  parent: BaseWeaponRifle
  id: WeaponRifleFamas
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Rifles/famas/big.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/Rifles/famas/tiny.rsi
  - type: Item
    size: Huge
    shape:
    - 0,0,2,2
    sprite: _Sunrise/Objects/Weapons/Guns/Rifles/famas/tiny.rsi
  - type: Gun
    minAngle: 2.85
    maxAngle: 28
    angleIncrease: 1.65
    angleDecay: 18
    fireRate: 5.25
    burstFireRate: 12
    selectedMode: Burst
    availableModes:
    - Burst
    - FullAuto
    soundGunshot:
      collection: famas # Sunrise-Edit
      params:
        volume: 10
    shotsPerBurst: 3
    burstCooldown: 0.15
  # Бонус хвата подогнан под собственный разброс ствола (max 28): в хвате углы остаются
  # положительными (≈1°/2°), иначе наследуемый -20/-30 уводил бы maxAngle в минус и ронял сервер.
  - type: GunWieldBonus
    minAngle: -1.85
    maxAngle: -26
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifle
        insertSound: /Audio/_Sunrise/Weapons/Guns/Rifles/Famas/famas_reload.ogg
        ejectSound: /Audio/_Sunrise/Weapons/Guns/Rifles/Famas/famas_unload.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeRifle
        priority: 1
        whitelist:
          tags:
          - CartridgeRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Wieldable
    # Повторный use-in-hand (Z) передёргивает затвор, а не убирает оружие в одну руку — как у базовых wega-стволов.
    unwieldOnUse: false
  - type: UseDelay
    delay: 0.5
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/_Sunrise/Weapons/Guns/Rifles/Famas/famas_cocked.ogg

