  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Pistols/glock22/big.rsi
  - type: Item
    sprite: _Sunrise/Objects/Weapons/Guns/Pistols/glock22/tiny.rsi
  - type: Gun
