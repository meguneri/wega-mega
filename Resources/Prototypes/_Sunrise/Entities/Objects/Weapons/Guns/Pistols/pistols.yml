- type: entity
  name: BasePistol
  parent: BaseWeaponPistol
  id: BaseWeaponPistolSunrise
  suffix: Sunrise
  description: A rooty tooty point and shooty.
  abstract: true
  components:
  - type: Sprite
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Tag
    tags:
    - Sidearm
  - type: Clothing
    sprite: Objects/Weapons/Guns/Pistols/viper.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Gun
    minAngle: 4.7 #Max Effect Range 8
    maxAngle: 14.1
    angleIncrease: 1.25
    angleDecay: 0.5
    fireRate: 4
    useKey: true
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
      - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
  - type: MeleeWeapon
    wideAnimationRotation: 0
    range: 0.95
    damage:
      types:
        Blunt: 8
    bluntStaminaDamageFactor: 2.0
    soundHit:
      collection: MetalThud
  - type: AltFireMelee
    attackType: Heavy

- type: entity
  name: combat pistol VP-70
  parent: BaseWeaponPistolSunrise
  id: WeaponPistolVP78
  components:
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/Pistols/vp78/big.rsi
  - type: Item
    sprite: _Sunrise/Objects/Weapons/Guns/Pistols/vp78/tiny.rsi
  - type: Gun
    fireRate: 4.25
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_Sunrise/Weapons/Guns/Pistols/vp70_shot.ogg
    soundEmpty:
      path: /Audio/_Sunrise/Weapons/Guns/Pistols/vp70_empty.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistol
        insertSound: /Audio/_Sunrise/Weapons/Guns/Pistols/vp70_reload.ogg
        ejectSound: /Audio/_Sunrise/Weapons/Guns/Pistols/vp70_unload.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistol
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol # .45 ACP
        priority: 1
        whitelist:
          tags:
          - CartridgePistol
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot


