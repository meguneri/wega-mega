- type: entity
  name: riot shotgun
  parent: [BaseWeaponShotgunPump, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponShotgunRiot
  description: A sturdy shotgun with a longer magazine and a fixed tactical stock designed for non-lethal riot control.
  components:
  - type: Item
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/riot_inhands_64x.rsi
  - type: Gun
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/riot.rsi
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/riot.rsi
  - type: GunRequiresWield
  - type: BallisticAmmoProvider
    capacity: 8
- type: entity
  name: combat shotgun
  parent: [BaseWeaponShotgun, BaseGunWieldable, BaseSecurityContraband]
  id: WeaponShotgunCombat
  description: A semi automatic shotgun with tactical furniture and a six-shell capacity underneath.
  components:
  - type: Item
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/cshotgun_inhands_64x.rsi
  - type: Gun
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/cshotgun.rsi
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/cshotgun.rsi
  - type: GunRequiresWield
  - type: BallisticAmmoProvider
    capacity: 7

- type: entity
  name: cycler shotgun
  parent: [BaseWeaponShotgunAny, BaseGunWieldable, BaseSecurityContraband] # , BaseSecuritySalvageContraband
  id: WeaponShotgunCycler
  description: An advanced shotgun with two separate magazine tubes, allowing you to quickly toggle between ammo types.
  components:
  - type: Item
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/cycler.rsi
    size: Large
  - type: GunSpreadModifier # Sunrise-Add
  - type: Gun
    fireRate: 2
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Guns/Gunshots/minotaur.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/cycler.rsi
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/cycler.rsi
  - type: GunRequiresWield
  - type: RevolverAmmoProvider
    whitelist:
      tags:
      - ShellShotgun
    proto: ShellShotgun
    capacity: 14
    chambers: [ True, True, True, True, True, True, True, True, True, True, True, True, True,  True, ]
    ammoSlots: [ null, null, null, null, null, null, null, null, null, null, null, null, null, null, ]
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/shotgun_insert.ogg
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      revolver-ammo: !type:Container
  - type: UseDelay
    delay: 0.15

- type: entity
  name: Tkach Ya-Sui GA 12 revolver
  parent: [BaseWeaponShotgunAny, BaseSecurityContraband] # , BaseSecuritySalvageContraband
  id: WeaponShotgunGA12
  description: An outdated sidearm rarely seen in use by certain PMCs that operate throughout the frontier systems, featuring a three-shell cylinder. Thats right, shell, this one shoots twelve gauge.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/ga12.rsi
  - type: Item
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/ga12.rsi
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/ga12.rsi
    quickEquip: false
    slots:
    - suitStorage
    - Belt
  - type: Tag
    tags:
    - Sidearm
  - type: AmmoCounter
  - type: Gun
    selectedMode: SemiAuto
    fireRate: 2
    availableModes:
    - SemiAuto
  - type: GunSpreadModifier # Sunrise-Add
  - type: BallisticAmmoProvider
    capacity: 3
  - type: RevolverAmmoProvider
    whitelist:
      tags:
      - ShellShotgun
    proto: ShellShotgun
    capacity: 3
    chambers: [ True, True, True ]
    ammoSlots: [ null, null, null ]
    soundInsert:
      path: /Audio/Weapons/Guns/MagIn/shotgun_insert.ogg
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
      revolver-ammo: !type:Container
- type: entity
  name: "AS-12 'Minotaur' Shotgun"
  parent: [BaseWeaponShotgunAny, BaseGunWieldable, BaseSyndicateContraband]
  id: WeaponShotgunMinotaur
  description: Smooth, powerful, highly illegal. The newest full auto shotgun available at the market, utilizes standard 12g drum mags. Property of Gorlex Marauders.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/minotaur.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Large
    shape:
    - 0,0,3,2
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Shotguns/minotaur.rsi
  - type: GunRequiresWield
  - type: Gun
    fireRate: 3
    burstFireRate: 4
    burstCooldown: 0.5
    selectedMode: Burst
    shotsPerBurst: 3
    availableModes:
    - Burst
    - FullAuto
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Guns/Gunshots/minotaur.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineShotgunXL # Wega: стартует с XL-барабаном (16 патронов)
        priority: 2
        whitelist:
          tags:
          - MagazineShotgun
        whitelistFailPopup: gun-magazine-whitelist-fail
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance
