  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Snipers/improvised_rifle.rsi
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Snipers/improvised_rifle.rsi
  - type: Item
    size: Large
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -5
    maxAngle: -10
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: BallisticAmmoProvider
    capacity: 4
- type: entity
  name: Forged Repeater Rifle
