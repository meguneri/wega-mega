- type: entity
  name: SP-91-RC
  parent: [WeaponSubMachineGunDrozdMk2, BaseSecurityContraband]
  id: WeaponSubMachineGunSP91RC
  description: Compact submachine gun designed for riot control.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/SMGs/sp91rc.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -16
  - type: Gun
    fireRate: 13
    selectedMode: Burst
    shotsPerBurst: 5
    availableModes:
      - Burst
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Guns/Gunshots/1sp_91.ogg
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: true
  - type: Appearance
  - type: ChamberMagazineAmmoProvider
    autoEject: true

- type: entity
  name: Type U3 Uzi
  parent: [BaseWeaponSubMachineGun, BaseMajorContraband]
  id: SunriseWeaponSubMachineGunUzi
  description: Lightweight submachine gun with a 32-round magazine that has single or 4 round firing modes.
  components:
  - type: Item
    size: Normal
    shape:
    - 0,0,1,1 # Starlight
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/SMGs/uzi.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Gun
    fireRate: 12
    minAngle: 1
    maxAngle: 25
    angleIncrease: 8
    angleDecay: 5
    selectedMode: FullAuto
    shotsPerBurst: 4
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Guns/Gunshots/uzi.ogg
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGun
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistolSubMachineGun
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
          - CartridgePistol
