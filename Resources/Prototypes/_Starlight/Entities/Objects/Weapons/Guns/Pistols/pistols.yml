- type: entity
  name: m1911
  parent: [WeaponPistolN1984, BaseSecurityContraband]
  id: WeaponPistolM1911
  description: A classic .45 handgun with a small magazine capacity.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Pistols/m1911.rsi
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Pistols/m1911.rsi
  - type: Gun
    minAngle: 1
    maxAngle: 20
    angleIncrease: 8
    angleDecay: 7
    fireRate: 7
    soundGunshot:
      path: /Audio/_Starlight/Weapons/Guns/Gunshots/colt.ogg

- type: entity
  name: makeshift pistol
  parent: [BaseWeaponPistol, BaseMinorContraband]
  id: WeaponPistolMakeshiftCrafted
  description: Little more than a space eoka. Very unreliable.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Pistols/makeshift_pistol_crafted.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Pistols/makeshift_pistol_crafted.rsi
  - type: Gun
    fireRate: 5 #Each bullet is manually loaded, no reason to impose a firerate limit.
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/pistol_cock.ogg
  - type: ItemSlots
    slots:
      gun_chamber:
        name: Chamber
        startingItem: null
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
- type: entity
  name: improvised pistol
  parent: [BaseWeaponSniper, BaseMinorContraband]
  id: WeaponPistolImprovised
  description: A cobbled together pistol with an internal magazine. More reliable, but still liable to blow up in your face.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Pistols/improvised_pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Pistols/improvised_pistol.rsi
  - type: Gun
    fireRate: 3
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
    minAngle: 1
    maxAngle: 30
    angleIncrease: 12
    angleDecay: 4
  - type: BallisticAmmoProvider
    capacity: 5
    proto: null
    whitelist:
      tags:
      - CartridgePistol
  - type: Item
    size: Small #Magazine location makes it bigger but should still fit in a pocket. (This basically serves to keep people from putting it in a boot/stacking them as easily)
    shape:
    - 0,0,1,0
    - 0,1,1,1
- type: entity
  name: forged pistol
  parent: [BaseWeaponPistol, BaseMinorContraband]
  id: WeaponPistolForged
  description: A reliable magazine-fed pistol made by the best tider blacksmiths.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Weapons/Guns/Pistols/forged_pistol.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Starlight/Objects/Weapons/Guns/Pistols/forged_pistol.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: true
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,1,1
  - type: Gun
    fireRate: 4
    minAngle: 1
    maxAngle: 20
    angleIncrease: 8
    angleDecay: 9
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/mk58.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: null
        whitelist:
          tags:
          - MagazinePistol
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: null
        priority: 1
        whitelist:
          tags:
            - CartridgePistol

- type: entity
  name: stechkin pistol
  parent: [BaseMajorContraband, WeaponPistolMk58]
  id: WeaponPistolStechkin
  description: A small, easily concealable .40 handgun. Has a threaded barrel for suppressors. Uses .40 ammo.
  components:
    - type: Sprite
      sprite: _Starlight/Objects/Weapons/Guns/Pistols/stechkin.rsi
    - type: Clothing
      sprite: _Starlight/Objects/Weapons/Guns/Pistols/stechkin.rsi
    - type: Gun
      soundGunshot:
        path: /Audio/_Starlight/Weapons/Guns/Gunshots/1suppres.ogg
    - type: ItemSlots
      slots:
        gun_magazine:
          name: Magazine
          startingItem: MagazinePistol
          insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
          ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
          priority: 2
          whitelist:
            tags:
            - MagazinePistol
          whitelistFailPopup: gun-magazine-whitelist-fail
        gun_chamber:
          name: Chamber
          startingItem: CartridgePistol
          priority: 1
          whitelist:
            tags:
            - CartridgePistol
