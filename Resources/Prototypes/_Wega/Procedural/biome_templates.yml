- type: biomeTemplate
  id: Lavaland
  layers:
    - !type:BiomeEntityLayer
      threshold: 1
      noise:
        frequency: 1
        seed: 15
      allowedTiles:
        - FloorBasalt
      entities:
        - BasaltOne
        - BasaltTwo
        - BasaltThree
        - BasaltFour
        - BasaltFive
    - !type:BiomeDecalLayer
      allowedTiles:
        - FloorBasalt
      threshold: 0.95
      divisions: 1
      noise:
        seed: 25
        frequency: 1
      decals:
        - Basalt1
        - Basalt2
        - Basalt3
        - Basalt4
        - Basalt5
        - Basalt6
        - Basalt7
        - Basalt8
        - Basalt9
    - !type:BiomeEntityLayer
      threshold: 0.94
      noise:
        seed: 3
        noiseType: OpenSimplex2
        frequency: 2
      allowedTiles:
        - FloorBasalt
      entities:
        - LavalandFloraCactus1
        - LavalandFloraCactus2
        - LavalandFloraCactus3
        - LavalandFloraCactus4
        - LavalandFloraFireBlossom1
        - LavalandFloraFireBlossom2
        - LavalandFloraFireBlossom3
        - LavalandFloraFireBlossom4
        - LavalandFloraPolyporeMushroom1
        - LavalandFloraPolyporeMushroom2
        - LavalandFloraPolyporeMushroom3
        - LavalandFloraPolyporeMushroom4
        - LavalandFloraInocybeMushroom1
        - LavalandFloraInocybeMushroom2
        - LavalandFloraInocybeMushroom3
        - LavalandFloraInocybeMushroom4
        - LavalandFloraPorciniMushroom1
        - LavalandFloraPorciniMushroom2
        - LavalandFloraPorciniMushroom3
        - LavalandFloraPorciniMushroom4
        - LavalandFloraEmbershroom1
        - LavalandFloraEmbershroom2
        - LavalandFloraEmbershroom3
        - LavalandFloraEmbershroom4
    - !type:BiomeEntityLayer
      threshold: 0.94
      noise:
        seed: 4
        noiseType: OpenSimplex2
        frequency: 2
      allowedTiles:
        - FloorBasalt
      entities:
        - BasaltRandom
    - !type:BiomeEntityLayer
      threshold: 0.95
      noise:
        seed: 0
        noiseType: OpenSimplex2
        frequency: 2
      allowedTiles:
        - FloorBasalt
      entities:
        - FloraRockSolid
    - !type:BiomeEntityLayer
      threshold: 0.2
      noise:
        seed: 10
        frequency: 0.025
        fractalType: FBm
        octaves: 5
        lacunarity: 2
        gain: 0.4
      allowedTiles:
        - FloorBasalt
      entities:
        - FloorLavaEntity
    # Rock formations
    - !type:BiomeEntityLayer
      allowedTiles:
        - FloorBasalt
      threshold: -0.25
      noise:
        seed: 5
        noiseType: Cellular
        frequency: 0.05
        lacunarity: 2
        fractalType: FBm
        octaves: 5
        cellularDistanceFunction: Euclidean
        cellularReturnType: Distance2
      # As I can see, it works much better than I could have imagined.
      entityWeights:
        WallRockBasalt: 0.647
        WallRockBasaltLavalandTin: 0.04
        WallRockBasaltLavalandCoal: 0.019
        WallRockBasaltLavalandQuartz: 0.019
        WallRockBasaltLavalandPlasma: 0.0098
        WallRockBasaltLavalandSilver: 0.0098
        WallRockBasaltLavalandGold: 0.0098
        WallRockBasaltLavalandUranium: 0.00535
        WallRockBasaltLavalandBananium: 0.00508
        WallRockBasaltLavalandGems: 0.0015
        WallRockBasaltLavalandMagmite: 0.0015
        WallRockBasaltLavalandDiamond: 0.001
        WallRockBasaltLavalandGibtonite: 0.0005
    - !type:BiomeDummyLayer
      id: Loot
    # Fill basalt
    - !type:BiomeTileLayer
      threshold: -1
      tile: FloorBasalt
