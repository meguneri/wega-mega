      # Left leg
      - tag: AndroidPart
        name: construction-graph-tag-android-part
        icon:
          sprite: _Wega/Mobs/Species/Android/parts.rsi
          state: module_part
        completed:
        - !type:VisualizerDataInt
          key: "enum.AndroidFrameVisuals.ConstructionStage"
          data: 1

      - material: Steel
        amount: 5
        doAfter: 3

      - material: Plastic
        amount: 3
        doAfter: 1

      - tool: Anchoring
        doAfter: 3

      # Right leg
      - tag: AndroidPart
        name: construction-graph-tag-android-part
        icon:
          sprite: _Wega/Mobs/Species/Android/parts.rsi
          state: module_part
        completed:
        - !type:VisualizerDataInt
          key: "enum.AndroidFrameVisuals.ConstructionStage"
          data: 2

      - material: Steel
        amount: 5
        doAfter: 3

      - material: Plastic
        amount: 3
        doAfter: 1

      - tool: Anchoring
        doAfter: 3

      # Left arm
      - tag: AndroidPart
        name: construction-graph-tag-android-part
        icon:
          sprite: _Wega/Mobs/Species/Android/parts.rsi
          state: module_part
        completed:
