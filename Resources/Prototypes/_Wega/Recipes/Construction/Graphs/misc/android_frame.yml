        - !type:VisualizerDataInt
          key: "enum.AndroidFrameVisuals.ConstructionStage"
          data: 5

      - material: Plastic
        amount: 3
        doAfter: 1

      - tool: Screwing
        doAfter: 3

      - tool: Welding
