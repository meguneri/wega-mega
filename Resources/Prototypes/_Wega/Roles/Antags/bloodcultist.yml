- type: antag
  id: BloodCultist
  name: roles-antag-blood-cultist-name
  antagonist: true
  setPreference: true
  objective: roles-antag-blood-cultist-objective
  guides: [ BloodCult ]
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 50h
  - !type:DepartmentTimeRequirement
    department: Security
    time: 25h

- type: antagSpecifier
  parent: RestrictedAntag
  id: BloodCultist
  prefRoles:
  - BloodCultist
  allowNonHumans: true
  multiAntagSetting: None
  blacklist:
    components:
    - AntagImmune
    - BibleUser
    - Android
    - Ipc
  components:
  - type: BloodCultist
  - type: MindLink
    channels: ["MindBloodCult"]
  - type: NpcFactionMember
    factions:
    - BloodCult
  - type: FriendlyFaction
    faction: BloodCult
  mindRoles:
  - MindRoleBloodCultist
  briefing:
    sound: "/Audio/_Wega/Ambience/Antag/bloodcult_start.ogg"

# Ability gears
- type: startingGear
  id: BloodCultWeaponBloodGear
  inhand:
    - WeaponBloodBlade
    - CultBola

- type: startingGear
  id: BloodCultWeaponDeathGear
  inhand:
    - WeaponDeathBlade
    - CultBola

- type: startingGear
  id: BloodCultWeaponHellGear
  inhand:
    - WeaponHellBlade
    - CultBola

- type: startingGear
  id: BloodCultJumpsuitGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorBlack

- type: startingGear
  id: BloodCultShoesGear
  equipment:
    shoes: ClothingShoesCult

- type: startingGear
  id: BloodCultOuterGear
  equipment:
    outerClothing: ClothingOuterCultRobesAlt

- type: startingGear
  id: BloodCultBackpackGear
  equipment:
    back: ClothingBackpackBloodCult
  storage:
    back:
    - HandheldHealthAnalyzer

- type: startingGear
  id: BloodDaggerGear
  inhand:
    - WeaponBloodDagger

- type: startingGear
  id: DeathDaggerGear
  inhand:
    - WeaponDeathDagger

- type: startingGear
  id: HellDaggerGear
  inhand:
    - WeaponHellDagger

