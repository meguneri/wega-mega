# Снаряжение скавов экстракшн-режима. Падает с трупа (носитель метит его RaidLoot рекурсивно, включая
# содержимое рюкзака) — игрок может вынести за деньги. У каждого дикого свой набор: разное оружие
# плюс какая-нибудь ценность в рюкзаке. Боссы — всегда лучше: броня, точный ствол, больше ценностей.

# ── Дикие скавы: разнообразные наборы ─────────────────────────────────────────
- type: startingGear
  id: SkavGearScrapper
  equipment:
    jumpsuit: ClothingUniformJumpsuitPrisoner
    outerClothing: ClothingOuterArmorBasicSlim
    head: ClothingHeadHatGreysoft
    mask: ClothingMaskGas
    gloves: ClothingHandsGlovesColorBlack
    shoes: ClothingShoesBootsCombat
    back: ClothingBackpack
