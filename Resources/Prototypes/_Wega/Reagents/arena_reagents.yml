# Wega arena — slow-metabolizing variants of nocturine and aphrodisiac.
#
# Problem: arena archers dip arrows and need several hits to stack a reagent up
# to its effect threshold (nocturine sleeps at 8u, aphrodisiac escalates at
# 6/10/12u). With the vanilla metabolism rate (~0.5u/s) the dose drains faster
# than an archer can re-dip, nock and land another shot, so the effects were
# practically unreachable. These arena-only reagents keep the same effects but
# metabolize at 0.1u/s, so doses accumulate across hits.
#
# They reuse the vanilla locale keys (reagent-name-nocturine /
# reagent-name-aphrodisiac), so in-game they read identically to the originals.
# Vanilla nocturine balance is untouched — only the arena bottles use these.

- type: reagent
  id: ArenaNocturine
  name: reagent-name-nocturine
  group: Narcotics
  desc: reagent-desc-nocturine
  physicalDesc: reagent-physical-desc-powdery
  contrabandSeverity: Syndicate
  color: "#128e80"
  boilingPoint: 444.0
  meltingPoint: 128.0
  metabolisms:
    Bloodstream:
      metabolismRate: 0.1
      effects:
      - !type:MovementSpeedModifier
        walkSpeedModifier: 0.65
        sprintSpeedModifier: 0.65
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: ArenaNocturine
          min: 8
        effectProto: StatusEffectForcedSleeping
        time: 9
        delay: 5

# Афродизиак-арена — те же дозозависимые эффекты, что и у обычного афродизиака,
# но с медленным выводом (0.1u/с), чтобы дозу можно было накопить выстрелами.
# Холодный душ (ShowerSystem) тоже смывает этот реагент.
- type: reagent
  id: ArenaAphrodisiac
  name: reagent-name-aphrodisiac
  group: Special
  desc: reagent-desc-aphrodisiac
  physicalDesc: reagent-physical-desc-aphrodisiac
  flavor: funny
  color: "#FF00E8"
  metabolisms:
    Bloodstream:
      metabolismRate: 0.1
      effects:
      - !type:PopupMessage
        type: Local
        messages: [ "aphrodisiac-effect1", "aphrodisiac-effect2", "aphrodisiac-effect3", "aphrodisiac-effect4", "aphrodisiac-effect5" ]
        probability: 0.1
      - !type:ModifyStatusEffect
        effectProto: StatusEffectLoveVision
        time: 15
        type: Update
      - !type:ModifyKnockdown
        conditions:
        - !type:ReagentCondition
          reagent: ArenaAphrodisiac
          min: 6
        time: 2
        probability: 0.12
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: ArenaAphrodisiac
          min: 10
        effectProto: StatusEffectStunned
        time: 10
        type: Update
      - !type:Jitter
        conditions:
        - !type:ReagentCondition
          reagent: ArenaAphrodisiac
          min: 6
        refresh: false
        time: 1.0
        amplitude: 2
        frequency: 5
      - !type:Emote
        conditions:
        - !type:ReagentCondition
          reagent: ArenaAphrodisiac
          min: 6
        emote: Moan
        showInChat: true
        probability: 0.05
      - !type:Emote
        conditions:
        - !type:ReagentCondition
          reagent: ArenaAphrodisiac
          min: 6
        emote: Laugh
        showInChat: true
        probability: 0.03
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: ArenaAphrodisiac
          min: 12
        key: Pacified
        component: Pacified
        time: 4
      - !type:Drunk
        conditions:
        - !type:ReagentCondition
          reagent: ArenaAphrodisiac
          min: 12
        boozePower: 4
