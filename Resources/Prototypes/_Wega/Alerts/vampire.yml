- type: alert
  id: BloodAlert
  category: Counter
  icons:
  - sprite: /Textures/_Wega/Interface/Alerts/bloodcounter.rsi
    state: blood0
  alertViewEntity: AlertBloodSpriteView
  name: alerts-vampire-blood-name
  description: alerts-vampire-blood-desc

- type: entity
  id: AlertBloodSpriteView
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: /Textures/_Wega/Interface/Alerts/bloodcounter.rsi
    layers:
    - map: [ "enum.AlertVisualLayers.Base" ]
    - map: [ "enum.VampireVisualLayers.Digit1" ]
      offset: 0.16, 0.25
    - map: [ "enum.VampireVisualLayers.Digit2" ]
      offset: 0.28, 0.25
    - map: [ "enum.VampireVisualLayers.Digit3" ]
      offset: 0.40, 0.25
    - map: [ "enum.VampireVisualLayers.Digit4" ]
      offset: 0.52, 0.25

- type: alert
  id: AlertBloodRite
  icons:
  - sprite: /Textures/_Wega/Interface/Alerts/bloodrite.rsi
    state: puddle-off # 0
  - sprite: /Textures/_Wega/Interface/Alerts/bloodrite.rsi
    state: puddle-on # 1
  name: alerts-bloodrite-name
  description: alerts-bloodrite-desc
  minSeverity: 0
  maxSeverity: 1

- type: alert
  id: AlertEternalDarkness
  icons:
  - sprite: /Textures/_Wega/Interface/Alerts/eternaldarkness.rsi
    state: eternaldarkness
  name: alerts-eternaldarkness-name
  description: alerts-eternaldarkness-desc
  minSeverity: 0
  maxSeverity: 0
