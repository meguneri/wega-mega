# Разблокированные (без CultEquipment/CultWeapon) латунно-заводные предметы для Full Arsenal / арены.
# Копии культовых сущностей без компонента-ограничения культа, чтобы носить/использовать мог любой.
# Оригиналы культа (VeilCultBrassCuirass, ClockworkSword и т.д.) не трогаются — культ-раунды как прежде.

# === БРОНЯ ===

- type: entity
  parent: [ ClothingOuterBaseLarge, AllowSuitStorageClothing ]
  id: VeilCultBrassCuirassArena
  name: brass cuirass
  description: An evil-looking piece of cult armor, made of brass.
  components:
  - type: Sprite
    sprite: _Wega/Clothing/OuterClothing/Armor/cuirass.rsi
  - type: Clothing
    sprite: _Wega/Clothing/OuterClothing/Armor/cuirass.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.55
  - type: ExplosionResistance
    damageCoefficient: 0.6
  - type: FireProtection
    reduction: 0.65
  - type: TemperatureProtection
    heatingCoefficient: 0.6
    coolingCoefficient: 0.8
  - type: GroupExamine
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetClockworkCuirass

# === ПЕРЧАТКИ ===

- type: entity
  parent: ClothingHandsBase
  id: ClothingHandsClockworkGauntletsArena
  name: clockwork gauntlets
  description: Heavy gauntlets worn by clockwork cultists.
  components:
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.8
        Piercing: 0.9
        Heat: 0.85
  - type: FireProtection
    reduction: 0.95
  - type: TemperatureProtection
    heatingCoefficient: 0.9
  - type: Sprite
    sprite: _Wega/Clothing/Hands/clockwork_gauntlets.rsi
    state: icon
  - type: Clothing
    sprite: _Wega/Clothing/Hands/clockwork_gauntlets.rsi
    equipDelay: 3
    unequipDelay: 3
  - type: FingerprintMask
  - type: Insulated
  - type: MeleeWeapon
    attackRate: 1.3
    damage:
      types:
        Blunt: 9
    soundHit:
      collection: Punch
    animation: WeaponArcFist
    mustBeEquippedToUse: true

# === ОРУЖИЕ ===

- type: entity
  parent: BaseItem
  id: WeaponClockworkSwordArena
  name: clockwork sword
  description: A sword with a large winding gear on the hilt. Weapon of the righteous Ratvar.
  components:
  - type: Sharp
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/clockwork_sword.rsi
    state: icon
  - type: Item
    storedRotation: -45
    size: Normal
    shape:
    - 0,0,0,2
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1
    damage:
      types:
        Slash: 20
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: DisarmMalus

- type: entity
  parent: BaseItem
  id: WeaponClockHammerArena
  name: clock hammer
  description: A large and lifty hammer, that can throw it targets on hit. For the righteous of Ratvar.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/clock_hammer.rsi
    state: icon
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: Item
    storedRotation: -45
    size: Large
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 0.8
    damage:
      types:
        Blunt: 10
        Structural: 10
    soundHit:
      collection: MetalThud
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 20
        Structural: 50
  - type: Reflect
    reflectProb: 0.15
    spread: 90
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 15
  - type: StaminaDamageOnHit
    damage: 25
  - type: StaminaDamageOnCollide
    damage: 15
  - type: HeldSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.85
  - type: Wieldable

- type: entity
  parent: BaseItem
  id: WeaponRatvarianSpearArena
  name: ratvarian spear
  description: The spear formed from clockwork metal for righteous of Ratvar.
  components:
  - type: ThrowingAngle
    angle: 225
  - type: LandAtCursor
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
            - -0.40,-0.30
            - -0.30,-0.40
            - 0.40,0.30
            - 0.30,0.40
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Sharp
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/clock_spear.rsi
    state: icon
  - type: Clothing
    quickEquip: false
    slots:
    - back
    - suitStorage
    - belt
  - type: Item
    size: Normal
    shape:
    - 0,0,0,4
  - type: Wieldable
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
    removalTime: 3
  - type: MeleeWeapon
    wideAnimationRotation: -135
    range: 2
    damage:
      types:
        Piercing: 10
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 35
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 15

