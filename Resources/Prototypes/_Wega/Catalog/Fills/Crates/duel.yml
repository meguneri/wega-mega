        prob: 1
      - id: SyringeTranexamicAcid
        orGroup: Medicine
        prob: 1
      # Контейнеры с таблетками
      - id: PillCanisterAmbuzol
        orGroup: Medicine
        prob: 1
      - id: PillCanisterArithrazine
        orGroup: Medicine
        prob: 1
      - id: PillCanisterBicaridine
        orGroup: Medicine
        prob: 1
      - id: PillCanisterBruzin
        orGroup: Medicine
        prob: 1
      - id: PillCanisterCopper
        orGroup: Medicine
        prob: 1
      - id: PillCanisterDermaline
        orGroup: Medicine
        prob: 1
      - id: PillCanisterDylomet
