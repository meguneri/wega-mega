# ── МАЯК СБРОСА (Supply Drop Beacon) ─────────────────────────────────────────
# Спавнер арены кидает СНАЧАЛА этот маяк в случайную точку (телеграф), а не сам
# ящик. Маяк ярко горит и мигает, проигрывает сигнал тревоги на весь сервер, и
# через 5 секунд (TimedDespawn) на его месте появляется ящик CrateDuelSupplyDrop
# (через SpawnOnDespawn). За эти 5 секунд все дуэлянты видят, КУДА упадёт лут.
#
# Если раунд закончится во время телеграфа — очистка арены удалит маяк через тег
# ArenaSupplyDrop, и SpawnOnDespawn НЕ сработает (QueueDel не шлёт TimedDespawnEvent),
# то есть «фантомный» ящик после конца боя не появится.

- type: entity
  id: DuelSupplyDropBeacon
  name: supply drop beacon
  suffix: Duel Arena
  description: Сигнальный маяк. Отмечает точку, куда вот-вот рухнет ящик снаряжения.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  # НЕ наследуемся от MarkerBase: его компонент Marker скрывает спрайт от обычных
  # игроков (виден только в редакторе). Маяк же должны видеть все дуэлянты.
  - type: Sprite
    drawdepth: Overlays
    sprite: Objects/Misc/flare.rsi
    layers:
      - state: flare_burn
        shader: unshaded
        color: "#ff8800"
  - type: PointLight
    radius: 8.0
    energy: 6.0
    color: "#ff8800"
  - type: LightBehaviour
    behaviours:
      # Пульсация энергии — маяк заметно мигает, привлекая внимание.
      - !type:PulseBehaviour
        maxDuration: 1.2
        startValue: 3.0
        endValue: 6.0
        property: Energy
        isLooped: true
  - type: EmitGlobalSoundOnSpawn
    sound:
      path: /Audio/Effects/alert.ogg
  - type: TimedDespawn
    lifetime: 5
  - type: SpawnOnDespawn
    prototype: CrateDuelSupplyDrop
  # Помечает маяк как аренное снаряжение — если бой кончится во время телеграфа,
  # очистка арены уберёт и маяк.
  - type: ArenaSupplyDrop

# ── ДУЭЛЬНЫЙ ЯЩИК СНАРЯЖЕНИЯ (Supply Drop) ───────────────────────────────────
# Падает на месте маяка (см. выше), исчезает через 44 секунды.
# При спавне: колокол слышен всем на станции, ящик светится оранжевым.
#
# Лут рандомный — 5 независимых слотов (orGroup):
#   Medicine    — всегда один предмет из полного пула медицины
#   Ammo        — два независимых случайных типа боеприпасов
#   Utility     — зарядник / дымовуха / флэш / стимпак или ничего (~17%)
#   Melee       — холодное оружие или ничего (~14%)
#
# Все предметы в группе — вес prob: 1 (равная вероятность).

- type: entity
  parent: CrateGenericSteel
  id: CrateDuelSupplyDrop
  name: supply drop
  description: Ящик экстренного снаряжения, сброшенный в центр арены. Содержимое неизвестно.
  components:
  - type: StorageFill
    contents:

      # ── Медицина ───────────────────────────────────────────────────────────
      # Медипены
      - id: EmergencyMedipen
        orGroup: Medicine
        prob: 1
      - id: SurvivalMedipen
        orGroup: Medicine
        prob: 1
      - id: CombatMedipen
        orGroup: Medicine
        prob: 1
      # Аптечки
      - id: MedkitCombatFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitBruteFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitBurnFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitAdvancedFilled
        orGroup: Medicine
        prob: 1
      # Перевязочные материалы
      - id: Brutepack
        orGroup: Medicine
        prob: 1
      - id: Ointment
        orGroup: Medicine
        prob: 1
      - id: Gauze
        orGroup: Medicine
        prob: 1
      - id: MedicatedSuture
        orGroup: Medicine
        prob: 1
      - id: RegenerativeMesh
        orGroup: Medicine
        prob: 1
      # Шприцы (боевые)
      - id: SyringeBicaridine
        orGroup: Medicine
        prob: 1
      - id: SyringeDermaline
        orGroup: Medicine
        prob: 1
      - id: SyringeEphedrine
        orGroup: Medicine
        prob: 1
      - id: SyringeStimulants
        orGroup: Medicine
        prob: 1
      - id: SyringeTranexamicAcid
        orGroup: Medicine
        prob: 1
      # Таблетки (боевые)
      - id: PillCanisterBicaridine
        orGroup: Medicine
        prob: 1
      - id: PillCanisterBruzin
        orGroup: Medicine
        prob: 1
      - id: PillCanisterDermaline
        orGroup: Medicine
        prob: 1
      - id: PillCanisterExMedipen
        orGroup: Medicine
        prob: 1
      - id: PillCanisterKelotane
        orGroup: Medicine
        prob: 1
      - id: PillCanisterLacerinol
        orGroup: Medicine
        prob: 1
      - id: PillCanisterOmnizine
        orGroup: Medicine
        prob: 1
      - id: PillCanisterTricordrazine
        orGroup: Medicine
        prob: 1

      # ── Боеприпасы (два независимых случайных типа) ────────────────────────
      # Пистолетные
      - id: MagazineBoxPistol
        orGroup: Ammo
        prob: 1
      - id: MagazineBoxPistolIncendiary
        orGroup: Ammo
        prob: 1
      - id: MagazineBoxPistolUranium
        orGroup: Ammo
        prob: 1
      # Магнум
