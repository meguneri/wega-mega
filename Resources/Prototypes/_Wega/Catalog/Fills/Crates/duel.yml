  - type: PointLight
    radius: 4.0
    energy: 3.0
    color: "#ff8800"
  - type: EmitGlobalSoundOnSpawn
    sound:
      path: /Audio/Weapons/boxingbell.ogg
    params:
      volume: 0
  - type: TimedDespawn
    lifetime: 59
  - type: EjectStorageOnDespawn
