        prob: 1
      - id: Bloodpack
        orGroup: Medicine
        prob: 1
      # Шприцы
      - id: SyringeAmbuzol
        orGroup: Medicine
        prob: 1
      - id: SyringeBicaridine
        orGroup: Medicine
        prob: 1
      - id: SyringeDermaline
        orGroup: Medicine
        prob: 1
      - id: SyringeEphedrine
        orGroup: Medicine
        prob: 1
      - id: SyringeEthylredoxrazine
        orGroup: Medicine
        prob: 1
      - id: SyringeHyronalin
        orGroup: Medicine
        prob: 1
      - id: SyringePhalanximine
