        orGroup: Medicine
        prob: 1
      - id: MedkitCombatFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitBruteFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitBurnFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitAdvancedFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitOxygenFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitRadiationFilled
        orGroup: Medicine
        prob: 1
      - id: MedkitToxinFilled
        orGroup: Medicine
        prob: 1
      # Перевязочные материалы и расходники
