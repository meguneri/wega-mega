        prob: 1
      - id: MagazineBoxAntiMateriel
        orGroup: Ammo2
        prob: 1
      - id: BoxLethalshot
        orGroup: Ammo2
        prob: 1
      - id: BoxShotgunSlug
        orGroup: Ammo2
        prob: 1
      - id: BoxShotgunIncendiary
