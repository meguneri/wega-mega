- type: entity
  parent: [ CrateSyndicate, StorePresetFullArsenal, BaseSyndicateContraband ]
  id: CrateSyndicateFullArsenal
  name: Ящик хаоса (40 ТК)
  description: Случайное снаряжение на 40 ТК. Более 200 предметов в пуле — оружие, броня, скафандры, гранаты, импланты и многое другое. Повезёт — скафандр командира и LMG. Не повезёт — бита и кошачьи ушки.
  components:
  - type: Icon
    sprite: _Wega/Structures/Storage/Crates/full_arsenal.rsi
  - type: Sprite
    sprite: _Wega/Structures/Storage/Crates/full_arsenal.rsi
  - type: SurplusBundle
    totalPrice: 40
    weightByCost: true
    markIssuedItems: true
    # Каждый ящик гарантированно содержит хотя бы одно оружие и один весомый предмет (≥8 ТК),
    # а патроны выпадают только под уже выпавший совместимый ствол — никакого мусора без боя.
    guaranteedWeapon: true
    requireGunForAmmo: true
    guaranteedValueCount: 1
    guaranteedValueThreshold: 8
    ammoAffinityCategory: FullArsenalAmmo
    ammoAffinityMultiplier: 4
    companionCategories:
      FullArsenalInjector: FullArsenalMedsBottle
      FullArsenalWaterGun: FullArsenalNapalmBottle
    companionChances:
      FullArsenalWaterGun: 0.5
    categoryLimits:
      FullArsenalBowSet: 1
      FullArsenalInjector: 1
      FullArsenalArmor: 2
      FullArsenalHead: 2
      FullArsenalGrenade: 3
      FullArsenalAmmo: 4
      FullArsenalBag: 1
      FullArsenalFood: 3

# Большой ящик полного арсенала — тот же пул, бюджет 120 ТК.
# Броня/шлемы зафиксированы (2/2) как в обычном ящике; масштабируются только гранаты/патроны (×3).
- type: entity
  parent: [ CrateSyndicate, StorePresetFullArsenal, BaseSyndicateContraband ]
  id: CrateSyndicateFullArsenalMega
  name: Мега ящик хаоса (120 ТК)
  description: Случайное снаряжение на 120 ТК. Тот же пул из 200+ предметов, увеличенные лимиты. Не более 30 предметов в ящике.
  components:
  - type: Icon
    sprite: _Wega/Structures/Storage/Crates/full_arsenal_mega.rsi
  - type: Sprite
    sprite: _Wega/Structures/Storage/Crates/full_arsenal_mega.rsi
  - type: SurplusBundle
    totalPrice: 120
    weightByCost: true
    markIssuedItems: true
    guaranteedWeapon: true
    requireGunForAmmo: true
    guaranteedValueCount: 3
    guaranteedValueThreshold: 10
    # Топовая броня дорожает только в этом большом ящике: 35 ТК в обычных ящиках, 80 ТК здесь —
    # редкий джекпот, съедающий бóльшую часть бюджета 120 ТК.
    costOverrides:
      FullArsenalModSuitApocryphal: 80
      FullArsenalHardsuitDeathsquad: 80
    ammoAffinityCategory: FullArsenalAmmo
    ammoAffinityMultiplier: 4
    companionCategories:
      FullArsenalInjector: FullArsenalMedsBottle
      FullArsenalWaterGun: FullArsenalNapalmBottle
    companionChances:
      FullArsenalWaterGun: 0.5
    categoryLimits:
      FullArsenalBowSet: 1
      FullArsenalInjector: 1
      FullArsenalArmor: 2
      FullArsenalHead: 2
      FullArsenalGrenade: 9
      FullArsenalAmmo: 12
      FullArsenalBag: 1
      FullArsenalFood: 3
    # Гранатомёты/пусковые исключены из мега-ящика (кроме M90GL): слишком мощно на 120 ТК.
    excludedListings:
      - FullArsenalLauncherHydra
      - FullArsenalLauncherHydraLethal
      - FullArsenalLauncherRocket
      - FullArsenalORG430
      - FullArsenalDuffelGrenadeLauncher

