  # Отдельная текстура, чтобы отличать от обычного ящика арсенала.
  - type: Icon
    sprite: Structures/Storage/Crates/syndicate_secure.rsi
  - type: Sprite
    sprite: Structures/Storage/Crates/syndicate_secure.rsi
  - type: SurplusBundle
