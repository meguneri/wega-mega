- type: entity
  name: Urist McRaptor
  parent:
  - AppearanceResomi
  - BaseSpeciesMobOrganic
  - BaseOperated
  id: MobResomi
  components:
  - type: WeaponsUseInability
  - type: AgillitySkill
  - type: ListenUpSkill
  - type: ChatModifier
    whisperListeningRange: 4
  - type: FlashModifier
    modifier: 2
  - type: ResomiAccent
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        # they r very small
        density: 60
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Puller
    needsHands: false
  - type: Damageable
    damageModifierSet: Resomi
  - type: Injurable
    damageContainer: Biological
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: ResomiBlood
        Quantity: 300
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: TemperatureDamage
    heatDamageThreshold: 325
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold : 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 1.5 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      260: 0.8
      250: 0.6
      230: 0.4
  - type: ThermalRegulator
    normalBodyTemperature: 300.15
  - type: Speech
    speechSounds: Resomi
  - type: Vocal
    sounds:
      Male: MaleResomi
      Female: FemaleResomi
      Unsexed: MaleResomi
  - type: Respirator
    damage:
      types:
        Asphyxiation: 1.0
    damageRecovery:
      types:
        Asphyxiation: -1.0
  - type: DnaModifier
    upper: MobResomi
    lowest: MobStokkey

