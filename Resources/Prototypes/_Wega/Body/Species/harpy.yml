- type: markingsGroup
  parent: None
  id: Harpy
  limits:
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ HarpyEarsDefault ]
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ HarpyTailPhoenix ]
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: true
      default: [ HarpyChestDefault ]
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.TailOverlay:
      limit: 1
      required: true
      default: [ HarpyWingDefaultHuescale ]

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceHarpy
  name: harpy appearance
  components:
  - type: Inventory
    templateId: harpy
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Wega/Mobs/Species/Harpy/displacement.rsi
            state: jumpsuit
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: _Wega/Mobs/Species/Harpy/displacement.rsi
            state: jumpsuit
  - type: InitialBody
    organs:
      Torso: OrganHarpyTorso
      Head: OrganHarpyHead
      ArmLeft: OrganHarpyArmLeft
      ArmRight: OrganHarpyArmRight
      HandLeft: OrganHarpyHandLeft
      HandRight: OrganHarpyHandRight
      LegLeft: OrganHarpyLegLeft
      LegRight: OrganHarpyLegRight
      FootLeft: OrganHarpyFootLeft
      FootRight: OrganHarpyFootRight
      Brain: OrganHarpyBrain
      Eyes: OrganHarpyEyes
      Tongue: OrganHarpyTongue
      Appendix: OrganHarpyAppendix
      Ears: OrganHarpyEars
      Lungs: OrganHarpyLungs
      Heart: OrganHarpyHeart
      Stomach: OrganHarpyStomach
      Liver: OrganHarpyLiver
      Kidneys: OrganHarpyKidneys
  - type: HumanoidProfile
    species: Harpy

- type: entity
  parent:
  - AppearanceHarpy
  - MobHuman
  id: MobHarpy
  name: Urist McHarpy
  components:
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 6
  - type: Speech
    speechSounds: Alto
    allowedEmotes: ['CatHisses', 'CatMeow', 'Growl', 'Purr', 'Beep', 'Click']
  - type: Vocal
    sounds:
      Male: MaleHarpy
      Female: FemaleHarpy
      Unsexed: MaleHarpy
  - type: UserInterface
    interfaces:
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      # enum.SurgeryUiKey.Key:
      #   type: SurgeryBoundUserInterface
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
  - type: Instrument
    allowPercussion: false
    program: 52
  - type: FlyAbility
    staminaDamage: 3
    cooldown: 10
    sound:
      collection: FootstepHarpyFly
  - type: MovementSpeedModifier
    baseWeightlessAcceleration: 1.25
    baseWeightlessFriction: 1
    baseWeightlessModifier: 1
  - type: DnaModifier
    upper: MobHarpy
    lowest: MobParrot

- type: entity
  parent: OrganBase
  id: OrganHarpy
  abstract: true
  suffix: Harpy

- type: entity
  id: OrganHarpyMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Human ]

- type: entity
  parent: OrganHarpy
  id: OrganHarpyInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  id: OrganHarpyVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: _Wega/Mobs/Species/Harpy/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Harpy

- type: entity
  parent: [ OrganHarpy, OrganHarpyVisual ]
  id: OrganHarpyExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Harpy/parts.rsi

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganHarpyExternal ]
  id: OrganHarpyTorso

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganHarpyExternal ]
  id: OrganHarpyHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
