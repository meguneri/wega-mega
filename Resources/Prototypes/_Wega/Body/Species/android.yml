- type: entity
  parent:
  - AppearanceAndroid
  - BaseSpeciesMob
  - MobBloodstream
  - MobRespirator
  - MobFlammable
  - MobAtmosExposed
  id: MobAndroid
  name: "Urisst' Mzhand Android"
  components:
  - type: TypingIndicator
    proto: robot
  - type: Speech
    allowedEmotes:
      - LPCmoan
    speechVerb: Robotic
    speechSounds: Borg
  - type: Vocal
    sounds:
      Male: MaleAndroid
      Female: FemaleAndroid
      Unsexed: MaleAndroid
  - type: Damageable
    damageContainer: Android
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#2c7ef2"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: ZombieImmune
  - type: Repairable
    doAfterDelay: 3
    allowSelfRepair: true
    damage:
      types:
        Blunt: -10
        Slash: -10
        Piercing: -10
        Cold: -10
        Caustic: -10
        Asphyxiation: -10
  - type: AtmosExposed
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: TemperatureDamage
    heatDamageThreshold: 403.15
    coldDamageThreshold: 213.15
    coldDamage:
      types:
        Cold: 0.1
    heatDamage:
      types:
        Heat: 1.0
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.15
  - type: PressureProtection
    highPressureMultiplier: 0.8
    lowPressureMultiplier: 1000
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot {}
      light:
        !type:ContainerSlot
        showEnts: true
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: true
  - type: PowerCellDraw
    drawRate: 0.4
  - type: ToggleCellDraw
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: ItemToggle
    onActivate: false
    activated: false
    onUse: false
  - type: WiresPanel
  - type: LockedWiresPanel
  - type: Lock
    unlockOnClick: false
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: Tyrium
        Quantity: 300
    bleedReductionAmount: 0
    bloodRefreshAmount: 0
  - type: DisableMetabolismEffects
  - type: Android
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.SurgeryUiKey.Key:
        type: SurgeryBoundUserInterface
  - type: InteractionPopup
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
    - reagents: [ Water ]
      methods: [ Touch ]
      effects:
      - !type:Electrocute
        shockDamage: 1
        minScale: 20
        electrocuteTime: 1
  - type: Operated
    raceGraph: AndroidSurgery
    limbLossChance: 1.75
    specialTool: Screwing
  - type: SyntheticOperated
  - type: Pain
    profile: SyntheticPainProfile
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - Android

- type: entity
  id: AndroidLightMarker
  parent: MarkerBase
  categories: [ HideSpawnMenu ]
  components:
  - type: PointLight
    enabled: false

- type: entity
  id: AndroidEndoskeleton
  name: "android endoskeleton"
  description: "A frame for a future android. Inside they are scarier than outside.."
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Pullable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 100
        mask:
        - MobMask
        layer:
        - MobLayer
        restitution: 0.3
        friction: 0.2
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _Wega/Mobs/Species/Android/frame.rsi
    layers:
    - state: frame-0
      map: [ "enum.AndroidFrameVisualLayers.Frame" ]
  - type: Construction
    graph: AndroidEndoskeleton
    node: start
    defaultTarget: frame
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AndroidFrameVisuals.ConstructionStage:
        enum.AndroidFrameVisualLayers.Frame:
          0: { state: frame-0, visible: true}
          1: { state: frame-1, visible: true}
          2: { state: frame-2, visible: true}
          3: { state: frame-3, visible: true}
          4: { state: frame-4, visible: true}
          5: { state: frame-5, visible: true}

- type: entity
  id: AndroidFrame
  name: "android frame"
  description: "Customize the appearance of the assembled android."
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 100
        mask:
        - MobMask
        layer:
        - MobLayer
        restitution: 0.3
        friction: 0.2
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _Wega/Mobs/Species/Android/frame.rsi
    state: full
  - type: AndroidFrame
  - type: Appearance
  - type: ActivatableUI
    key: enum.AndroidConstructUiKey.Key
  - type: UserInterface
    interfaces:
      enum.AndroidConstructUiKey.Key:
        type: AndroidConstructBoundUserInterface
  - type: ContainerContainer
    containers:
      battery: !type:ContainerSlot
      brain: !type:ContainerSlot
  - type: ItemSlots
    slots:
      battery:
        whitelist:
          tags:
          - PowerCell
      brain:
        whitelist:
          tags:
          - BrainSynthetic
  - type: Construction
    graph: AndroidEndoskeleton
    node: frame

