- type: entity
  parent: Vampire
  id: SubVampire
  components:
  - type: GameRule
    minPlayers: 15
  - type: AntagSelection
    agentName: vampire-round-end-name
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: Vampire
      playerRatio: 15
      range:
        min: 1
        max: 4

- type: entity
  parent: BloodBrothers
  id: SubBloodBrothers
  components:
  - type: AntagSelection
    agentName: blood-brother-round-end-name
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: BloodBrother
      playerRatio: 1
      range:
        min: 2
        max: 2

# Extended testing
- type: entity
  parent: BaseGameRule
  id: SubThiefExtended
  components:
  - type: ThiefRule
  - type: AntagObjectives
    objectives:
    - EscapeThiefShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: ThiefBigObjectiveGroups
      prob: 0.7
      maxPicks: 1
    - groups: ThiefObjectiveGroups
      maxPicks: 10
    maxDifficulty: 2.5
  - type: AntagSelection
    agentName: thief-round-end-agent-name
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: Thief
      playerRatio: 15
      range:
        min: 0
        max: 4
  - type: DynamicRuleCost
    cost: 75
