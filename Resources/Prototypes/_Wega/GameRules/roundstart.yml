# Base / Dont Touch
- type: entity
  parent: BaseGameRule
  id: BaseStationEventGhostBarSpawn
  components:
  - type: LoadMapRule
    mapPath: /Maps/_Wega/wegabar.yml

- type: entity
  parent: BaseGameRule
  id: SubGamemodesTraitVampRule
  components:
  - type: SubGamemodes
    rules:
    - id: SubWizard
      prob: 0.05
    - id: SubXenoborgs
      prob: 0.25
    - id: Thief
      prob: 0.5

# Rules
- type: entity
  parent: BaseGameRule
  id: Vampire
  components:
  # Corvax-Wega-SubGameRules-start
  - type: SubGamemodes
    rules:
    - id: SubTraitor
      prob: 0.5
  # Corvax-Wega-SubGameRules-end
  - type: GameRule
    minPlayers: 5
  - type: VampireRule
  - type: AntagObjectives
    objectives:
      - VampireBloodObjective
      - EscapeVampirefShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: VampireObjectiveGroups
      maxPicks: 2
    maxDifficulty: 5
  - type: AntagSelection
    agentName: vampire-round-end-name
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: Vampire
      range:
        min: 1
        max: 8

- type: entity
  parent: BaseGameRule
  id: BloodCult
  components:
  - type: GameRule
    minPlayers: 0
  - type: BloodCultRule
  - type: AntagObjectives
    objectives:
      - BloodCultRitualObjective
  - type: AntagSelection
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: BloodCultist
      playerRatio: 10
      range:
        min: 1
        max: 4

- type: entity
  parent: BaseGameRule
  id: BloodBrothers
  components:
  - type: GameRule
    minPlayers: 20
  - type: BloodBrotherRule
    requiredObjectives:
    - BloodBrotherSharedEscapeObjective
    objectiveSets:
    - groups: BloodBrotherObjectiveGroups
      maxPicks: 3
  - type: AntagSelection
    agentName: blood-brother-round-end-name
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: BloodBrother
      playerRatio: 1
      range:
        min: 2
        max: 8

- type: entity
  parent: BaseGameRule
  id: VeilCult
  components:
  - type: GameRule
    minPlayers: 30
  - type: VeilCultRule
  - type: AntagObjectives
    objectives:
      - VeilCultRitualObjective
  - type: AntagSelection
    lateJoinAdditional: true
    antags:
    - !type:LinearAntagCount
      proto: VeilCultist
      playerRatio: 10
      range:
        min: 1
        max: 4

# event schedulers

- type: entityTable
  id: LightGameRulesTable
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        tableId: BasicCalmEventsTable
      - !type:NestedSelector
        tableId: LightAntagEventsTable
      - !type:NestedSelector
        tableId: CargoGiftsTable
      - !type:NestedSelector
        tableId: CalmPestEventsTable
      - !type:NestedSelector
        tableId: SpicyPestEventsTable

- type: entity
  id: LightStationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: LightGameRulesTable
