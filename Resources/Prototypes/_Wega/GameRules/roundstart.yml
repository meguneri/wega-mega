# Base / Dont Touch
- type: entity
  parent: BaseGameRule
  id: BaseStationEventGhostBarSpawn
  components:
  - type: LoadMapRule
    mapPath: /Maps/_Wega/wegabar.yml

# Rules
- type: entity
  parent: BaseGameRule
  id: Vampire
  components:
  - type: GameRule
    minPlayers: 5
  - type: VampireRule
  - type: AntagObjectives
    objectives:
      - VampireBloodObjective
      - EscapeVampirefShuttleObjective
  - type: AntagRandomObjectives
    sets:
    - groups: VampireObjectiveGroups
      maxPicks: 2
    maxDifficulty: 5
  - type: AntagSelection
    agentName: vampire-round-end-name
    definitions:
      - prefRoles: [ Vampire ]
        max: 4
        playerRatio: 20
        blacklist:
          components:
          - AntagImmune
          - BibleUser
          - Android
          - Ipc
        lateJoinAdditional: true
        components:
        - type: Vampire
        - type: NpcFactionMember
          factions:
          - Vampire
        mindRoles:
        - MindRoleVampire
        briefing:
          sound: "/Audio/_Wega/Ambience/Antag/vampare_start.ogg"

- type: entity
  parent: BaseGameRule
  id: BloodCult
  components:
  - type: GameRule
    minPlayers: 30
  - type: BloodCultRule
  - type: AntagObjectives
    objectives:
      - BloodCultRitualObjective
  - type: AntagSelection
    definitions:
      - prefRoles: [ BloodCultist ]
        max: 4
        playerRatio: 10
        blacklist:
          components:
          - AntagImmune
          - BibleUser
          - Android
          - Ipc
        lateJoinAdditional: true
        components:
        - type: BloodCultist
        - type: MindLink
          channels: ["MindBloodCult"]
        - type: NpcFactionMember
          factions:
          - BloodCult
        - type: FriendlyFaction
          faction: BloodCult
        mindRoles:
        - MindRoleBloodCultist
        briefing:
          sound: "/Audio/_Wega/Ambience/Antag/bloodcult_start.ogg"

- type: entity
  parent: BaseGameRule
  id: BloodBrothers
  components:
  - type: GameRule
    minPlayers: 20
  - type: BloodBrotherRule
    requiredObjectives:
    - BloodBrotherSharedEscapeObjective
    objectiveSets:
    - groups: BloodBrotherObjectiveGroups
      maxPicks: 3
  - type: AntagSelection
    agentName: blood-brother-round-end-name
    definitions:
      - prefRoles: [ BloodBrother ]
        min: 2
        max: 8
        playerRatio: 1
        blacklist:
          components:
          - AntagImmune
          - Pacified # Diona ha-ha-ha

# event schedulers

- type: entityTable
  id: LightGameRulesTable
  table: !type:AllSelector
    children:
      - !type:NestedSelector
        tableId: BasicCalmEventsTable
      - !type:NestedSelector
        tableId: LightAntagEventsTable
      - !type:NestedSelector
        tableId: CargoGiftsTable
      - !type:NestedSelector
        tableId: CalmPestEventsTable
      - !type:NestedSelector
        tableId: SpicyPestEventsTable

- type: entity
  id: LightStationEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    scheduledGameRules: !type:NestedSelector
      tableId: LightGameRulesTable
