- type: entity
  parent: BaseAction
  id: ActionSwitchHarpyFly
  name: Fly
  description: Take off, passing small obstacles and chasms
  components:
  - type: Action
    icon: { sprite: _Wega/Interface/Actions/actions_harpy.rsi, state: "FlyOff" }
    iconOn: { sprite: _Wega/Interface/Actions/actions_harpy.rsi, state: "FlyOn" }
  - type: InstantAction
    event: !type:FlyAbilityEvent

- type: entity
  parent: BaseAction
  id: InstantRegeneration
  name: Instant regeneration
  description: "Your second wind, your second chance"
  components:
  - type: Action
    icon: { sprite: _Wega/Interface/Actions/action_demon.rsi, state: "instant_regeneration" }
  - type: InstantAction
    event: !type:DamageOnActionEvent

- type: entity
  parent: BaseAction
  id: ActionToggleHud
  name: Toggle HUD
  description: Toggles HUD of your cloth.
  components:
  - type: Action
    itemIconStyle: BigItem
    priority: -20
    useDelay: 1
  - type: InstantAction
    event: !type:ToggleActionEvent
    
- type: entity
  parent: BaseSuicideAction
  id: ActionActivateBluespaceLifeline
  name: Activate Bluespace Lifeline
  description: Activates your bluespace lifeline implant, teleporting you far-far away from this station. You won't be able to come back.
  components:
  - type: Action
    checkCanInteract: false
    checkConsciousness: false
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: _Wega/Effects/bluespace_lifeline.rsi
      state: bluespace_lifeline
  - type: InstantAction
    event: !type:ActivateImplantEvent
    
- type: entity
  parent: BaseImplantAction
  id: ActionActivateSmoke
  name: Activate Smoke Implant
  description: Releases a cloud of smoke.
  components:
  - type: Action
    useDelay: 40
    icon:
      sprite: Objects/Weapons/Grenades/smoke.rsi
      state: icon
