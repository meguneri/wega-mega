# Basic
- type: entity
  id: ActionMidasTouch
  parent: BaseAction
  name: "[color=red]Midas Touch[/color]"
  description: "Summons Midas Touch in your hand."
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    icon: { sprite: _Wega/Interface/Actions/actions_veilcult.rsi, state: "midastouch" }
    useDelay: 15
    priority: 1
  - type: InstantAction
    event: !type:VeilCultMidasTouchActionEvent
    
