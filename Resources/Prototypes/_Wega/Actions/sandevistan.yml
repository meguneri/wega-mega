# Действие активации Сандэвистана. raiseOnUser НЕ ставим — событие летит на предмет-контейнер
# (на нём висит SandevistanComponent), а носитель приходит в args.Performer.
- type: entity
  parent: BaseAction
  id: ActionSandevistan
  name: Сандэвистан
  description: "Разогнать рефлексы до предела: рывок скорости и сниженный урон на несколько секунд."
  components:
  - type: Action
    useDelay: 30
    itemIconStyle: BigAction
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: blink
  - type: InstantAction
    event: !type:SandevistanActivateEvent

# Арена-версия: тот же эффект, но короче перезарядка кнопки (совпадает с cooldown импланта 12с).
- type: entity
  parent: ActionSandevistan
  id: ActionSandevistanArena
  components:
  - type: Action
    useDelay: 12

# «Стоп-кадр»: перезарядка кнопки совпадает с cooldown импланта (10с).
- type: entity
  parent: ActionSandevistan
  id: ActionSandevistanFreeze
  components:
  - type: Action
    useDelay: 10

# «Проекция» (техника Наои Дзенина): перезарядка кнопки совпадает с cooldown импланта (20с).
- type: entity
  parent: ActionSandevistan
  id: ActionSandevistanProjection
  name: Сандэвистан «проекция»
  description: "Делишь секунду на 24 кадра. Любой, кого коснёшься голой рукой, не успевает за тобой и застывает на миг."
  components:
  - type: Action
    useDelay: 20
