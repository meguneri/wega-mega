- type: entity
  id: BaseBloodRune
  name: rune
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    drawdepth: HighFloorObjects
    sprite: _Wega/Structures/Specific/bloodcult_structures.rsi
  - type: Clickable
  - type: InteractionOutline
  - type: Appearance
    appearanceDataInit:
      enum.RuneColorVisuals.Color:
        !type:String
        "#ff0000"
  - type: Physics
    bodyType: Static
  - type: UseDelay
    delay: 5

- type: entity
  id: BloodRuneOffering
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    state: offering
  - type: BloodRune
    runeType: Offering
    desc: "offering-rune-desc"

- type: entity
  id: BloodRuneTeleport
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    state: teleport
  - type: BloodRune
    runeType: Teleport
    desc: "teleport-rune-desc"

- type: entity
  id: BloodRuneEmpowering
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    state: empowering
  - type: BloodRune
    runeType: Empowering
    desc: "empowering-rune-desc"
  - type: UserInterface
    interfaces:
      enum.EmpoweringRuneUiKey.Key:
        type: EmpoweringRuneBoundUserInterface

- type: entity
  id: BloodRuneRevive
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    state: revive
  - type: BloodRune
    runeType: Revive
    desc: "revive-rune-desc"

- type: entity
  id: BloodRuneBarrier
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    state: barrier
  - type: Physics
    bodyType: Dynamic
    canCollide: false
  - type: Fixtures
    fixtures:
      barrier:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        layer:
        - WallLayer
        hard: false
  - type: Damageable
    damageModifierSet: Metallic
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: BloodRune
    runeType: Barrier
    desc: "barrier-rune-desc"

- type: entity
  id: BloodRuneSummoning
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    state: summoning
  - type: BloodRune
    runeType: Summoning
    desc: "summoning-rune-desc"
  - type: UserInterface
    interfaces:
      enum.SummoningRuneUiKey.Key:
        type: SummoningRuneBoundUserInterface

- type: entity
  id: BloodRuneBloodBoil
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    state: bloodboil
  - type: BloodRune
    runeType: BloodBoil
    desc: "bloodboil-rune-desc"

- type: entity
  id: BloodRuneSpiritealm
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    state: spiritrealm
  - type: BloodRune
    runeType: SpiritRealm
    desc: "spiritrealm-rune-desc"

- type: entity
  id: BloodRuneRitualDimensionalRending
  parent: BaseBloodRune
  name: rune
  description: ""
  components:
  - type: Sprite
    drawdepth: HighFloorObjects
    sprite: _Wega/Structures/Specific/bloodcult_structures_large.rsi
    state: rune_large
  - type: BloodRitualDimensionalRending
  - type: NavMapBeacon
    color: "#ff0000"
    text: "???"
    enabled: true

- type: entity
  id: BloodCultConstruct
  parent: BaseStructure
  name: construct
  description: A strange floating structure in the air.
  suffix: DO NOT MAP
  components:
  - type: Sprite
    sprite: _Wega/Structures/Specific/bloodcult_structures.rsi
    state: construct-cult
  - type: Physics
    bodyType: Dynamic
  - type: Construct
  - type: Damageable
    damageModifierSet: StructuralMetallic
  - type: Injurable
    damageContainer: StructuralInorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel10:
            min: 1
            max: 1
      - !type:EmptyContainersBehaviour
        containers:
        - item
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
  - type: Anchorable
    tool: BloodDagger
  - type: InteractionOutline
  - type: ContainerContainer
    containers:
      item: !type:ContainerSlot
  - type: ItemSlots
    slots:
      item:
        name: ""
        whitelist:
          tags:
          - SoulStone
  - type: UserInterface
    interfaces:
      enum.BloodConstructUiKey.Key:
        type: BloodConstructBoundUserInterface

- type: entity
  id: BaseBloodCultStructure
  parent: BaseStructure
  abstract: true
  components:
  - type: Anchorable
    tool: BloodDagger
  - type: Physics
    bodyType: Dynamic
  - type: InteractionOutline
  - type: BloodStructure
    fixture: fix1
  - type: UserInterface
    interfaces:
      enum.BloodStructureUiKey.Key:
        type: BloodStructureBoundUserInterface

- type: entity
  parent: BaseBloodCultStructure
  id: BloodCultStructureArchives
  name: archives
  description: A desk covered with mysterious manuscripts and volumes in unknown languages. Looking at the text, goosebumps pass.
  suffix: DO NOT MAP
  components:
  - type: Sprite
    sprite: _Wega/Structures/Specific/bloodcult_structures.rsi
    state: archive
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 190
        mask:
        - MachineMask
        layer:
          - MachineLayer
  - type: Appearance
  - type: Damageable
    damageModifierSet: Metallic
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/break_stone.ogg
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetRuneMetal1:
            min: 0
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: BloodStructure
    fixture: fix1
    structureGear:
    - ClothingEyesZealotBlindfold
    - BloodCultVeilShifter
    - BloodCultShuttleCurse
    - CardTarotNotEnchanted
  - type: Construction
    graph: BloodCultStructureArchivesGraph
    node: BloodCultStructureArchives

