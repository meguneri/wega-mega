#Floor lights
- type: entity
  id: LightFloor
  name: floor light
  description: "An always powered light."
  suffix: Always Powered
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _Wega/Structures/Lighting/light_floor.rsi
    snapCardinals: true
    drawdepth: Objects
    noRot: true
    layers:
    - map: ["enum.PoweredLightLayers.Base"]
      state: base
    - map: ["enum.PoweredLightLayers.Glow"]
      state: glow
      shader: unshaded
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.15
        density: 190
        mask:
        - None
        layer:
        - TabletopMachineLayer
  - type: PointLight
    energy: 0.8
    radius: 10
    softness: 1
    color: "#FFE4CE"
  - type: Damageable
    damageModifierSet: Metallic
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 2
            max: 2
      - !type:DoActsBehavior
        acts: ["Destruction"]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
  - type: StaticPrice
    price: 75
  - type: RequireProjectileTarget
  placement:
    mode: SnapgridCenter

- type: entity
  parent: LightFloor
  id: PoweredLightFloorEmpty
  name: floor light
  description: "A small floor light."
  suffix: Empty
  components:
  - type: Sprite
    sprite: _Wega/Structures/Lighting/light_floor.rsi
    state: empty
  - type: PointLight
    enabled: false
  - type: PoweredLight
    bulb: Bulb
  - type: ContainerContainer
    containers:
      light_bulb: !type:ContainerSlot
  - type: ApcPowerReceiver
  - type: ExtensionCableReceiver
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: SmartLight
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSink
    ports:
      - On
      - Off
      - Toggle
  - type: Appearance
  - type: PoweredLightVisuals
    blinkingSound:
      path: "/Audio/Machines/light_tube_on.ogg"
    spriteStateMap:
      empty: empty
      off: base
      on: base
      broken: broken
      burned: burned
  - type: DamageOnInteract
    damage:
      types:
        Heat: 2
    popupText: powered-light-component-burn-hand

- type: entity
  parent: PoweredLightFloorEmpty
  id: PoweredLEDLightFloor
  suffix: LED
  components:
  - type: PointLight
    enabled: true
    color: "#EEEEFF"
  - type: PoweredLight
    hasLampOnSpawn: LedLightBulb
  - type: DamageOnInteract
    damage:
      types:
        Heat: 1
    popupText: powered-light-component-burn-hand

- type: entity
  parent: PoweredLightFloorEmpty
  id: PoweredWarmLightFloor
  suffix: Warm
  components:
  - type: PointLight
    enabled: true
    color: "#FF8A0C"
  - type: PoweredLight
    hasLampOnSpawn: WarmLightBulb

- type: entity
  parent: PoweredLightFloorEmpty
  id: PoweredLightFloor
  suffix: ""
  components:
  - type: PointLight
    enabled: true
    color: "#FF8A0C"
  - type: PoweredLight
    hasLampOnSpawn: LightBulb

