# ── ДУЭЛЬНЫЙ СТАРТОВЫЙ БАРЬЕР ────────────────────────────────────────────────
#
# Схема сигналов (всё через AutoLink — ручная настройка в редакторе не нужна):
#
#   DuelStartButton ──[DuelStart]──► DuelStartTimer ──[DuelFight]──► DuelStartBarrier
#                                                             └──[DuelFight]──► DuelStartSoundEmitter
#
#   DuelResetButton ──[DuelReset]──► DuelStartBarrier (Close)
#
# Порядок событий:
#   1. Нажатие DuelStartButton → Pressed → Trigger (дефолт) → запускает таймер
#   2. Таймер отсчитывает 5 секунд (отображается на экране)
#   3. По истечении → Timer → Open (дефолт) → барьеры открываются
#                          → Trigger (дефолт) → DuelStartSoundEmitter воспроизводит колокол
#   4. После дуэли: нажатие DuelResetButton → Pressed → Toggle (дефолт) → барьеры закрываются
#
# Размещение на карте:
#   - DuelStartBarrier: по одному на каждой стороне арены (несколько тайлов в ряд)
#   - DuelStartTimer: на стене рядом с кнопкой
#   - DuelStartButton: на стене арены (видное место)
#   - DuelResetButton: на стене арены (рядом со стартовой кнопкой или отдельно)
#   - DuelStartSoundEmitter: один в любом месте арены (невидимый)

# ── Барьер ───────────────────────────────────────────────────────────────────

- type: entity
  id: DuelStartBarrier
  parent: BlastDoor
  name: duel barrier
  suffix: Duel Arena
  description: Бронированный барьер, разделяющий дуэлянтов до начала поединка.
  components:
  - type: Door
    state: Closed
  - type: DeviceLinkSink
    ports:
      - Open
      - Close
      - Toggle
  - type: AutoLinkReceiver
    channels:
      - DuelFight
      - DuelReset

# ── Таймер ───────────────────────────────────────────────────────────────────

- type: entity
  id: DuelStartTimer
  parent: ScreenTimer
  name: duel start timer
  suffix: Duel Arena
  description: Таймер обратного отсчёта перед началом дуэли.
  components:
  - type: SignalTimer
    delay: 5
    canEditLabel: false
  # Цифры отсчёта в стиле голограммы «ГОТОВ»: тот же шрифт NotoSans-Bold, неон зелёный↔циан,
  # скан-линии и глитч (анимация зашита в RSI). color: White — цвета берём из кадров, не модулируем;
  # shader: unshaded — неоновый «голо»-вид; charWidth: 4 под глифы 6×12 — «00:05» (=20px) влезает в
  # стекло табло (32px), не вылезая за края.
  - type: TextScreenVisuals
    color: White
    font: _Wega/Effects/duel_timer_text.rsi
    charWidth: 4
    shader: unshaded
    textOffset: 0,8
    timerOffset: 0,8
    rows: 1
  - type: DeviceLinkSink
    ports:
      - Trigger
  - type: AutoLinkReceiver
    channel: DuelStart
  - type: DeviceLinkSource
    ports:
      - Start
      - Timer
  - type: AutoLinkTransmitter
    channel: DuelFight

# ── Кнопка старта ────────────────────────────────────────────────────────────

# Кнопка готовности (ready-check). Нажатие НЕ стартует бой сразу: оно помечает кнопку готовой, а над
# кнопкой СОПЕРНИКА загорается голограмма «ГОТОВ» — так второй дуэлянт у своей кнопки видит, что
# первый уже нажал. Когда нажаты все кнопки арены (минимум 2), DuelArenaSystem программно дёргает
# порт Pressed → DuelStart → таймер → DuelFight (как раньше). Готовность считается ПО КНОПКАМ грида:
# ставь по одной такой кнопке в каждую базу (в запечатанных базах боец дотягивается только до своей).
- type: entity
  id: DuelStartButton
  parent: BaseWallmountMetallic
  name: кнопка готовности к дуэли
  suffix: Duel Arena
  description: Нажми, чтобы подтвердить готовность. Над кнопкой соперника загорится голограмма «ГОТОВ». Бой начнётся, когда готовы оба бойца.
  components:
  # НЕ наследуемся от SignalButton: его SignalSwitch транслировал бы DuelStart по КАЖДОМУ нажатию
  # (мгновенный старт, без ready-check). Нажатие ловит DuelReadyButton; сигнал DuelStart на таймер
  # шлётся программно через этот же порт Pressed / канал DuelStart, только когда готовы все.
  - type: WallMount
    arc: 360
  - type: Sprite
    drawdepth: SmallObjects
    sprite: Structures/Wallmounts/switch.rsi
    state: dead
  - type: UseDelay
    delay: 0.5
  - type: DuelReadyButton
  - type: Rotatable
  - type: DeviceNetwork
    deviceNetId: Wireless
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSource
    ports:
      - Pressed
  - type: AutoLinkTransmitter
    channel: DuelStart
  - type: Transform
    anchored: false
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 80
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

# ── Голограмма готовности ────────────────────────────────────────────────────
# Спавнится над кнопкой СОПЕРНИКА, когда боец нажал свою кнопку готовности (индикатор «противник
# готов»); снимается, когда соперник тоже нажал, и при старте/конце/сбросе боя (DuelArenaSystem.Ready).
# Только индикатор — без физики и коллизий.
- type: entity
  id: DuelReadyHologram
  name: голограмма готовности
  suffix: Duel Arena
  categories: [ HideSpawnMenu ]
  description: Голографическая отметка готовности бойца.
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    drawdepth: Overlays
    noRot: true
    # Текстура 96×32 px = 3 тайла в ширину при 1:1 — слишком крупно, закрывала кнопку.
    # Ужимаем до ~1.2 тайла шириной, чтобы аккуратно висела НАД кнопкой и не перекрывала её.
    scale: 0.4, 0.4
    sprite: _Wega/Effects/duel_ready.rsi
    layers:
      - state: icon
        shader: unshaded
  - type: PointLight
    radius: 1.0
    energy: 1.0
    color: "#4DFF73"
    castShadows: false

# ── Звуковой эмиттер ─────────────────────────────────────────────────────────

- type: entity
  id: DuelStartSoundEmitter
  parent: MarkerBase
  name: Duel Sound Emitter
  suffix: Duel Arena
  description: Невидимая сущность. Воспроизводит колокол на весь сервер при старте дуэли.
  components:
  - type: Sprite
    layers:
      - state: green
  - type: DeviceLinkSink
    ports:
      - Trigger
  - type: AutoLinkReceiver
    channel: DuelFight
  - type: EmitGlobalSoundOnSignal
    sound:
      path: /Audio/_Wega/Duel/duel_start.ogg
    params:
      volume: 0

# ── Кнопка сброса ────────────────────────────────────────────────────────────

- type: entity
  id: DuelResetButton
  parent: SignalButton
  name: duel reset button
  suffix: Duel Arena
  description: Закрывает барьеры арены после окончания дуэли. Готовит арену к следующему поединку.
  components:
  - type: DeviceLinkSource
    ports:
      - Pressed
    range: 200
  - type: AutoLinkTransmitter
    channel: DuelReset
