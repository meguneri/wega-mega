# ── ДУЭЛЬНЫЙ СТАРТОВЫЙ БАРЬЕР ────────────────────────────────────────────────
#
# Схема сигналов (всё через AutoLink — ручная настройка в редакторе не нужна):
#
#   DuelStartButton ──[DuelStart]──► DuelStartTimer ──[DuelFight]──► DuelStartBarrier
#                                                             └──[DuelFight]──► DuelStartSoundEmitter
#
#   DuelResetButton ──[DuelReset]──► DuelStartBarrier (Close)
#
# Порядок событий:
#   1. Нажатие DuelStartButton → Pressed → Trigger (дефолт) → запускает таймер
#   2. Таймер отсчитывает 5 секунд (отображается на экране)
#   3. По истечении → Timer → Open (дефолт) → барьеры открываются
#                          → Trigger (дефолт) → DuelStartSoundEmitter воспроизводит колокол
#   4. После дуэли: нажатие DuelResetButton → Pressed → Toggle (дефолт) → барьеры закрываются
#
# Размещение на карте:
#   - DuelStartBarrier: по одному на каждой стороне арены (несколько тайлов в ряд)
#   - DuelStartTimer: на стене рядом с кнопкой
#   - DuelStartButton: на стене арены (видное место)
#   - DuelResetButton: на стене арены (рядом со стартовой кнопкой или отдельно)
#   - DuelStartSoundEmitter: один в любом месте арены (невидимый)

# ── Барьер ───────────────────────────────────────────────────────────────────

- type: entity
  id: DuelStartBarrier
  parent: BlastDoor
  name: duel barrier
  suffix: Duel Arena
  description: Бронированный барьер, разделяющий дуэлянтов до начала поединка.
  components:
  - type: Door
    state: Closed
  - type: DeviceLinkSink
    ports:
      - Open
      - Close
      - Toggle
  - type: AutoLinkReceiver
    channels:
      - DuelFight
      - DuelReset

# ── Таймер ───────────────────────────────────────────────────────────────────

- type: entity
  id: DuelStartTimer
  parent: ScreenTimer
  name: duel start timer
  suffix: Duel Arena
  description: Таймер обратного отсчёта перед началом дуэли.
  components:
  - type: SignalTimer
    delay: 5
    canEditLabel: false
  - type: DeviceLinkSink
    ports:
      - Trigger
  - type: AutoLinkReceiver
    channel: DuelStart
  - type: DeviceLinkSource
    ports:
      - Start
      - Timer
  - type: AutoLinkTransmitter
    channel: DuelFight

# ── Кнопка старта ────────────────────────────────────────────────────────────

# Кнопка готовности (ready-check). Нажатие НЕ стартует бой сразу: оно помечает нажавшего готовым
# (над ним загорается голограмма «ГОТОВ»). Когда готовы все живые бойцы арены (минимум 2),
# DuelArenaSystem программно дёргает порт Pressed → DuelStart → таймер → DuelFight (как раньше).
# Если базы запечатаны и до одной кнопки дотягивается только один боец — поставь по такой кнопке
# в каждую базу: готовность общая на арену (по гриду), так что несколько кнопок работают вместе.
- type: entity
  id: DuelStartButton
  parent: BaseWallmountMetallic
  name: кнопка готовности к дуэли
  suffix: Duel Arena
  description: Нажми, чтобы подтвердить готовность. Над тобой загорится голограмма «ГОТОВ». Бой начнётся, когда готовы оба бойца.
  components:
  # НЕ наследуемся от SignalButton: его SignalSwitch транслировал бы DuelStart по КАЖДОМУ нажатию
  # (мгновенный старт, без ready-check). Нажатие ловит DuelReadyButton; сигнал DuelStart на таймер
  # шлётся программно через этот же порт Pressed / канал DuelStart, только когда готовы все.
  - type: WallMount
    arc: 360
  - type: Sprite
    drawdepth: SmallObjects
    sprite: Structures/Wallmounts/switch.rsi
    state: dead
  - type: UseDelay
    delay: 0.5
  - type: DuelReadyButton
  - type: Rotatable
  - type: DeviceNetwork
    deviceNetId: Wireless
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSource
    ports:
      - Pressed
  - type: AutoLinkTransmitter
    channel: DuelStart
  - type: Transform
    anchored: false
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 80
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

# ── Голограмма готовности ────────────────────────────────────────────────────
# Спавнится над бойцом, когда он нажал кнопку готовности; снимается при отмене готовности и при
# старте/конце/сбросе боя (DuelArenaSystem.Ready). Только индикатор — без физики и коллизий.
- type: entity
  id: DuelReadyHologram
  name: голограмма готовности
  suffix: Duel Arena
  categories: [ HideSpawnMenu ]
  description: Голографическая отметка готовности бойца.
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    drawdepth: Overlays
    noRot: true
    sprite: _Wega/Effects/duel_ready.rsi
    layers:
      - state: icon
        shader: unshaded
  - type: PointLight
    radius: 1.5
    energy: 1.2
    color: "#4DFF73"
    castShadows: false

# ── Звуковой эмиттер ─────────────────────────────────────────────────────────

- type: entity
  id: DuelStartSoundEmitter
  parent: MarkerBase
  name: Duel Sound Emitter
  suffix: Duel Arena
  description: Невидимая сущность. Воспроизводит колокол на весь сервер при старте дуэли.
  components:
  - type: Sprite
    layers:
      - state: green
  - type: DeviceLinkSink
    ports:
      - Trigger
  - type: AutoLinkReceiver
    channel: DuelFight
  - type: EmitGlobalSoundOnSignal
    sound:
      path: /Audio/_Wega/Duel/duel_start.ogg
    params:
      volume: 0

# ── Кнопка сброса ────────────────────────────────────────────────────────────

- type: entity
  id: DuelResetButton
  parent: SignalButton
  name: duel reset button
  suffix: Duel Arena
  description: Закрывает барьеры арены после окончания дуэли. Готовит арену к следующему поединку.
  components:
  - type: DeviceLinkSource
    ports:
      - Pressed
    range: 200
  - type: AutoLinkTransmitter
    channel: DuelReset
