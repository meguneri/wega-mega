- type: entity
  parent: BaseAction
  id: ActionTelekinesisGrab
  name: Телекинез — захват
  description: Схватывает живого игрока телекинезом. Цель парализована и роняет оружие. Используй «Бросок» чтобы швырнуть её.
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 20
    sound: !type:SoundPathSpecifier
      path: /Audio/Magic/blink.ogg
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: spell_default
  - type: TargetAction
    range: 8
    checkCanAccess: false
  - type: EntityTargetAction
    whitelist:
      components:
      - MobState
    canTargetSelf: false
    event: !type:TelekinesisGrabSpellEvent
  - type: SpeakOnAction
    sentence: action-speech-spell-telekinesis-grab
  - type: Magic
    requiresClothes: false

- type: entity
  parent: BaseAction
  id: ActionTelekinesisThrow
  name: Телекинез — бросок
  description: Бросает захваченную цель в указанную точку. Сначала используй «Захват».
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 1
    sound: !type:SoundPathSpecifier
      path: /Audio/Effects/gen_hit.ogg
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: repulse
  - type: TargetAction
    range: 20
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:TelekinesisThrowSpellEvent
  - type: SpeakOnAction
    sentence: action-speech-spell-telekinesis-throw
  - type: Magic
    requiresClothes: false
