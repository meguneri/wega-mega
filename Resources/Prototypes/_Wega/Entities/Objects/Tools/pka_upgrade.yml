- type: entity
  id: PKAUpgradeAoE
  parent: BasePKAUpgrade
  name: PKA modkit (aoe)
  components:
  - type: Sprite
    layers:
    - state: base
    - state: overlay-1
      color: "#ec9b2d"
    - state: overlay-2
      color: "#a71010"
    - state: overlay-3
      color: "#eb4c13"
  - type: GunUpgrade
    tags: [ GunUpgradeAoE ]
    examineText: gun-upgrade-examine-text-aoe
  - type: GunUpgradeAoE

- type: entity
  id: PKAUpgradeLifesteal
  parent: BasePKAUpgrade
  name: crystal of vampirism
  components:
  - type: Sprite
    sprite: _Wega/Objects/Tools/upgrade.rsi
    state: modkit_crystal
  - type: GunUpgrade
    tags: [ GunUpgradeLifesteal ]
    examineText: gun-upgrade-examine-text-lifesteal
  - type: GunUpgradeLifesteal
    stealAmount: 2.5
    
- type: entity
  id: PKAUpgradePressure
  parent: BasePKAUpgrade
  name: PKA modkit (pressure)
  components:
  - type: Sprite
    layers:
    - state: base
    - state: overlay-1
      color: "#722ade"
    - state: overlay-2
      color: "#5a0ea1"
    - state: overlay-3
      color: "#622ba1"
  - type: GunUpgrade
    tags: [ GunUpgradePressure ]
    examineText: gun-upgrade-examine-text-pressure
  - type: GunUpgradePressure
