#Empty
- type: entity
  id: JetpackMining
  parent: BaseJetpack
  name: jetpack
  suffix: Empty
  components:
  - type: Sprite
    sprite: _Wega/Objects/Tanks/Jetpacks/mining.rsi
  - type: Item
    sprite: _Wega/Objects/Tanks/Jetpacks/mining.rsi
    size: Huge
  - type: Clothing
    sprite: _Wega/Objects/Tanks/Jetpacks/mining.rsi
    slots:
      - Back
      - suitStorage
  - type: Tag
    tags:
      - Jetpack

# Filled
- type: entity
  id: JetpackMiningFilled
  parent: JetpackMining
  name: jetpack
  suffix: Filled
  components:
  - type: GasTank
    releasePressure: 42.6
    air:
      # 13 minutes of thrust
      volume: 5
      temperature: 293.15
      moles:
        - 1.025689525 # oxygen
        - 1.025689525 # nitrogen

- type: entity
  parent: JetpackBlue
  id: JetpackBlueModule
  name: jetpack
  categories: [ HideSpawnMenu ]
  components:
  - type: GasTank
    toggleAction: null
  - type: Jetpack
    moleUsage: 0

- type: entity
  parent: JetpackSecurity
  id: JetpackSecurityModule
  name: jetpack
  categories: [ HideSpawnMenu ]
  components:
  - type: GasTank
    toggleAction: null
  - type: Jetpack
    acceleration: 2
    weightlessModifier: 2.4
    friction: 0.125
    moleUsage: 0
    
- type: entity
  id: JetpackBlackSyndicate
  parent: BaseJetpack
  name: jetpack
  suffix: Empty
  components:
  - type: Item
    sprite: Objects/Tanks/Jetpacks/black.rsi
  - type: Sprite
    sprite: Objects/Tanks/Jetpacks/black.rsi
  - type: Clothing
    sprite: Objects/Tanks/Jetpacks/black.rsi
    slots:
      - Back
      - suitStorage
  - type: Tag
    tags:
      - Jetpack
  - type: StaticPrice
    price: 2000

- type: entity
  id: JetpackBlackSyndicateFilled
  parent: JetpackBlackSyndicate
  name: jetpack
  suffix: Filled
  components:
  - type: GasTank
    releasePressure: 42.6
    air:
      # 26 minutes of thrust
      volume: 10
      temperature: 293.15
      moles:
        - 2.05 # oxygen
        - 2.05 # nitrogen
