# Incendiary refill for water guns — 2:1 napalm-to-phlogiston: the phlogiston self-ignites on
# contact, the napalm carries the sustained burn and the extra fire stacks. Pour it into a water
# gun's chamber and it sprays self-igniting fire.
- type: entity
  id: ChemistryBottleNapalmPhlogiston
  suffix: napalm + phlogiston
  parent: BaseChemistryBottleFilled
  components:
  - type: Label
    currentLabel: reagent-name-napalm
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 20
        reagents:
        - ReagentId: Napalm
          Quantity: 16
        - ReagentId: Phlogiston
          Quantity: 4
