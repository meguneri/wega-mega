## Security module
- type: entity
  parent: HoloprojectorSecurity
  id: HoloprojectorSecurityMicrowave
  suffix: PowerCellMicroreactor
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMicroreactor
        disableEject: true
        swap: false

- type: entity
  name: makeshift disabler pistol
  parent: BaseItem
  id: WeaponBorgDisabler
  description: Better pray it won't burn your hands off.
  components:
  - type: Gun
    fireRate: 2.5
    selectedMode: Fullauto
    availableModes:
    - Fullauto
    angleDecay: 0
    minAngle: 0
    maxAngle: 0
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
  - type: Item
    sprite: _Wega/Objects/Weapons/Guns/Battery/borggun.rsi
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Battery/borggun.rsi
    layers:
    - state: icon
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatteryAmmoProvider
    proto: BulletDisablerSmg
    fireCost: 40
  - type: BatterySelfRecharger
    autoRechargeRate: 40
    autoRechargePauseTime: 20
  - type: AmmoCounter

- type: entity
  parent: WeaponMeleeNeedle
  id: WeaponMeleeNeedleBorgSec
  name: security damage stick
  description: A specialty weapon used in the destruction of unique syndicate morale-boosting equipment.
  components:
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 15
    bluntStaminaDamageFactor: 1.5
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 0
