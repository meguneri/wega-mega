# SEC Sheild
- type: entity
  name: riot shield borg
  parent: [ BaseShield, BaseSecurityContraband ]
  id: RiotShieldBorg
  description: It s nanomachine, son!
  components:
    - type: ItemSelector
      items:
      - RiotLaserShieldBorg
      - RiotBulletShieldBorg
      - RiotShieldBorg
    - type: StaticPrice
      price: 90
    - type: Blocking
      activeBlockFraction: 0.8
      passiveBlockFraction: 0.7
      passiveBlockModifier:
        coefficients:
          Blunt: 0.7
          Slash: 0.7
      activeBlockModifier:
        coefficients:
          Blunt: 0.8
          Slash: 0.8
        flatReductions:
          Blunt: 5
          Slash: 5
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 10000000000000000000000
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 10000000000000000000000 #This is probably enough damage before it breaks
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                SheetSteel:
                  min: 2
                  max: 2
                SheetGlass:
                  min: 2
                  max: 2
    - type: ActivatableUI
      key: enum.ItemSelectorUiKey.Key
    - type: UserInterface
      interfaces:
        enum.ItemSelectorUiKey.Key:
          type: ItemSelectorBoundUserInterface
    - type: Tag
      tags:
      - Sheild 
      - Itemborg

