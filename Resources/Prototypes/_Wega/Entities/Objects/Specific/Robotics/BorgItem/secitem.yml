# SEC Granader
- type: entity
  name: hand grenade gun
  parent: BaseItem
  id: WeaponHandGranadeGun
  description: Load granade for optimal results.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Battery/borggun.rsi
    layers:
    - state: icon
  - type: Gun
    fireRate: 0.5
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Effects/thunk.ogg
    soundEmpty:
      path: /Audio/Items/hiss.ogg
  - type: Appearance
  - type: BatteryAmmoProvider
    proto: GrenadeStingerProject
    fireCost: 500
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000
  - type: BatterySelfRecharger
    autoRechargeRate: 25
    autoRechargePauseTime: 20
  - type: AmmoCounter
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: GrenadeStingerProject
      fireCost: 500
    - proto: GrenadeFlashBangProject
      fireCost: 250
    - proto: TearGasGrenadeProject
      fireCost: 500


