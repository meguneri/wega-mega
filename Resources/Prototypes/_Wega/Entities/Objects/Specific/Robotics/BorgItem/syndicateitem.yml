- type: entity
  name: mining drill
  parent: BaseItem
  id: SyndicateDrill
  description: Powerful tool used to quickly drill through rocks.
  components:
  - type: Item
    storedRotation: -90
  - type: Tag
    tags:
    - Pickaxe
  - type: Sprite
    sprite: _Wega/Objects/Tools/syndicate_drill.rsi
    state: icon
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -90
    soundHit:
      path: "/Audio/Items/drill_hit.ogg"
    attackRate: 4
    damage:
      types:
        Structural: 75
        Blunt: 12

- type: entity
  parent: BaseItem
  id: BorgWeaponSniperHristovAdvanced
  suffix: Syndiborg
  name: semi-aito Hristov
  description: A portable anti-material rifle. Uses .60 anti-material ammo upgraded by gorlax marodeurs.
  components:
  - type: Item
    size: Huge
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Snipers/new_hristov.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Gun
    minAngle: 0
    maxAngle: 0
    fireRate: 0.7
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CartridgePistol
    capacity: 6
    proto: CartridgeAntiMateriel
    cycleable: false # No synthesizing ammo for your syndicate masters.
  - type: BallisticAmmoSelfRefiller
    autoRefillRate: 20s
    affectedByEmp: true
  - type: AmmoCounter
  - type: Appearance
  - type: StaticPrice
    price: 5000

