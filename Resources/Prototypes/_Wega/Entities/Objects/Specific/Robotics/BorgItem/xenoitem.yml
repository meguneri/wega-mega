- type: entity
  parent: BaseItem
  id: BorgGeneratorNanopastXenoborg
  name: nanopast generator
  description: Tastes like cardboard.
  components:
  - type: UseDelay
    delay: 120
  - type: Sprite
    sprite: Structures/Wallmounts/air_monitors_xeno.rsi
