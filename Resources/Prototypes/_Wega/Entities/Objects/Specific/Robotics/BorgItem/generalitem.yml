## Common repeir
- type: entity
  parent: BaseItem
  id: RepeirModeDevice
  name: repeir mode device
  description: A device that allows go speed.
  components:
  - type: Sprite
    sprite: Objects/Specific/Research/anomalyscanner.rsi
    state: icon
  - type: ItemToggle
  - type: ComponentToggler
    parent: true
    components:
    - type: PassiveDamage
      allowedStates:
      - Alive
      - Critical
      - Dead
      damage:
        types:
          Blunt: -1
          Slash: -1
          Piercing: -1
          Heat: -1.5
  - type: PowerCellDraw
    drawRate: 72 # 10 seconds
  - type: ToggleCellDraw
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmallNuclear
        disableEject: true
        swap: false

- type: entity
  parent: BaseItem
  id: BorgGeneratorNanopast
  name: nanopast generator
  description: Tastes like cardboard.
  components:
  - type: UseDelay
    delay: 60
  - type: Sprite
    sprite: Structures/Wallmounts/air_monitors_xeno.rsi
    layers:
    - state: fire_b1
  - type: Item
    size: Tiny
  - type: SpawnItemsOnUse
    uses: 100000
    items:
      - id: Nanopast1
    sound:
      path: /Audio/Machines/phasein.ogg

# Common fight
- type: entity
  parent: WeaponMeleeNeedle
  id: WeaponMeleeNeedleBorg
  name: security damage stick
  description: A specialty weapon used in the destruction of unique syndicate morale-boosting equipment.
  components:
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 10
    bluntStaminaDamageFactor: 1.5
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 0

# Common mining
- type: entity
  name: pickaxe
  parent: BaseItem
  id: PickaxeBorg
  description: Notched to perfection, for jamming it into rocks.
  components:
  - type: Tag
    tags:
    - Pickaxe
  - type: Sprite
    sprite: Objects/Weapons/Melee/pickaxe.rsi
    state: pickaxe
  - type: MeleeWeapon
    attackRate: 0.7
    wideAnimationRotation: -135
    soundHit:
      path: "/Audio/Weapons/smash.ogg"
      params:
        volume: -3
    damage:
      types:
        Structural: 30
        Blunt: 10
  - type: Item
    size: Normal
    shape:
    - 0,0,2,0
    - 1,1,1,2
    sprite: Objects/Weapons/Melee/pickaxe.rsi
    storedRotation: -45
  - type: UseDelay
  - type: PhysicalComposition
    materialComposition:
      Steel: 100
      Wood: 100

