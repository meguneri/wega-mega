- type: entity
  parent: BaseItem
  id: ModuleCommand
  name: Module support
  description: "An obsidian rod that strikes paranormal things."
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: command
  - type: Item
    size: Small
  - type: ItemSelector
    items:
    - BorgModuleCommonHand
    - BorgModuleSecRare
    - BorgModuleCargoRare
    - BorgModuleEngenerRare
    - BorgModuleCleanerRare
    - BorgModuleMedicalRare
    - BorgModuleServiceRare
    - BorgModuleScienceRND
  - type: ActivatableUI
    key: enum.ItemSelectorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ItemSelectorUiKey.Key:
        type: ItemSelectorBoundUserInterface


