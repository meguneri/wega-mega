- type: entity
  parent: DrinkBase
  id: BorgDrinkSolutionWaterCommon
  name: water generation
  suffix: Water
  description: The trusty mixing buddy of the bartender.
  components:
  - type: Sprite
    sprite: /Textures/_Wega/Objects/Specific/Robotics/BorgItem/solition_generation.rsi
    layers:
    - state: icon
    - state: water
  - type: Label
    currentLabel: reagent-name-water
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: Water
          Quantity: 0
  - type: FitsInDispenser
    solution: drink
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: Water
        Quantity: 1

