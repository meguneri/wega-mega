## Common Speed
- type: entity
  parent: BaseItem
  id: SpeedModeDevice
  name: speed mode device
  description: A device that allows go speed.
  components:
  - type: Sprite
    sprite: Objects/Specific/Research/anomalyscanner.rsi
    state: icon
  - type: ItemToggle
  - type: ComponentToggler
    parent: true
    components:
    - type: SpeedUpGen
  - type: PowerCellDraw
    drawRate: 50.4 # 25 seconds
  - type: ToggleCellDraw
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmallNuclear
        disableEject: true
        swap: false

