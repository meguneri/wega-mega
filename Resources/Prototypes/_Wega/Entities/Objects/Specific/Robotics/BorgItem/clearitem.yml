- type: entity
  parent: [SolutionMopLarge,BaseItem]
  name: mop
  id: BorgMopItem
  suffix: Cyborg
  description: A mop that can't be stopped, viscera cleanup detail awaits.
  components:
  - type: Sprite
    sprite: Objects/Specific/Janitorial/mop.rsi
    layers:
      - state: mop
      - map: ["enum.SolutionContainerLayers.Fill"]
        state: fill-3
        visible: false
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 3
    fillBaseName: fill-
    inHandsFillBaseName: -fill-
    inHandsMaxFillLevels: 2
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 10
    soundHit:
      collection: MetalThud
  - type: Spillable
    solution: absorbed
    spillWhenThrown: false
    preventMelee: false
  - type: DrainableSolution
    solution: absorbed
  - type: Item
    size: Large
    sprite: Objects/Specific/Janitorial/mop.rsi
  - type: Absorbent
    useAbsorberSolution: true
  - type: SolutionContainerManager
    solutions:
      absorbed:
        maxVol: 100
  - type: UseDelay
    delay: 1
  - type: PhysicalComposition
    materialComposition:
      Plastic: 50
  - type: Tag
    tags:
      - Mop
      - MopBasic
  - type: GuideHelp
    guides:
    - Janitorial
  - type: DnaSubstanceTrace

- type: entity
  parent: BorgMopItem
  name: advanced mop
  id: BorgAdvMopItem
  description: Motorized mop that has a bigger reservoir and quickly replaces reagents inside with water. Automatic Clown Countermeasure not included.
  components:
    - type: Sprite
      sprite: Objects/Specific/Janitorial/advmop.rsi
      layers:
      - state: advmop
      - map: ["enum.SolutionContainerLayers.Fill"]
        state: fill-2
        visible: false
    - type: SolutionContainerVisuals
      maxFillLevels: 2
    - type: Item
      sprite: Objects/Specific/Janitorial/advmop.rsi
    - type: Absorbent
      pickupAmount: 100
    - type: SolutionRegeneration
      generated:
        reagents:
        - ReagentId: Water
          Quantity: 5
    - type: SolutionPurge
      preserve:
      - Water
      quantity: 10
    - type: Tag
      tags:
        - Mop
        - MopAdv
# Ubor rare
- type: entity
  parent: LightReplacer
  id: LightReplacerBorg
  suffix: Borg
  components:
  - type: LightReplacer
    contents:
    - id: LightTube
      amount: 1000
    - id: LightBulb
      amount: 1000

- type: entity
  name: hydra borg
  id: WeaponHydraBorg
  parent: BaseItem
  description: A L6 SAW for use by cyborgs. Creates .30 rifle ammo on the fly from an internal ammo fabricator, which slowly self-charges.
  components:
    - type: Gun
      fireRate: 1
      selectedMode: SemiAuto
      availableModes:
      - SemiAuto
      soundGunshot:
        path: /Audio/Weapons/Guns/Gunshots/grenade_launcher.ogg
    - type: Sprite
      sprite: Objects/Weapons/Guns/Launchers/hydra_launcher.rsi
      layers:
      - state: icon
        map: [ "enum.GunVisualLayers.Base" ]
    - type: Item
      size: Huge
    - type: ContainerContainer
      containers:
        ballistic-ammo: !type:Container
    - type: BallisticAmmoProvider
      capacity: 5
      proto: BulletGrenadeCleanade
      cycleable: false
    - type: BallisticAmmoSelfRefiller
      autoRefillRate: 15
      affectedByEmp: true
    - type: AmmoCounter
