# Jump Leg

- type: entity
  id: LegSyntheticJump
  parent: [ LegSyntheticImplant ]
  name: "jump leg"
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Android/parts.rsi
    state: jump_leg
  - type: BodyPartImplant
    key: jump
    implantComponents:
