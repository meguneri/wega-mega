- type: entity
  name: "android body part"
  description: "Universal body part for android repair. Use a screwdriver to change the type."
  parent: BaseItem
  id: AndroidBodyPart
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Android/parts.rsi
    state: module_part
  - type: Construction
    graph: AndroidBodyPart
    node: start
  - type: Tag
    tags:
    - AndroidPart

- type: entity
  id: ArmSyntheticImplant
  parent: [ OrganAndroidArmLeft ]
  abstract: true
  components:
  - type: BodyPartImplant
    configurations:
      arm-left:
      - type: Organ
        category: ArmLeft
      - type: VisualOrgan
        layer: enum.HumanoidVisualLayers.LArm
        data:
          state: l_arm
      - type: VisualOrganMarkings
        markingData:
          group: Android
          layers:
          - LArm
      - type: Tag
        tags:
        - BaseBodyPart
        - LeftArmSynthetic
      arm-right: 
      - type: Organ
        category: ArmRight
      - type: VisualOrgan
        layer: enum.HumanoidVisualLayers.RArm
        data:
          state: r_arm
      - type: VisualOrganMarkings
        markingData:
          group: Android
          layers:
          - RArm
      - type: Tag
        tags:
        - BaseBodyPart
        - RightArmSynthetic

- type: entity
  id: LegSyntheticImplant
  parent: [ OrganAndroidLegLeft ]
  abstract: true  
  components:
  - type: BodyPartImplant
    configurations:
      leg-left:
      - type: Organ
        category: LegLeft
      - type: VisualOrgan
        layer: enum.HumanoidVisualLayers.LLeg
        data:
          state: l_leg
      - type: VisualOrganMarkings
        markingData:
          group: Android
          layers:
          - LLeg
      - type: Tag
        tags:
        - BaseBodyPart
        - LeftLegSynthetic
      leg-right: 
      - type: Organ
        category: LegRight
      - type: VisualOrgan
        layer: enum.HumanoidVisualLayers.RLeg
        data:
          state: r_leg
      - type: VisualOrganMarkings
        markingData:
          group: Android
          layers:
          - RLeg
      - type: Tag
        tags:
        - BaseBodyPart
        - RightLegSynthetic

# Pry Arm

- type: entity
  id: ArmSyntheticPry
  parent: [ ArmSyntheticImplant ]
  name: "hydraulic arm"
  description: "A powerful hydraulic arm for opening powered airlocks. Use a screwdriver to change it symmetry."
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Android/parts.rsi
    state: pry_arm
  - type: BodyPartImplant
    key: pry
    implantComponents:
      - type: Tool
        qualities:
          - Prying
      - type: Prying
        pryPowered: !type:Bool
          true
        force: !type:Bool
          true
        useSound:
          path: /Audio/Items/jaws_pry.ogg
        speedModifier: 1

# Defib Arm

- type: entity
  id: ArmSyntheticDefib
  parent: [ ArmSyntheticImplant ]
  name: "defibrillator arm"
  description: "An arm with a built-in defibrillator! Use a screwdriver to change it symmetry."
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Android/parts.rsi
    state: defib_arm
  - type: BodyPartImplant
    key: defib
    implantComponents:
      - type: ExtendHandItemImplant
        items:
          - prototype: DefibrillatorArmImplant
            toggleAction: ActionToggleBodyPartImplantDefib

- type: entity
  id: DefibrillatorArmImplant
  name: "build-in defibrillator"
  parent: [ BaseDefibrillator ]
  categories: [ HideSpawnMenu ]

# Proto-kinetic Arm

- type: entity
  id: ArmSyntheticProtoKinetic
  parent: [ ArmSyntheticImplant ]
  name: "proto-kinetic arm"
  description: "Turn your hand into Proto-kinetic accelerator. Now it is left, use a screwdriver to change it."
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Species/Android/parts.rsi
    state: kinetic_arm
  - type: BodyPartImplant
    key: protokinetic
    implantComponents:
      - type: ExtendHandItemImplant
        items:
          - prototype: WeaponArmProtoKinetic
            toggleAction: ActionToggleBodyPartImplantKinetic

- type: entity
  id: WeaponArmProtoKinetic
  name: "build-in proto-kinetic accelerator"
  description: "Fires low-damage kinetic bolts at a short range."
  parent: BaseItem
  categories: [ HideSpawnMenu ]
  components:
  - type: Unremoveable
  - type: Sprite
    sprite: Objects/Weapons/Guns/Basic/kinetic_accelerator.rsi
    layers:
    - state: icon
    - state: animation-icon
      visible: false
      map: [ "empty-icon" ]
  - type: Item
    sprite: Objects/Weapons/Guns/Basic/kinetic_accelerator.rsi
  - type: Gun
    fireRate: 0.5
    selectedMode: SemiAuto
    angleDecay: 10
    minAngle: -5
    maxAngle: 5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/kinetic_accel.ogg
  - type: AmmoCounter
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AmmoVisuals.HasAmmo:
        empty-icon:
          True: { visible: False }
          False: { visible: True }
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 1.0
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/kinetic_reload.ogg
  - type: BasicEntityAmmoProvider
    proto: BulletKinetic
    capacity: 1
    count: 1

# # Charger arm

- type: entity
