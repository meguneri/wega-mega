        - id: EmergencyMedipen
        - id: Bloodpack

# Berserker kit — pure aggression: a hyperzine stim, a combat medipen and brute + burn injectors. Stay on the offensive.
- type: entity
  parent: MedkitCombat
  id: ArenaSurvivalBerserkerKit
  suffix: Arena
  name: berserker stim kit
  description: "An aggressive first-aid kit: a hyperzine stim, a combat medipen and brute and burn injectors. Stay on the offensive."
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: Stimpack
        - id: CombatMedipen
        - id: BruteAutoInjector
        - id: BurnAutoInjector

