# Field medic kit — covers every damage type: brute, burn, puncture and pyrazine injectors.
- type: entity
  parent: MedkitAdvanced
  id: ArenaSurvivalFieldKit
  suffix: Arena
  name: field medic kit
  description: "An all-rounder kit with one injector for each damage type: brute, burn, puncture and pyrazine."
  components:
  - type: EntityTableContainerFill
