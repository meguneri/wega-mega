# Wega arena — themed first-aid kits for the Full Arsenal pool. Real medkit containers (not wrapped
# presents): the fighter opens the kit and pulls items out. Each kit is themed for a damage profile.

# Trauma kit — for melee duelists: brute + puncture injectors, a brutepack and a tourniquet.
- type: entity
  parent: MedkitBrute
  id: ArenaSurvivalTraumaKit
  suffix: Arena
  name: trauma treatment kit
  description: "A first-aid kit for close-quarters wounds: brute and puncture injectors, a brutepack and a tourniquet."
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: BruteAutoInjector
        - id: PunctAutoInjector
        - id: Brutepack
        - id: Tourniquet

# Burn kit — for energy/fire fights: burn + pyrazine injectors, ointment and an emergency medipen.
- type: entity
  parent: MedkitBurn
  id: ArenaSurvivalBurnKit
  suffix: Arena
  name: burn treatment kit
  description: "A first-aid kit for energy and fire wounds: burn and pyrazine injectors, ointment and an emergency medipen."
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: BurnAutoInjector
        - id: PyraAutoInjector
        - id: Ointment
        - id: EmergencyMedipen

# Detox kit — for chem/poison fights: anti-poison medipen, rad injector, an emergency medipen and a bloodpack.
- type: entity
  parent: MedkitToxin
  id: ArenaSurvivalDetoxKit
