  name: detox treatment kit
  description: "A first-aid kit for poison and radiation: anti-poison medipen, rad injector, an emergency medipen and a bloodpack."
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
