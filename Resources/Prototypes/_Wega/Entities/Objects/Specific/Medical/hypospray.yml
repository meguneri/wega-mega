- type: entity
  name: hynospray
  parent: [BaseHypospray, SolutionHyposprayTiny]
  description: A variation of hypospray, having reduced parameters of the measurement volume, drug administration and an increased parameter of transferring liquid to the administration mode.
  id: Hynospray
  components:
  - type: Sprite
    sprite: /Textures/_Wega/Objects/Specific/Medical/hyno.rsi
    state: hyno
  - type: Item
    sprite: /Textures/_Wega/Objects/Specific/Medical/hyno.rsi
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
  - type: UseDelay
    delay: 4.5
  - type: Solution
    solution:
      maxVol: 10

- type: entity
  name: chemical injector
  parent: [ChemicalMedipen, BaseSyndicateContraband]
  id: StimpackEmpty
  suffix: Empty
  components:
  - type: Item
    inhandVisuals:
      left:
      - state: base-needle-inhand-left
      - state: base-colorA-inhand-left
        color: "#9a040e"
      - state: base-colorB-inhand-left
        color: "#c62933"
      right:
      - state: base-needle-inhand-right
      - state: base-colorA-inhand-right
        color: "#9a040e"
      - state: base-colorB-inhand-right
        color: "#c62933"
  - type: Sprite
    sprite: Objects/Specific/Medical/medipen.rsi
    layers:
    - state: stimpen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 30
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: stimpen_empty
  - type: Injector
    solutionName: pen

- type: entity
  parent: ChemicalMedipen
  id: SurvivalMedipen
  name: survival medipen
  description: "A cocktail of powerful healing chemicals. Contains everything you need to get out on your own in an emergency. Using more than one at a time can be dangerous!"
  components:
  - type: Sprite
    sprite: /Textures/_Wega/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: bluepen
      map: [ "enum.SolutionContainerLayers.Fill" ]
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: bluepen_empty
  - type: Solution
    solution:
      reagents:
      - ReagentId: Leporazine
        Quantity: 10
      - ReagentId: LavalandSerum
        Quantity: 15
      - ReagentId: Epinephrine
        Quantity: 10
      - ReagentId: Omnizine
        Quantity: 5
  - type: Injector
    solutionName: pen
    currentTransferAmount: null
    activeModeProtoId: HyposprayInjectMode
    allowedModes:
    - HyposprayInjectMode

- type: entity
  name: stimpank
  parent: ChemicalMedipen
  id: Ertpen
  components:
  - type: Item
    sprite: /Textures/_Wega/Objects/Specific/Medical/medipen.rsi
    inhandVisuals:
      left:
      - state: base-needle-inhand-left
      - state: base-colorA-inhand-left
        color: "#7078E1"
      - state: base-colorB-inhand-left
      right:
      - state: base-needle-inhand-right
      - state: base-colorA-inhand-right
        color: "#7078E1"
      - state: base-colorB-inhand-right
  - type: Sprite
    sprite: /Textures/_Wega/Objects/Specific/Medical/medipen.rsi
    layers:
    - state: ertpen
      map: ["enum.SolutionContainerLayers.Fill"]
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: ertpen_empty
  - type: Solution
    solution:
      reagents:
      - ReagentId: Stimulants
        Quantity: 30
  - type: Injector
    solutionName: pen
    currentTransferAmount: null
    activeModeProtoId: HyposprayInjectMode
    allowedModes:
    - HyposprayInjectMode
  - type: StaticPrice
    price: 1500
