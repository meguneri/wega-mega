  id: ConstructionBag
  name: сonstruction bag
  components:
  - type: Sprite
    sprite: _Wega/Objects/Devices/construction_bag.rsi
    state: icon
  - type: Item
    size: Ginormous
    storedRotation: -90
  - type: Clothing
    quickEquip: false
    slots:
    - belt
  - type: Storage
    grid:
    - 0,0,7,5
    maxItemSize: Normal
    quickInsert: true
