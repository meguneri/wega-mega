- type: entity
  name: Donksoft SMG
  parent: BaseWeaponSubMachineGun
  id: WeaponSubMachineGunDonksoft
  description: A toy submachine gun that strongly resembles the C-20R, which is often used by the infamous nuclear operatives. Uses .35 auto.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/SMGs/donksoft_smg.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Guns/SMGs/donksoft_smg.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -11
    maxAngle: -7
  - type: Gun
    minAngle: 17
    maxAngle: 22
    shotsPerBurst: 5
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/c-20r.ogg
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGunFoam
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolSubMachineGunFoam
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistolFoam
        priority: 1
        whitelist:
          tags:
            - CartridgePistolFoam

- type: entity
  name: berkut
  parent: BaseWeaponRifle
  id: WeaponSubmachinegunBerkut
  description: Automatic SMG military class.
  components:
  - type: Sprite
    sprite:  _Wega/Objects/Weapons/Guns/SMGs/berkut.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite:  _Wega/Objects/Weapons/Guns/SMGs/berkut.rsi
  - type: Item
    size: Large
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -21
  - type: Gun
    minAngle: 24
    maxAngle: 38
    angleIncrease: 2.5
    angleDecay: 2.5
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    fireRate: 6.8
    projectileSpeed: 40
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
  - type: ChamberMagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGun
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolSubMachineGun
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

# Override: SIAR-52 fixed to use caseless magazines (MagazineCaselessRifle tag)
- type: entity
  parent: WeaponSIAR52
  id: WeaponSIAR52Arena
  suffix: Arena, caseless mag
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGunCaselessExtended
        insertSound: /Audio/Weapons/Guns/MagIn/lmg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/lmg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineCaselessRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeCaselessRifle
        priority: 1
        whitelist:
          tags:
          - CartridgeCaselessRifle
  - type: MagazineVisuals
    magState: mag
    steps: 8
    zeroVisible: false

# Override: universal magazine connector — accepts all pistol-calibre magazines
- type: entity
  parent: WeaponAJ100
  id: WeaponAJ100Universal
  suffix: Universal mag
  description: >-
    Высокоскоростной пистолет-пулемёт, оснащённый универсальным разъёмом для
    широкого спектра магазинов пистолетного калибра. Совместим с патронами
    .35 auto: стандартными пистолетными, высокоёмкими, SMG, P90 и MP7.
    Не принимает магазины под дробовик, пулемёт, магнум или снайперский калибр.
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGun
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazinePistolSubMachineGun
          - MagazinePistolSubMachineGunTopMounted
          - MagazinePistolCaselessRifle
          - MagazinePistolSubMachineGunFoam
          - MagazineSMGPPSH
          - MagazineMP7
          - MagazineP90

# Full Arsenal variant — same universal connector, magazine randomised on spawn
- type: entity
  parent: WeaponAJ100Universal
  id: WeaponAJ100Arena
  suffix: Arena, random mag
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazinePistolSubMachineGun
          - MagazinePistolSubMachineGunTopMounted
          - MagazinePistolCaselessRifle
          - MagazinePistolSubMachineGunFoam
          - MagazineSMGPPSH
          - MagazineMP7
          - MagazineP90
  - type: RandomMagazine
    magazines:
    - MagazinePistol
    - MagazinePistolHighCapacity
    - MagazinePistolSubMachineGun
    - MagazinePistolSubMachineGunTopMounted
    - MagazineSMGPPSH
    - MagazineMP7
    - MagazineP90
