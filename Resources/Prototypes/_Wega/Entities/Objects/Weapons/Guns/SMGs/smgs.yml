- type: entity
  name: Donksoft SMG
  parent: BaseWeaponSubMachineGun
  id: WeaponSubMachineGunDonksoft
  description: A toy submachine gun that strongly resembles the C-20R, which is often used by the infamous nuclear operatives. Uses .35 auto.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/SMGs/donksoft_smg.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Guns/SMGs/donksoft_smg.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -11
    maxAngle: -7
  - type: Gun
    minAngle: 17
    maxAngle: 22
    shotsPerBurst: 5
    availableModes:
    - SemiAuto
    - Burst
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/c-20r.ogg
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Appearance
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGunFoam
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolSubMachineGunFoam
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistolFoam
        priority: 1
        whitelist:
          tags:
            - CartridgePistolFoam

- type: entity
  name: berkut
  parent: BaseWeaponRifle
  id: WeaponSubmachinegunBerkut
  description: Automatic SMG military class.
  components:
  - type: Sprite
    sprite:  _Wega/Objects/Weapons/Guns/SMGs/berkut.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite:  _Wega/Objects/Weapons/Guns/SMGs/berkut.rsi
  - type: Item
    size: Large
  - type: GunWieldBonus
    minAngle: -19
    maxAngle: -21
  - type: Gun
    minAngle: 24
    maxAngle: 38
    angleIncrease: 2.5
    angleDecay: 2.5
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    fireRate: 6.8
    projectileSpeed: 40
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
  - type: ChamberMagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGun
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistolSubMachineGun
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

# SIAR-52 SMG (arena): caseless magazines (MagazineCaselessRifle tag). Self-contained —
# the non-arena WeaponSIAR52 was removed, so all components are inlined here. The iar_52.rsi
# only ships a single mag-0 state, so MagazineVisuals stays at steps: 1 / zeroVisible: true.
- type: entity
  name: SIAR-52 SMG
  parent: BaseWeaponSubMachineGun
  id: WeaponSIAR52Arena
  suffix: Arena, caseless mag
  description: A high rate of fire weapon, equipped with integrated silencer.
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,3,1
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/SMGs/iar_52.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/SMGs/iar_52.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -4
    maxAngle: -22
  - type: Gun
    minAngle: 7
    maxAngle: 66
    angleIncrease: 2
    angleDecay: 22
    fireRate: 7
    selectedMode: FullAuto
    soundGunshot:
      collection: usp # SUNRISE new gun sounds
      params:
        volume: 10
    availableModes:
    - FullAuto
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolSubMachineGunCaselessExtended
        insertSound: /Audio/Weapons/Guns/MagIn/lmg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/lmg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineCaselessRifle
      gun_chamber:
        name: Chamber
        startingItem: CartridgeCaselessRifle
        priority: 1
        whitelist:
          tags:
          - CartridgeCaselessRifle
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance

# Full Arsenal AJ-100 — self-contained arena SMG with a universal magazine connector that also takes
# .20 / .30 rifle mags; its magazine is randomised on spawn. The non-arena base/Universal variants were
# removed, so everything is inlined here.
- type: entity
  name: AJ-100
  parent: BaseWeaponSubMachineGun
  id: WeaponAJ100Arena
  suffix: Arena, random mag
  description: >-
    Высокоскоростной пистолет-пулемёт, оснащённый универсальным разъёмом для
    широкого спектра магазинов пистолетного калибра. Совместим с патронами
    .35 auto: стандартными пистолетными, высокоёмкими, SMG, P90 и MP7, а также
    с винтовочными магазинами .20 и .30. Не принимает магазины под дробовик,
    пулемёт, магнум или снайперский калибр.
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,3,1
  - type: Sprite
    sprite: _Sunrise/Objects/Weapons/Guns/SMGs/aj_100.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Sunrise/Objects/Weapons/Guns/SMGs/aj_100.rsi
  - type: Wieldable
    unwieldOnUse: false
  - type: GunWieldBonus
    minAngle: -3
    maxAngle: -25
  - type: Gun
    minAngle: 6
    maxAngle: 45
    angleIncrease: 2.5
    angleDecay: 18
    fireRate: 6
    selectedMode: FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
    availableModes:
    - FullAuto
  - type: ChamberMagazineAmmoProvider
    autoEject: true
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistol
          - MagazinePistolHighCapacity
          - MagazinePistolSubMachineGun
          - MagazinePistolSubMachineGunTopMounted
          - MagazinePistolCaselessRifle
          - MagazinePistolSubMachineGunFoam
          - MagazineSMGPPSH
          - MagazineMP7
          - MagazineP90
          - MagazineRifle      # .20 винтовочные
          - MagazineLightRifle # .30 винтовочные
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
          - CartridgePistol
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: RandomMagazine
    magazines:
    - MagazinePistol
    - MagazinePistolHighCapacity
    - MagazinePistolSubMachineGun
    - MagazinePistolSubMachineGunTopMounted
    - MagazinePistolSubMachineGunPPSHExtended
    - MagazineMP7
    - MagazineP90
