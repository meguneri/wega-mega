# Special anti-materiel cartridges — ported from lust-station/_Sunrise
# These extend the base CartridgeAntiMateriel with special projectile types.

- type: entity
  parent: CartridgeAntiMateriel
  id: CartridgeAntiMaterielFrag
  name: cartridge (15mm frag)
  components:
  - type: CartridgeAmmo
    proto: BulletAntiMaterielFrag
  - type: Sprite
    layers:
    - state: base
      map: [ "enum.AmmoVisualLayers.Base" ]

