# ── Hristov magazine ─────────────────────────────────────────────────────────

- type: entity
  id: MagazineHristovAdvanced
  name: Hristov Magazine (.60 antimaterial)
  parent: BaseItem
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeAntiMateriel
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeAntiMateriel
    capacity: 8
    soundRack:
      path: /Audio/Corvax/Weapons/Guns/Cock/shotgun_cock.ogg # Corvax-Guns
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Ammunition/Magazine/Sniper/snipers.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: Tag
    tags:
    - MagazineHristov
