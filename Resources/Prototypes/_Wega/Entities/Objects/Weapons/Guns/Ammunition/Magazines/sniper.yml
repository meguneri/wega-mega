# ── Bauer127 magazines ── ported from lust-station/_Sunrise ──────────────────

- type: entity
  id: BaseMagazineBauer127
  name: magazine (15mm anti-materiel)
  description: A large magazine for a heavy weapon, holds 15x115mm anti-materiel rounds.
  parent: [ BaseItem, BaseMajorContraband ]
  abstract: true
  components:
  - type: Sprite
    netsync: false
    sprite: _Sunrise/Objects/Weapons/Guns/Ammunition/Magazines/Rifle/sr127_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-6
  - type: Tag
    tags:
      - MagazineBauer127
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CartridgeAntiMateriel
    capacity: 7
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: MagazineVisuals
    magState: mag
    steps: 7
    zeroVisible: false
  - type: Appearance

- type: entity
  id: MagazineBauer127
  name: magazine (15mm anti-materiel)
  description: A large magazine for a heavy weapon, holds 15x115mm anti-materiel rounds.
  parent: BaseMagazineBauer127
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeAntiMateriel
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-6
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag

- type: entity
  id: MagazineBauer127Large
  name: large magazine (15mm anti-materiel)
  parent: MagazineBauer127
  components:
  - type: Sprite
    scale: 1,1.5
    sprite: _Sunrise/Objects/Weapons/Guns/Ammunition/Magazines/Rifle/sr127_mag.rsi
  - type: BallisticAmmoProvider
    proto: CartridgeAntiMateriel
    capacity: 21

- type: entity
  id: MagazineBauer127Penetrator
  name: magazine (15mm penetrator)
  parent: BaseMagazineBauer127
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeAntiMaterielPenetrator
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-6
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#9b0000"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#9b0000"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#9b0000"

- type: entity
