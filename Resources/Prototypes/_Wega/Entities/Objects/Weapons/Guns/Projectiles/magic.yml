- type: entity
  parent: BaseBullet
  id: ProjectileBloodBolt
  name: ""
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: blood_bolt
  - type: Projectile
    damage:
      types:
        Blunt: 21
  - type: SolutionContainerManager
    solutions:
      bolt:
        maxVol: 2
        reagents:
        - ReagentId: HemorrhinolBloodCult
          Quantity: 2
  - type: SolutionInjectOnProjectileHit
    transferAmount: 2
    solution: bolt

- type: entity
  parent: BaseBullet
  id: BulletMagmaCharge
  name: charge bolt
  description: Marks a target for additional damage.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
      - state: magmabolt
        shader: unshaded
  - type: DamageMarkerOnCollide
    whitelist:
      components:
        - MobState
    damage:
      types:
        Blunt: 20
        Slash: 5
  - type: ProjectilePressure # Corvax-Wega-Lavaland
  - type: GatheringProjectile
    amount: 4
  - type: Projectile
    deleteOnCollide: false
    impactEffect: BulletImpactEffectKinetic
    damage:
      types:
        Blunt: 0
        Structural: 50
  - type: TimedDespawn
    lifetime: 0.4

- type: entity
  parent: BaseBullet
  id: ProjectileSpellStaff
  name: ""
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: lavastaff
  - type: Projectile
    damage:
      types:
        Slash: 15

- type: entity
  id: ProjectileAnomalyFireballMax
  name: fireball
  description: Hovering blob of flame.
  parent: ProjectileFireball
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 30
  - type: Explosive
    explosionType: Default
    maxIntensity: 1
    intensitySlope: 0.1
    totalIntensity: 0.9
    maxTileBreak: 0

- type: entity
  id: ProjectilePolyboltLightPerson
  parent: ProjectilePolyboltBase
  name: lightperson polybolt
  description: Nooo, I don't wanna be lightperson!
  categories: [ HideSpawnMenu ]
  components:
  - type: PolymorphOnTrigger
    polymorph: ArtifactLuminous
  - type: WhitelistTriggerCondition
    userWhitelist:
      components:
      - MobState

- type: entity
  parent: BaseBullet
  id: ProjectileInfectedTrophy
  name: ""
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/magic.rsi
    layers:
    - state: skull
  - type: ProjectileInfect
    infection: VampireGraveFever
  - type: ProjectileAoE
    damageRadius: 1
    damageMultiplier: 1
  - type: Projectile
    ignoreResistances: true
    ignoreTargeted: true
    damage:
      types:
        Blunt: 5
  - type: TimedDespawn
    lifetime: 0.175
