- type: entity
  name: laser bolt
  id: BulletLaserAdvanced
  parent: BulletLaser
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    impactEffect: BulletImpactEffectOrangeDisabler
    damage:
      types:
        Heat: 17
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - Opaque

- type: entity
  parent: BasicHitscan
  id: LaserStun
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanStaminaDamage
    staminaDamage: 33
  - type: HitscanBasicDamage
    damage:
      types:
        Shock: 1
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: muzzle_blue
    travelFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: beam_blue
    impactFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: impact_blue

- type: entity
  parent: Pulse
  id: IonScan
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Shock: 25
  - type: HitscanEMP
    range: 0.25
    energyConsumption: 1800
  - type: HitscanReflect
    reflectiveType: None

- type: entity
  name: pulsar shot
  id: PulsarProjectile
  parent: BulletLaser
  components:
  - type: Reflective
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Projectiles/projectilepulsar.rsi
    layers:
    - state: magnum_piercing
      shader: unshaded
  - type: Ammo
  - type: Projectile
    impactEffect: BulletImpactEffectWhite
    damage:
      types:
        Heat: 26
    soundHit:
      path: "/Audio/Weapons/Guns/Hits/laser_sear_wall.ogg"
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - Opaque
  - type: PointLight
    radius: 1.5
    energy: 4.6
    color: "#ffffff"

- type: entity
  name: pulse bolt
  id: BulletPulse
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Reflective
    reflective:
    - Energy
  - type: FlyBySound
    sound:
      collection: EnergyMiss
      params:
        volume: 5
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles_tg.rsi
    layers:
    - state: omnilaser
      shader: unshaded
  - type: Physics
  - type: Ammo
  - type: Projectile
    impactEffect: BulletImpactEffectDisabler
    damage:
      types:
        Heat: 21

- type: entity
  id: BulletPulseSpread
  categories: [ HideSpawnMenu ]
  parent: BulletPulse
  components:
  - type: ProjectileSpread
    proto: BulletPulse
    count: 6
    spread: 10
    
- type: entity
  parent: BasicHitscan
  id: PulseSniper
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 90
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: muzzle_blue
    travelFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: beam_blue
    impactFlash:
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: impact_blue

# Large crossbow bolt — ported from lust-station/_Sunrise
- type: entity
  id: EnergyCrossbowBoltLarge
  categories: [ HideSpawnMenu ]
  name: energy bolt
  description: This'll hurt.
  components:
  - type: Reflective
    reflective:
    - NonEnergy
  - type: Ammo
    muzzleFlash: null
  - type: Sprite
    sprite: Objects/Weapons/Guns/Projectiles/projectiles2.rsi
    layers:
    - state: crossbowbolt
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 2
  - type: StunOnCollide
    stunAmount: 0
    knockdownAmount: 2.5
    slowdownAmount: 2.5
    walkSpeedModifier: 0.2
    sprintSpeedModifier: 0.2
    drop: false
  - type: StaminaDamageOnCollide
    damage: 45