# Wega arena — archer kits for the Full Arsenal pool.
# Each kit is a ready-to-use duffel bag (no gift wrapping), tinted to match its
# theme so they're easy to tell apart in the pool.

# Arena arrow: holds and injects 4u instead of the vanilla 2u, so a single
# dipped hit delivers a meaningful dose. Vanilla arrows have a 2u melee
# solution, which made dose-dependent reagents (aphrodisiac, nocturine) never
# accumulate fast enough to matter. Only used by the arena archer kits.
- type: entity
  parent: ArrowRegular
  id: ArenaArrowRegular
  suffix: arena, 4u
  categories: [ DoNotMap ]
  components:
  - type: Solution
    id: melee
    solution:
      maxVol: 4
  - type: SolutionInjectOnEmbed
    transferAmount: 4
    solution: melee
  - type: SolutionTransfer
    maxTransferAmount: 4

- type: entity
  parent: ClothingBeltQuiver
  id: ArenaQuiverArrows
  suffix: arena, filled
  components:
  # Base quiver is Ginormous, which can't fit in the duffel (maxItemSize Huge):
  # ContainerFill would drop it on the floor untagged, so the arena cleanup never
  # removes it. Shrink it to Huge so it nests in the kit duffel and gets tagged.
  - type: Item
    size: Huge
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ArenaArrowRegular
          amount: 16

- type: entity
  parent: ClothingBeltQuiver
  id: ArenaQuiverArrowsElite
  suffix: arena, elite, filled
  components:
  - type: Item
    size: Huge
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ArrowImprovisedPlasma
          amount: 8
        - id: ArrowImprovisedUranium
          amount: 4
        - id: ArrowImprovisedCarp
          amount: 4

# Arrows have RefillableSolution — dip them in the bottle before nocking.
# Карпотоксин вместо аматоксина: аматоксин слишком быстро добивал (печёночный
# урон), карпотоксин даёт управляемый дозозависимый токсиновый урон.
- type: entity
  parent: BaseChemistryBottleFilled
  id: ArenaBottleCarpotoxin
  suffix: carpotoxin
  components:
  - type: Label
    currentLabel: reagent-name-carpotoxin
  - type: Solution
    solution:
      reagents:
      - ReagentId: CarpoToxin
        Quantity: 30

# Ноктюрин и афродизиак для арены — собственные медленно-метаболизирующие версии
# (ArenaNocturine / ArenaAphrodisiac), чтобы дозу реально было накопить
# выстрелами. См. _Wega/Reagents/arena_reagents.yml.
- type: entity
  parent: BaseChemistryBottleFilled
  id: ArenaBottleNocturine
  suffix: nocturine, arena
  components:
  - type: Label
    currentLabel: reagent-name-nocturine
  - type: Solution
    solution:
      reagents:
      - ReagentId: ArenaNocturine
        Quantity: 30

- type: entity
  parent: BaseChemistryBottleFilled
  id: ArenaBottleAphrodisiac
  suffix: aphrodisiac, arena
  components:
  - type: Label
    currentLabel: reagent-name-aphrodisiac
  - type: Solution
    solution:
      reagents:
      - ReagentId: ArenaAphrodisiac
        Quantity: 30

# ----- Kit duffels -------------------------------------------------------------
# Big items (bow, quiver, clothing) are listed first so they get packed into the
# grid before the small reagent bottle — otherwise the bottle claims space the
# boots need and the fill drops them on the floor.

# Базовый набор — стальные стрелы. Хаки-окрас.
- type: entity
  parent: [ClothingBackpackDuffel, BaseSyndicateContraband]
  id: ArenaDuffelBowSet
  name: archer kit
  description: An improvised shortbow and a quiver of sixteen steel arrows. Quiet, reusable, honest.
  components:
  - type: Sprite
    sprite: Clothing/Back/Duffels/duffel.rsi
    color: "#9c8f5a"
  - type: Clothing
    sprite: Clothing/Back/Duffels/duffel.rsi
  # Roomier grid: the Huge quiver (4x4) fragments the default 8x5 grid so the
  # small hat/bottle no longer fit — widen it so the whole kit packs in.
  - type: Storage
    grid:
    - 0,0,9,4
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: BowImprovised
        - id: ArenaQuiverArrows
        - id: ClothingUniformJumpsuitCossack
        - id: ClothingShoesBootsSalvage
        - id: ClothingHeadHatHetmanHat

# Ядовитый набор — аматоксин. Токсично-зелёный окрас.
- type: entity
  parent: [ClothingBackpackDuffel, BaseSyndicateContraband]
