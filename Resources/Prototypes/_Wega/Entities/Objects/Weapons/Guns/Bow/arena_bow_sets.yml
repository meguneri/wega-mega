# Wega arena — archer kits for the Full Arsenal pool
- type: entity
  parent: ClothingBeltQuiver
  id: ArenaQuiverArrows
  suffix: arena, filled
  components:
  # Base quiver is Ginormous, which can't fit in the duffel (maxItemSize Huge):
  # ContainerFill would drop it on the floor untagged, so the arena cleanup never
  # removes it. Shrink it to Huge so it nests in the kit duffel and gets tagged.
  - type: Item
    size: Huge
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ArrowRegular
          amount: 16

- type: entity
  parent: ClothingBeltQuiver
  id: ArenaQuiverArrowsElite
  suffix: arena, elite, filled
  components:
  - type: Item
    size: Huge
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ArrowImprovisedPlasma
          amount: 8
        - id: ArrowImprovisedUranium
          amount: 4
        - id: ArrowImprovisedCarp
          amount: 4

- type: entity
  parent: ClothingBackpackDuffel
  id: ArenaDuffelBowSetFilled
  suffix: filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: BowImprovised
        - id: ArenaQuiverArrows

- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: ArenaDuffelBowSet
  name: archer kit
  description: A wrapped package containing an improvised shortbow and a quiver of sixteen steel arrows. Quiet, reusable, honest.
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: Objects/Decoration/present.rsi
    state: present
  - type: SpawnItemsOnUse
    items:
    - id: ArenaDuffelBowSetFilled
    sound:
      path: /Audio/Effects/unwrap.ogg

# Arrows have RefillableSolution — dip them in the bottle before nocking.
- type: entity
  parent: BaseChemistryBottleFilled
  id: ArenaBottleAmatoxin
  suffix: amatoxin
  components:
  - type: Label
    currentLabel: reagent-name-amatoxin
  - type: Solution
    solution:
      reagents:
      - ReagentId: Amatoxin
        Quantity: 30

- type: entity
  parent: BaseChemistryBottleFilled
  id: ArenaBottleNocturine
  suffix: nocturine
  components:
  - type: Label
    currentLabel: reagent-name-nocturine
  - type: Solution
    solution:
      reagents:
      - ReagentId: Nocturine
        Quantity: 30

# Filled duffel — bottle listed first so it always survives the fill
# (ContainerFill drops the rest if any single insert fails).
- type: entity
  parent: ClothingBackpackDuffel
  id: ArenaDuffelBowSetPoisonFilled
  suffix: poison, filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ArenaBottleAmatoxin
        - id: BowImprovised
        - id: ArenaQuiverArrows

- type: entity
  parent: ClothingBackpackDuffel
  id: ArenaDuffelBowSetNocturineFilled
  suffix: nocturine, filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ArenaBottleNocturine
        - id: BowImprovised
        - id: ArenaQuiverArrows

# Wrapped packages (smoker-kit style): a single object that unwraps into the
# filled duffel above.
- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: ArenaDuffelBowSetPoison
  name: poison archer kit
  description: A wrapped package containing the standard archer kit and a bottle of amatoxin. Dip, nock, apologize later.
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: Objects/Decoration/present.rsi
    state: present
  - type: SpawnItemsOnUse
    items:
    - id: ArenaDuffelBowSetPoisonFilled
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: ArenaDuffelBowSetNocturine
  name: destabilizing archer kit
  description: A wrapped package containing the standard archer kit and a bottle of nocturine. One good hit and the target naps through the rest of the fight.
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: Objects/Decoration/present.rsi
    state: present
  - type: SpawnItemsOnUse
    items:
    - id: ArenaDuffelBowSetNocturineFilled
    sound:
