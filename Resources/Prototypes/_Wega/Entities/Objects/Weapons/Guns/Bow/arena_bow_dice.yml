# Кубик удачи лучника: используешь в руке — выпадает число 1-8, и в руку спавнится лук жёсткого
# света, намертво залоченный на один тип стрел (режим переключить нельзя — что выпало, тем и стреляешь).
# Восьмая грань — счастливая: выпадает полный лук со всеми режимами стрел.
# Сами луки — варианты ArenaBowHardlight с единственным режимом в BatteryWeaponFireModes.

- type: entity
  parent: BaseItem
  id: ArenaBowLuckDie
  name: кубик лучника
  suffix: Arena
  description: Гадальный восьмигранный кубик Donk Co. Брось его — и судьба выберет, каким лучом жёсткого света тебе сегодня воевать. От 1 до 7 — отдельные типы стрел, а 8 — джекпот с луком на все режимы.
  components:
  - type: Sprite
    sprite: Objects/Fun/dice.rsi
    state: d8_8
  - type: Item
    size: Small
  - type: ArenaBowLuckDie
    rollSound:
      collection: Dice
    # Индекс = выпавшее число − 1. Восемь граней: 1-7 — залоченные типы стрел, 8 — полный лук.
    outcomes:
    - ArenaBowHardlightDisabler  # 1
    - ArenaBowHardlightFiery     # 2
    - ArenaBowHardlightFreeze    # 3
    - ArenaBowHardlightExplosive # 4
    - ArenaBowHardlightXray      # 5
    - ArenaBowHardlightIon       # 6
    - ArenaBowHardlightEnergy    # 7
    - ArenaBowHardlight          # 8 — все режимы
    # Счастливая «семёрка»: вдобавок к луку под ноги падает гламурный набор.
    bonusDrops:
      7:
      - ClothingUniformDressSexySunrise # коктейльное платье
      - ClothingShoesWizard             # обувь волшебника
      - ClothingHandsGoldBrasetGem      # браслет с сердечками
      - ClothingHeadHatHolyWatermelonArena # арбузный ореол (баффнутый арена-вариант)

# ── Залоченные на один режим варианты лука ──────────────────────────────────────
# Каждый — ArenaBowHardlight с единственным режимом огня, так что цикл переключения
# (BatteryWeaponFireModes) ничего не меняет: стрелы фиксированы.

- type: entity
  parent: ArenaBowHardlight
  id: ArenaBowHardlightDisabler
  suffix: Disabler
  components:
  - type: BatteryAmmoProvider
    proto: ArenaArrowDisabler
    fireCost: 100
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: ArenaArrowDisabler
      fireCost: 100

