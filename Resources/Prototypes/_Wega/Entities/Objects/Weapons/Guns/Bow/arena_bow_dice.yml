# Баффнутый арбузный ореол из «семёрки» кубика лучника: +20% ко всем резистам (коэффициент 0.8)
# и +10% к скорости. База ClothingHeadHatHolyWatermelon не трогается — она ещё в наборе святого.
- type: entity
  parent: ClothingHeadHatHolyWatermelon
  id: ClothingHeadHatHolyWatermelonArena
  suffix: Arena
  components:
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
        Cold: 0.8
        Shock: 0.8
        Caustic: 0.8
        Radiation: 0.8
  - type: ClothingSpeedModifier
    walkModifier: 1.1
    sprintModifier: 1.1
