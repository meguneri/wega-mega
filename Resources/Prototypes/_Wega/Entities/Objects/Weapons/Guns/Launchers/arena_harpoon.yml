# Арена-гарпун: крюк-кошка для арены. Попал в бойца — притянул его к себе; попал в стену —
# рывком подлетел сам. Самоперезаряжаемая батарея даёт фиксированный «кулдаун» между выстрелами.
- type: entity
  name: arena harpoon
  parent: BaseItem
  id: WeaponArenaHarpoon
  description: "Боевой крюк-кошка для арены: цепляет врага и тянет к себе — или дёргает тебя к стене."
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Launchers/grappling_gun.rsi
    layers:
    - state: base
      color: "#c23030" # хаос-перекрас: багровый металл
    - state: base-unshaded
      shader: unshaded
      map: [ "unshaded" ]
      color: "#ff1f1f" # алое свечение вместо штатного циана
  - type: Item
    size: Normal
  - type: Clothing
    sprite: Objects/Weapons/Guns/Launchers/grappling_gun.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Gun
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    clumsyProof: true
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/harpoon.ogg
    soundEmpty: null
  - type: BatteryAmmoProvider
    proto: ArenaHarpoonHook
    fireCost: 100
  - type: Battery
    maxCharge: 100
    startingCharge: 100
  - type: BatterySelfRecharger
    autoRechargeRate: 25 # ~4 с между выстрелами
  - type: PointLight
    radius: 1.5
    energy: 1.2
    color: "#ff2020"
    netsync: false
  - type: Appearance

# Снаряд-крюк. Логику зацепа (притянуть моба / рывок к стене) обрабатывает ArenaHarpoonSystem.
- type: entity
  name: harpoon hook
  parent: BaseBullet
  id: ArenaHarpoonHook
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: Objects/Weapons/Guns/Launchers/grappling_gun.rsi
    color: "#ff3030" # хаос-перекрас крюка
    layers:
    - state: hook
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Piercing: 0
  - type: ArenaHarpoonProjectile
    pullSpeed: 12
    damage:
      types:
        Piercing: 10
  - type: TimedDespawn
    lifetime: 2

# ── Потрошащая версия гарпуна ────────────────────────────────────────────────
# При зацепе моба тянет его как обычно, но когда он оказывается вплотную — короткая «потрошащая»
# вспышка и у жертвы отрывается одна случайная конечность.
- type: entity
  parent: WeaponArenaHarpoon
  id: WeaponArenaHarpoonReaper
  name: arena reaper harpoon
  suffix: Dismember
  description: "Боевой крюк-кошка для арены. Цепляет врага, тянет к себе — и в упор срывает конечность."
  components:
  - type: BatteryAmmoProvider
    proto: ArenaHarpoonReaperHook
    fireCost: 100
  # КД 10 с: 100 заряда / 10 в секунду = 10 с между выстрелами (у обычного гарпуна 25/с ≈ 4 с).
  - type: BatterySelfRecharger
    autoRechargeRate: 10

- type: entity
  parent: ArenaHarpoonHook
  id: ArenaHarpoonReaperHook
  categories: [ HideSpawnMenu ]
  components:
  - type: ArenaHarpoonProjectile
    dismemberOnArrive: true
    stunDuration: 1 # потрошителю стан короче — 1 с
