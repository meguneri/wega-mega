# Арена-гарпун: крюк-кошка для арены. Попал в бойца — притянул его к себе; попал в стену —
# рывком подлетел сам. Самоперезаряжаемая батарея даёт фиксированный «кулдаун» между выстрелами.
- type: entity
  name: arena harpoon
  parent: BaseItem
  id: WeaponArenaHarpoon
  description: "Боевой крюк-кошка для арены: цепляет врага и тянет к себе — или дёргает тебя к стене."
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Launchers/arena_harpoon.rsi
    layers:
    - state: base
    - state: base-unshaded
      shader: unshaded
      map: [ "unshaded" ]
  - type: Item
    size: Normal
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Guns/Launchers/arena_harpoon.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Gun
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    clumsyProof: true
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/harpoon.ogg
    soundEmpty: null
  - type: BatteryAmmoProvider
    proto: ArenaHarpoonHook
    fireCost: 100
  - type: Battery
    maxCharge: 100
    startingCharge: 100
  - type: BatterySelfRecharger
    autoRechargeRate: 25 # ~4 с между выстрелами
  - type: PointLight
    radius: 1.5
    energy: 1.2
    color: "#26e0ff" # циановая подсветка арена-гарпуна
    netsync: false
  - type: Appearance

# Снаряд-крюк. Логику зацепа (притянуть моба / рывок к стене) обрабатывает ArenaHarpoonSystem.
- type: entity
  name: harpoon hook
  parent: BaseBullet
  id: ArenaHarpoonHook
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    noRot: false
    sprite: _Wega/Objects/Weapons/Guns/Launchers/arena_harpoon.rsi
    layers:
    - state: hook
  - type: Projectile
    deleteOnCollide: false
    damage:
      types:
        Piercing: 0
  - type: ArenaHarpoonProjectile
    pullSpeed: 12
    damage:
      types:
        Piercing: 10
  - type: TimedDespawn
    lifetime: 2

# ── Потрошащая версия гарпуна ────────────────────────────────────────────────
# При зацепе моба тянет его как обычно, но когда он оказывается вплотную — короткая добивающая
# вспышка. Режим добивания переключается использованием в руке: срыв случайной конечности или
# обезглавливание (если на жертве шлем — вместо головы слетает шлем).
- type: entity
  parent: WeaponArenaHarpoon
  id: WeaponArenaHarpoonReaper
  name: arena reaper harpoon
  suffix: Reaper
  description: "Боевой крюк-кошка для арены. Цепляет врага, тянет к себе — и в упор добивает. Использование в руке меняет добивание: срыв конечности или обезглавливание."
  components:
  # Свой вид потрошителя — кроваво-красный (перекрас крюк-кошки).
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Launchers/arena_harpoon_reaper.rsi
    layers:
    - state: base
    - state: base-unshaded
      shader: unshaded
      map: [ "unshaded" ]
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Guns/Launchers/arena_harpoon_reaper.rsi
  # Красная подсветка вместо циановой базовой.
  - type: PointLight
    radius: 1.5
    energy: 1.2
    color: "#ff2a2a"
    netsync: false
  - type: BatteryAmmoProvider
    proto: ArenaHarpoonReaperHook
    fireCost: 100
  # КД 10 с: 100 заряда / 10 в секунду = 10 с между выстрелами (у обычного гарпуна 25/с ≈ 4 с).
  - type: BatterySelfRecharger
    autoRechargeRate: 10
  # Переключатель режима добивания (Use-in-hand). По умолчанию — срыв конечности.
  - type: ArenaHarpoonMode

- type: entity
  parent: ArenaHarpoonHook
  id: ArenaHarpoonReaperHook
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Guns/Launchers/arena_harpoon_reaper.rsi
    layers:
    - state: hook
  - type: ArenaHarpoonProjectile
    finisher: Dismember # дефолт, если режим на оружии не задан
    stunDuration: 1 # потрошителю стан короче — 1 с
