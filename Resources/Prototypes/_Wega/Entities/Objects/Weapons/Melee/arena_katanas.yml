# Ported from arcane-station (_Lavaland), AGPL-3.0-or-later.
# MeleeDash stripped (system not present here); UseDelay removed with it.
- type: entity
  name: base katana
  parent: BaseSword
  id: ArenaBaseKatana
  abstract: true
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/katana.rsi
    layers:
    - state: blade
    - state: handle
  - type: Item
    sprite: _Wega/Objects/Weapons/Melee/katana.rsi
    shape:
    - 0,0,0,3
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Melee/katana.rsi
    slots:
    - Back
    - Belt
  - type: MeleeWeapon
    wideAnimationRotation: -60
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
    damage:
      types:
        Slash: 15
  - type: DisarmMalus
  - type: StaticPrice
    price: 10000

- type: entity
  name: cryo katana
  description: Okay maybe things took a weird route when a snow golem was making this engraved sword.
  parent: ArenaBaseKatana
  id: ArenaCryoKatana
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    layers:
    - state: blade
      color: "#00FFFF"
    - state: handle
  - type: Item
    inhandVisuals:
      left:
      - state: handle-inhand-left
      - state: blade-inhand-left
        color: "#00FFFF"
      right:
      - state: handle-inhand-right
      - state: blade-inhand-right
        color: "#00FFFF"
  - type: Clothing
    clothingVisuals:
      back:
      - state: handle-equipped-BACKPACK
      - state: blade-equipped-BACKPACK
        color: "#00FFFF"
      belt:
      - state: handle-equipped-BELT
      - state: blade-equipped-BELT
        color: "#00FFFF"
  - type: ChangeTemperatureOnHit
    heat: -100000 # Low temperature also slows you down, so the change is lower than on lava katana

- type: entity
  name: lava katana
  description: One thousand degree knife, that somehow always keeps intact.
  parent: ArenaBaseKatana
  id: ArenaLavaKatana
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    layers:
    - state: blade
      color: "#FF6600"
    - state: handle
  - type: Item
    inhandVisuals:
      left:
      - state: handle-inhand-left
      - state: blade-inhand-left
        color: "#FF6600"
      right:
      - state: handle-inhand-right
      - state: blade-inhand-right
        color: "#FF6600"
  - type: Clothing
    clothingVisuals:
      back:
      - state: handle-equipped-BACKPACK
      - state: blade-equipped-BACKPACK
        color: "#FF6600"
      belt:
      - state: handle-equipped-BELT
      - state: blade-equipped-BELT
        color: "#FF6600"
  - type: ChangeTemperatureOnHit
    heat: 150000

- type: entity
  name: shadow katana
  description: Legendary sword that emits the darkness itself. Has an ability to pierce through any armor with enough luck and determination.
  parent: BaseSword
  id: ArenaShadowKatana
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/shadow_katana.rsi
    state: icon
  - type: Item
    size: Ginormous
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Melee/shadow_katana.rsi
    slots:
    - Back
    - Belt
  - type: MeleeWeapon
    wideAnimationRotation: -60
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
    damage:
      types:
        Slash: 20
        Holy: 10
  - type: DisarmMalus
  - type: StaticPrice
    price: 25000

# Катана Пламенного столпа Рэнгоку. Помимо усиленного огненного урона несёт
# два приёма Дыхания Пламени (RengokuKatanaSystem), выдаваемых носителю как
# действия через ItemActionGrant: «Первая форма» (конусный взмах) и
# «Девятая форма: Рэнгоку» (огненный рывок-ультимейт).
# Наследуется от BaseSword (а не ArenaBaseKatana), потому что использует цельный
# нарисованный спрайт, а не разбивку blade/handle с покраской.
- type: entity
  name: rengoku's katana
  description: The blade of the Flame Hashira. It burns with unwavering resolve. Set your heart ablaze.
  parent: BaseSword
  id: ArenaRengokuKatana
  categories: [ DoNotMap ]
  components:
  # Мировой вид — кастомный нарисованный спрайт (цвета запечены, color не нужен).
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/rengoku_katana.rsi
    state: icon
  # Кадры в руках и за спиной/на поясе — сгенерированы из icon скриптом
  # gen_rengoku_inhand.py (цельный спрайт, цвета запечены). Сначала запусти скрипт!
  - type: Item
    sprite: _Wega/Objects/Weapons/Melee/rengoku_katana.rsi
    shape:
    - 0,0,0,3
    inhandVisuals:
      left:
      - state: inhand-left
      right:
      - state: inhand-right
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Melee/rengoku_katana.rsi
    slots:
    - Back
    - Belt
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
      belt:
      - state: equipped-BELT
  - type: MeleeWeapon
    # Оба типа атак — взмах мечом (дуга), а не тычок.
    # animation = лёгкая атака (клик), wideAnimation = широкий замах.
    animation: WeaponArcSlash
    wideAnimation: WeaponArcSlash
    wideAnimationRotation: -135
    animationOffset: 0.7
    attackRate: 1.25
    # Смесь пореза и пламени (свод bladeslice + fire, см. Tools/gen_rengoku_slash_sound.sh)
    soundHit:
      path: /Audio/_Wega/Weapons/rengoku_slash.ogg
    damage:
      types:
        Slash: 18
        Heat: 7
  - type: DisarmMalus
  # Пассивно поджигает при каждом ударе — это Пламенный столп.
  - type: IgniteOnMeleeHit
    fireStacks: 1.5
  - type: ChangeTemperatureOnHit
    heat: 80000
  - type: PointLight
    radius: 1.5
    energy: 2.5
    castShadows: false
    color: "#FF6A00"
  # Приёмы Дыхания Пламени.
  - type: RengokuKatana
    firstFormEffect: EffectRengokuFirstForm
    ninthFormEffect: EffectRengokuNinthForm
    ninthFormTrailEffect: EffectRengokuFirstForm
    ninthFormHitEffect: EffectRengokuNinthHit
    firstFormSound:
      path: /Audio/_Wega/Weapons/rengoku_fire_explosion.ogg
    ninthFormSound:
      path: /Audio/_Wega/Weapons/rengoku_fire_explosion.ogg
  - type: ActionGrant
    actions:
    - ActionRengokuFirstForm
    - ActionRengokuNinthForm
  - type: ItemActionGrant
    actions:
    - ActionRengokuFirstForm
    - ActionRengokuNinthForm
    activeIfWorn: false
  - type: StaticPrice
    price: 30000
