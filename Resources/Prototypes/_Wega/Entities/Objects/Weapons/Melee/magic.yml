- type: entity
  parent: BaseItem
  id: WeaponNullRod
  name: null rod
  description: "An obsidian rod that strikes paranormal things."
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/nullrod.rsi
    state: icon
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Melee/nullrod.rsi
    slots: [belt]
  - type: Item
    size: Normal
  - type: NullRod
  - type: ItemSelector
    requiredComponents: [ BibleUser ]
    items:
    - WeaponHandOfGod
    - Claymore
    - WeaponChainsword
    - WeaponForceSword
    - WeaponHanzoSteel
    - WeaponMultiverseSword
    - WeaponUnrealSword
    - WeaponReaperScythe
    - WeaponHighFrequencyBlade
    - WeaponPossessedBlade
    - ArrhythmicKnife
  - type: ActivatableUI
    key: enum.ItemSelectorUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ItemSelectorUiKey.Key:
        type: ItemSelectorBoundUserInterface
  - type: MeleeWeapon
    damage:
      types:
        Blunt: 15

- type: entity
  parent: BaseItem
  id: WeaponHandOfGod
  name: hand of god
  description: "Your hand is now glowing amazingly!"
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/magic_hand.rsi
    state: icon
    color: "#d2314e"
  - type: NullRod
  - type: Unremoveable
  - type: DeleteOnDrop
  - type: Item
    size: Ginormous
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#d2314e"
      right:
      - state: inhand-right
        color: "#d2314e"
  - type: MeleeWeapon
    autoAttack: true
    attackRate: 1.5
    wideAnimationRotation: 180
    damage:
      types:
        Heat: 15
    animation: WeaponArcClaw
  - type: IgniteOnMeleeHit
    fireStacks: 1
  - type: SolutionContainerManager
    solutions:
      Welder:
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 4
        maxVol: 4
  - type: SolutionRegeneration
    generated:
      reagents:
      - ReagentId: WeldingFuel
        Quantity: 0.1
  - type: RefillableSolution
    solution: Welder
  - type: ItemToggleHot
  - type: IgnitionSource
    ignited: false
  - type: ItemToggle
    predictable: false

- type: entity
  parent: BaseItem
  id: WeaponVampireClaws
  name: vampire claws
  description: "Seething streams of fresh blood formed sharp claws."
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/vampireclaws.rsi
    state: icon
  - type: MultiHandedItem
  - type: DeleteOnDrop
  - type: Damageable
  - type: Injurable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 15
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/Fluids/splat.ogg
      - !type:SpawnEntitiesBehavior
        spawn:
          PuddleBlood:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageOnHit
    damage:
      types:
        Blunt: 1
  - type: VampireClaws
    healGroups:
      groups:
        Brute: -4
        Burn: -4
  - type: MeleeWeapon
    autoAttack: true
    attackRate: 2.5
    wideAnimationRotation: 180
    damage:
      types:
        Slash: 15
    animation: WeaponArcClaw

- type: entity
  parent: BaseKnife
  id: WeaponBloodDagger
  name: ritual dagger
  description: An old, worn dagger.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/blood_dagger.rsi
