# SWORD
- type: entity
  id: WeaponClockworkSwordSwordsmen
  parent: WeaponClockworkSword
  suffix: Swordsmen
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/clockwork_sword.rsi
    layers:
    - state: icon
    - state: swordsmen
      shader: unshaded
      visible: true
  - type: Enchanted
  - type: SwordsmenEnchant
  - type: ActionGrant
    actions:
    - ActionVeilCultActivateSwordsmen
  - type: ItemActionGrant
    actions:
    - ActionVeilCultActivateSwordsmen
    activeIfWorn: false
    
- type: entity
  id: WeaponClockworkSwordBloodshed
