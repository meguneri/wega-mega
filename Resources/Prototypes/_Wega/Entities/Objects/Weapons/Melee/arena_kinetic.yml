# Ported from arcane-station (_Lavaland), AGPL-3.0-or-later.
# Stripped: PressureDamageChange, BlockCharge, Scalpel, heavyStaminaCost (systems/fields not present here).
- type: entity
  parent: BaseKnife
  id: ArenaKineticDagger
  name: kinetic dagger
  description: A scaled down version of a proto-kinetic crusher. Uses kinetic energy to vibrate the blade at high speeds.
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: Objects/Weapons/Melee/crusher_dagger.rsi
    state: icon
  - type: MeleeWeapon
    autoAttack: true
    wideAnimationRotation: -135
    attackRate: 1.5
    damage:
      types:
        Slash: 12
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Slash: 18
  - type: DisarmMalus
    malus: 0.225
  - type: ThrowingAngle
    angle: 225
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          radius: 0.01
          vertices:
          - -0.4,-0.2
          - -0.2,-0.4
          - 0.4,0.2
          - 0.2,0.4
        density: 20
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0

- type: entity
  parent: [ BaseItem, ClothingHandsBase ]
  id: ArenaKineticClaws
  name: kinetic claws
  description: Unleash your inner edgelord with this one-handed claw small enough to fit in your backpack.
  categories: [ DoNotMap ]
  components:
  - type: Appearance
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/kinetic_claws.rsi
    state: icon
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Melee/kinetic_claws-inhands.rsi
  - type: Item
    size: Normal
    sprite: _Wega/Objects/Weapons/Melee/kinetic_claws-inhands.rsi
  - type: MeleeWeapon
    attackRate: 2.5
    wideAnimationRotation: -135
    damage:
      types:
        Slash: 7
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    range: 1.1
    mustBeEquippedToUse: true
  - type: Sharp
  - type: Prying
  - type: UseDelay
    delay: 1
  - type: Fiber
    fiberMaterial: fibers-synthetic
    fiberColor: fibers-purple
  - type: Execution
    doAfterDuration: 4.0
  - type: Tool
    qualities:
    - Slicing
    useSound:
      path: /Audio/Items/Culinary/chop.ogg

- type: entity
  parent: BaseItem
  id: ArenaKineticMachete
  name: kinetic machete
  description: A smaller, one-handed variant of the crusher which allows you to attack from afar and block incoming attacks.
  categories: [ DoNotMap ]
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/kinetic_machete.rsi
    state: icon
  - type: UseDelay
    delay: 1
  - type: Appearance
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: DisarmMalus
  - type: Prying
  - type: MeleeWeapon
    attackRate: 1.0
    damage:
      types:
        Slash: 15
    soundHit:
      collection: MetalThud
    angle: 0
    animation: WeaponArcThrust
    range: 2
  - type: Item
    size: Normal
    sprite: _Wega/Objects/Weapons/Melee/kinetic_machete-inhands.rsi
  - type: Tool
    qualities:
    - Slicing
    useSound:
      path: /Audio/Items/Culinary/chop.ogg
