# Wega arena — hybrid offense/defense gear
- type: entity
  name: parry buckler
  parent: BaseShield
  id: ArenaParryBuckler
  description: A compact dueling buckler built around the counterattack — catch a blow on the raised face and the riposte lands twice as hard. Light enough to swing as a bludgeon and angled to deflect energy bolts.
  components:
    - type: Sprite
      sprite: _Wega/Objects/Shields/parry_buckler.rsi
      state: buckler-icon
    - type: Item
      sprite: _Wega/Objects/Shields/parry_buckler.rsi
      size: Normal
      heldPrefix: buckler
    # Hybrid: it can be swung as a thermal weapon
    - type: MeleeWeapon
      wideAnimationRotation: -135
      attackRate: 1.2
      damage:
        types:
          Heat: 12
          Blunt: 2
      soundHit:
        collection: MetalThud
    # Duelist profile: modest passive protection, but a raised buckler
    # shrugs off melee — piercing is still its weak spot
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.85
          Slash: 0.85
          Piercing: 0.6
          Heat: 0.8
      activeBlockModifier:
        coefficients:
          Blunt: 0.45
          Slash: 0.5
          Piercing: 0.5
          Heat: 0.55
        flatReductions:
          Blunt: 3
          Slash: 2
          Heat: 2
    # Unique mechanic: parrying a melee hit while actively blocking primes a
    # riposte — the next swing within the window hits harder and drains stamina
    - type: ParryRiposte
      riposteWindow: 2
      riposteStaminaDamage: 35
      riposteBonusDamage:
        types:
          Blunt: 8
    # Mechanic hook: angled face deflects energy
    - type: Reflect
      reflectProb: 0.35
      reflects:
        - Energy
    # Sturdier than it looks — built to eat parried hits
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 160
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 120
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                SheetSteel:
                  min: 1
                  max: 1
