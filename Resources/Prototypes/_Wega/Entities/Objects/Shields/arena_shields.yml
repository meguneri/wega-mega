# Wega arena — hybrid offense/defense gear
- type: entity
  name: parry buckler
  parent: BaseShield
  id: ArenaParryBuckler
  description: A compact dueling buckler. Light enough to swing as a bludgeon, angled to deflect energy bolts — but it offers little against a thrust.
  components:
    - type: Sprite
      sprite: _Wega/Objects/Shields/parry_buckler.rsi
      state: icon
    - type: Item
      sprite: _Wega/Objects/Shields/parry_buckler.rsi
      size: Normal
      heldPrefix: buckler
    # Hybrid: it can be swung as a blunt weapon
    - type: MeleeWeapon
      wideAnimationRotation: -135
      attackRate: 1.2
      damage:
        types:
          Blunt: 9
      soundHit:
        collection: MetalThud
    # Defensive profile: great vs Blunt/Slash, weak vs Piercing
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.8
          Slash: 0.85
          Piercing: 1.1
          Heat: 0.9
      activeBlockModifier:
        coefficients:
          Blunt: 0.6
          Slash: 0.65
          Piercing: 1.0
          Heat: 0.7
        flatReductions:
          Blunt: 2
          Slash: 1
          Heat: 1
    # Mechanic hook: angled face deflects energy
    - type: Reflect
      reflectProb: 0.35
      reflects:
        - Energy
    # Less durable than a riot shield — the trade for offense
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 90
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 65
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                SheetSteel:
                  min: 1
                  max: 1
