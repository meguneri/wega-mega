# Taken from lust-station (Sunrise)
- type: entity
  parent: BaseItem
  id: DoubleBedsheetBase
  name: double blanket
  abstract: true
  description: A surprisingly soft linen double blanket.
  placement:
    mode: SnapgridCenter
    snap:
    - Bed
  components:
  - type: Sprite
    sprite: _Wega/Objects/Misc/doublebedsheets.rsi
    noRot: true
  - type: Item
    size: Small
  - type: StaticPrice
    price: 100
  - type: Tag
    tags:
    - Bedsheet

- type: entity
  id: DoubleBedsheetBlack
  parent: DoubleBedsheetBase
  name: black double blanket
  components:
  - type: Sprite
    state: sheetblack

- type: entity
  id: DoubleBedsheetBlue
  parent: DoubleBedsheetBase
  name: blue double blanket
  components:
  - type: Sprite
    state: sheetblue

- type: entity
  id: DoubleBedsheetBrown
  parent: DoubleBedsheetBase
  name: brown double blanket
  components:
  - type: Sprite
    state: sheetbrown

- type: entity
  id: DoubleBedsheetCaptain
  parent: DoubleBedsheetBase
  name: captain's double blanket
  description: It has a Nanotrasen symbol on it, and was woven with a revolutionary new kind of thread guaranteed to have 0.01% permeability for most non-chemical substances, popular among most modern captains.
  components:
  - type: Sprite
    state: sheetcaptain
  - type: StealTarget
    stealGroup: HeadBedsheet

- type: entity
  id: DoubleBedsheetCE
  parent: DoubleBedsheetBase
  name: CE's double blanket
  description: It's decorated with a wrench emblem. It's highly reflective and stain resistant, so you don't need to worry about ruining it with oil.
  components:
  - type: Sprite
    state: sheetce
  - type: StealTarget
    stealGroup: HeadBedsheet

- type: entity
  id: DoubleBedsheetCentcom
  parent: DoubleBedsheetBase
  name: CentComm double blanket
  description: Woven with advanced nanothread for warmth as well as being very decorated, essential for all officials.
  components:
  - type: Sprite
    state: sheetcentcom
  - type: StealTarget
    stealGroup: HeadBedsheet

- type: entity
  id: DoubleBedsheetClown
  parent: DoubleBedsheetBase
  name: clown's double blanket
  description: A rainbow blanket with a clown mask woven in. It smells faintly of bananas.
  components:
  - type: Sprite
    state: sheetclown

- type: entity
  id: DoubleBedsheetCMO
  parent: DoubleBedsheetBase
  name: CMO's double blanket
  description: It's a sterilized blanket that has a cross emblem. There's some cat fur on it, likely from Runtime.
  components:
  - type: Sprite
    state: sheetcmo
  - type: StealTarget
    stealGroup: HeadBedsheet

- type: entity
  id: DoubleBedsheetCosmos
  parent: DoubleBedsheetBase
  name: cosmos double blanket
  description: Made from the dreams of those who wonder at the stars.
  components:
