    state: sheetcosmos

- type: entity
  id: DoubleBedsheetCult
  parent: DoubleBedsheetBase
  name: cult double blanket
  description: You might dream of Nar'Sie if you sleep with this. It seems rather tattered and glows of an eldritch presence.
  components:
  - type: Sprite
    state: sheetcult

