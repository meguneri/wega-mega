# ── «ЧУМБА, ТЫ СОВСЕМ Ё@%&ТЫЙ?» ─────────────────────────────────────────────────
# Билд кулачного бога: арена-сандэвистан (скорость + bullet-time + броня) замыкает на стиль
# полярной звезды — никакого оружия, кроме её перчаток.
- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: ArenaNorthStarSet
  name: чумба, ты совсем ё@%&тый?
  description: "Свёрток, который разворачивается в перчатки полярной звезды и арена-сандэвистан. Кулаки решают всё."
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: Objects/Decoration/present.rsi
    state: present
  - type: SpawnItemsOnUse
    items:
    - id: ClothingHandsGlovesNorthStar
    - id: ClothingEyesSandevistanArena
    sound:
      path: /Audio/Effects/unwrap.ogg
