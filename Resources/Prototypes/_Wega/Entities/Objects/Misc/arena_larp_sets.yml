# Wega arena — themed LARP kits and mini survival kits for the Full Arsenal pool.
# Same pattern as ArenaCommunismSet: a wrapped present that unpacks loose items via
# SpawnItemsOnUse (loose, not in a duffel — so arena cleanup tags and removes every spawned item).

# ── GLADIATOR ─────────────────────────────────────────────────────────────────
- type: entity
  parent: [BaseItem, BaseSyndicateContraband]
  id: ArenaGladiatorSet
  name: gladiator kit
  description: A wrapped package that unpacks into a claymore, a spear, a buckler and a full combat gladiator outfit. Are you not entertained?
  components:
  - type: Item
    size: Normal
  - type: Sprite
    sprite: Objects/Decoration/present.rsi
    state: present
  - type: SpawnItemsOnUse
    items:
    - id: Claymore
    - id: Spear
    - id: WoodenBuckler
    - id: ClothingUniformJumpsuitGladiatorArena
    - id: ClothingHeadHatGladiatorArena
    - id: ClothingShoesLeather
    sound:
      path: /Audio/Effects/unwrap.ogg

