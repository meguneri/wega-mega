# Wega arena — combat-grade gladiator gear. Same look as the cosmetic gladiator helmet/uniform, but
# with real melee armor for the arena gladiator kit (the base versions have no protection).

- type: entity
  parent: ClothingHeadHatGladiator
  id: ClothingHeadHatGladiatorArena
  suffix: Arena
  name: gladiator helmet
  description: A battle-ready gladiator helmet, reinforced to turn aside blades and blows in the arena.
  components:
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.9

- type: entity
  parent: ClothingUniformJumpsuitGladiator
  id: ClothingUniformJumpsuitGladiatorArena
  suffix: Arena
  name: gladiator uniform
  description: A battle-ready gladiator outfit, its leather and bronze plating built to take a beating in the arena.
  components:
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.85
