# Wega arena — armor with built-in combat stimulants
- type: entity
  parent: ClothingOuterArmorBasic
  id: ArenaAdrenalineVest
  name: adrenaline vest
  description: For its imposing look, it is rather light. You'd best not know what filth flows through the many tubes that wrap the whole vest and dig into your skin with their needles.
  components:
    - type: Sprite
      sprite: _Wega/Clothing/OuterClothing/Armor/adrenaline_vest.rsi
    - type: Clothing
      sprite: _Wega/Clothing/OuterClothing/Armor/adrenaline_vest.rsi
    - type: Item
      sprite: _Wega/Clothing/OuterClothing/Armor/adrenaline_vest.rsi
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.65
          Slash: 0.65
          Piercing: 0.6
          Heat: 0.65
          Shock: 0.65
          Caustic: 0.65
          Radiation: 0.65
    # Passive +5% move speed while worn
    - type: ClothingSpeedModifier
      walkModifier: 1.05
      sprintModifier: 1.05
    # Unique mechanic: below 40% health the vest auto-injects — heals 30 damage
    # over 3s, +10% move speed and -15% incoming damage for 5s
    - type: AdrenalineVest
      healthFraction: 0.4
      rushDuration: 5
      healDuration: 3
      cooldown: 90
      speedModifier: 1.1
      damageCoefficient: 0.85
      healAmount: 30

# Adaptive plating: smart armor that learns the damage type hitting it and ramps resistance to it.
- type: entity
  parent: ClothingOuterArmorBasic
  id: ArenaAdaptiveArmor
  name: adaptive plating
  description: A lattice of micro-cells that taste the last blow and stiffen against its kind. Hit it the same way twice and the second one barely lands — so do not hit it the same way twice.
  components:
    - type: Sprite
      sprite: _Wega/Clothing/OuterClothing/Armor/adaptive_armor.rsi
    - type: Clothing
      sprite: _Wega/Clothing/OuterClothing/Armor/adaptive_armor.rsi
    - type: Item
      sprite: _Wega/Clothing/OuterClothing/Armor/adaptive_armor.rsi
    # Modest flat armor — the adaptive layer is the real protection.
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.8
          Slash: 0.8
          Piercing: 0.8
          Heat: 0.8
          Shock: 0.85
          Caustic: 0.85
          Radiation: 0.85
    # Unique mechanic: after the first hit of a damage type, the plating ramps resistance to that type
    # for 6s. 0.25 stacks on the flat 0.8 armor → ~0.2 taken, i.e. ~80% of that type absorbed while
    # adapted (vs ~20% at rest). Switch damage types to beat it.
    - type: AdaptiveArmor
      adaptDuration: 6
      adaptCoefficient: 0.25
      # Stamina/stun is softened far less than physical damage: 0.65 → ~35% absorbed (vs ~80%),
      # so disablers and stun batons stay a viable counter even after the plating adapts.
      staminaAdaptCoefficient: 0.65
    # Emissive accent: while an adaptation holds, the worn vest glows the adapted type's colour
    # (driven from AdaptiveArmorSystem via ToggleableVisuals' Enabled/Color appearance data).
    - type: Appearance
    - type: ToggleableVisuals
      spriteLayer: adaptiveGlow
      clothingVisuals:
        outerClothing:
        - state: equipped-OUTERCLOTHING-glow
          shader: unshaded
        outerClothing-vox:
        - state: equipped-OUTERCLOTHING-glow-vox
          shader: unshaded
