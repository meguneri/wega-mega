# Wega arena — armor with built-in combat stimulants
- type: entity
  parent: ClothingOuterArmorBasic
  id: ArenaAdrenalineVest
  name: adrenaline vest
  description: An armored vest with a built-in biomonitor and a stimulant autoinjector. When its wearer is badly hurt, it fires a cocktail that mends wounds and sharpens reflexes — a cornered fighter is the most dangerous one.
  components:
    - type: Sprite
      sprite: _Wega/Clothing/OuterClothing/Armor/adrenaline_vest.rsi
    - type: Clothing
      sprite: _Wega/Clothing/OuterClothing/Armor/adrenaline_vest.rsi
    - type: Item
      sprite: _Wega/Clothing/OuterClothing/Armor/adrenaline_vest.rsi
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.65
          Slash: 0.65
          Piercing: 0.65
          Heat: 0.65
          Shock: 0.65
          Caustic: 0.65
          Radiation: 0.65
    # Unique mechanic: below 40% health the vest auto-injects — small heal,
    # +20% move speed and -15% incoming damage for the rush duration
    - type: AdrenalineVest
      healthFraction: 0.4
      rushDuration: 8
      cooldown: 90
      speedModifier: 1.2
      damageCoefficient: 0.85
      healing:
        types:
          Blunt: -4
          Slash: -4
          Piercing: -4
          Heat: -5
