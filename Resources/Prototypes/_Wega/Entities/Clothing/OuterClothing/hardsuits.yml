# Wega arena — Space Marine power armor
# Heavy bruiser: superb vs physical & heat, but slow and weak to radiation/caustic/stun.
- type: entity
  parent: ClothingOuterHardsuitBase
  id: ClothingOuterHardsuitSpaceMarine
  name: space marine power armor
  description: A massive slab of ceramite plate forged for the arena's heaviest hitters. It shrugs off blades and bullets, but its sheer weight drags the wearer down.
  components:
  - type: Sprite
    sprite: _Wega/Clothing/OuterClothing/Hardsuits/spacemarine.rsi
  - type: Clothing
    sprite: _Wega/Clothing/OuterClothing/Hardsuits/spacemarine.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.02
    lowPressureMultiplier: 1000
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.001
  - type: ExplosionResistance
    damageCoefficient: 0.35
  - type: FireProtection
    reduction: 0.7
  - type: StaminaResistance # heavy plate soaks stun
    damageCoefficient: 0.35
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.15
        Slash: 0.15
        Piercing: 0.2
        Heat: 0.25
        Radiation: 0.6   # weak point: not sealed against rads
        Caustic: 0.6     # weak point: chems eat through the seals
  - type: ClothingSpeedModifier # the trade-off: it is heavy — halves movement speed
    walkModifier: 0.5
    sprintModifier: 0.5
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitSpaceMarine

# Syndicate infiltration hardsuit — ported from lust-station/_Sunrise
# Phase-cloak suit: drains cell power while cloaked, 0.6 coefficient all damage, no speed penalty.
- type: entity
  parent: [ClothingOuterHardsuitBase, AllowSuitStorageClothing, BaseToggleClothing, BaseSyndicateContraband]
  id: ClothingOuterHardsuitInfiltration
  name: синдикатский скафандр инфильтратора
  description: Боевой скафандр спецопераций Синдиката, созданный с упором на скрытность. Питает встроенную систему маскировки от энергоячейки.
  components:
  - type: Sprite
    sprite: _Starlight/Objects/Clothing/OuterClothing/Hardsuits/infiltrationsyndie.rsi
  - type: Clothing
    sprite: _Starlight/Objects/Clothing/OuterClothing/Hardsuits/infiltrationsyndie.rsi
  - type: Item
    size: Huge
    sprite: _Starlight/Objects/Clothing/OuterClothing/Hardsuits/infiltrationsyndie.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.525
    lowPressureMultiplier: 10000
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.6
        Slash: 0.6
        Piercing: 0.6
        Heat: 0.6
        Radiation: 0.6
        Caustic: 0.6
  - type: StaminaResistance
    damageCoefficient: 0.4
  - type: ExplosionResistance
    damageCoefficient: 0.5
  - type: ToggleClothing
    action: ActionTogglePhaseCloak
    disableOnUnequip: true
  - type: ItemToggle
    onUse: false
  - type: ComponentToggler
    parent: true
    components:
      - type: Stealth
        hadOutline: true
        examineThreshold: 0.9
      - type: StealthOnMove
        passiveVisibilityRate: -1.25
        movementVisibilityRate: 0.3
  - type: PowerCellDraw
    drawRate: 7
  - type: ToggleCellDraw
  - type: PowerCellSlot
    cellSlotId: cell_slot
    fitsInCharger: false
  - type: ContainerContainer
    containers:
      cell_slot: !type:ContainerSlot
      toggleable-clothing: !type:ContainerSlot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
        disableEject: true
        whitelist:
          tags:
            - PowerCell
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitInfiltration
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 1
    requireActivated: false
  - type: HeldSpeedModifier
  - type: Tag
    tags:
    - Hardsuit
    - WhitelistChameleon
  - type: StaticPrice
    price: 8500
