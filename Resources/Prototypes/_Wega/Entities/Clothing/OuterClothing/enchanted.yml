# VEIL CULT ROBE

- type: entity
  parent: ClothingOuterVeilCultRobes
  id: ClothingOuterVeilCultRobesHaste
  suffix: Haste
  components:
  - type: Sprite
    sprite: _Wega/Clothing/OuterClothing/Coats/clockrobe.rsi
    layers:
    - state: icon
    - state: haste
      shader: unshaded
      visible: true
  - type: Enchanted
  - type: HasteEnchant
  - type: ActionGrant
    actions:
    - ActionVeilCultActivateHaste
  - type: ItemActionGrant
    actions: 
    - ActionVeilCultActivateHaste
    activeIfWorn: true
    
- type: entity
  parent: ClothingOuterVeilCultRobes
