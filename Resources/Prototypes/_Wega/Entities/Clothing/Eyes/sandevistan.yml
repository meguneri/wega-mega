# Сандэвистан — киберимплант-ускоритель (placeholder: киберочки на базе солнечных).
# Активируется действием: короткий буст скорости + снижение получаемого урона, затем перезарядка.
- type: entity
  parent: ClothingEyesGlassesSunglasses
  id: ClothingEyesSandevistan
  name: сандэвистан
  description: Военная киберимплантация. На миг разгоняет носителя до предела — мир будто замирает.
  components:
  # Красная подсветка оптики — отличает имплант от обычных очков (спрайт от родителя).
  - type: Sprite
    color: "#ff3b3b"
  - type: Sandevistan

# Арена-версия сандэвистана: те же способности, но даёт броню как у бронежилета (15% по всем
# резистам) и блокирует любое оружие, кроме перчаток полярной звезды. В пул НЕ добавлять.
- type: entity
  parent: ClothingEyesSandevistan
  id: ClothingEyesSandevistanArena
  suffix: Arena
  name: сандэвистан «полярная звезда»
  description: "Боевая киберимплантация для арены: разгоняет носителя и замирает мир. Замкнута на стиль полярной звезды — в руках не стерпит ничего, кроме её перчаток."
  components:
  # Синяя оптика — отличает арена-версию.
  - type: Sprite
    color: "#3ba0ff"
  # Усиленная арена-версия: дольше длится, короче перезарядка, выше скорость носителя и
  # сильнее «замирание» врагов (мир вокруг почти стоит).
  - type: Sandevistan
    duration: 6
    cooldown: 12
    action: ActionSandevistanArena
    speedModifier: 2.0
    # Враги замедлены, но не «заморожены» — у них остаётся шанс отреагировать.
    slowModifier: 0.3
    # На пике сверхскорости носитель уворачивается от 10% входящих атак — даёт шанс «обойти»
    # мгновенные хитскан-выстрелы, которые нельзя замедлить в полёте, но не делает неуязвимым.
    dodgeChance: 0.1
    # Гуще шлейф послеобразов (вдвое чаще дефолта) — подчёркивает сверхскорость.
    afterimageInterval: 0.05
  # Пассивная броня 15% по всем типам — пережить сближение с дальнобоем вне фазы.
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
        Heat: 0.85
        Cold: 0.85
        Shock: 0.85
        Caustic: 0.85
        Radiation: 0.85
  # 8% шанс полностью уклониться от входящей атаки (рефлексы на пределе сверхскорости).
  - type: Evasion
    chance: 0.08
  # Небольшая постоянная мобильность (даже когда способность не активна) — чтобы не быть
  # беспомощным в окне между активациями, но без перекоса.
  - type: ClothingSpeedModifier
    walkModifier: 1.1
    sprintModifier: 1.1
  - type: SandevistanArenaLock

# «Стоп-кадр»: вариант сандэвистана, который замедляет вообще всё вокруг на 99.9%
# (движение, стрельбу, замахи, полёт пуль и брошенных предметов). Мир практически замирает,
# пока носитель двигается на полной скорости.
- type: entity
  parent: ClothingEyesSandevistan
  id: ClothingEyesSandevistanFreeze
  suffix: Freeze
  name: сандэвистан «стоп-кадр»
  description: "Экспериментальный имплант: при активации мир вокруг почти полностью замирает."
  components:
  # Фиолетовая оптика — отличает «стоп-кадр» версию.
  - type: Sprite
    color: "#b23bff"
  - type: Sandevistan
    duration: 8
    cooldown: 10
    action: ActionSandevistanFreeze
    # Личная скорость носителя выше арена-версии (×2.0) — мир почти замер, можно двигаться вольготно.
    speedModifier: 2.2
    # 0.001 = замедление на 99.9% всего, что попало под эффект.
    slowModifier: 0.001
    # Густой шлейф послеобразов, как у арена-версии.
    afterimageInterval: 0.05
