# Сандэвистан — киберимплант-ускоритель (placeholder: киберочки на базе солнечных).
# Активируется действием: короткий буст скорости + снижение получаемого урона, затем перезарядка.
- type: entity
  parent: ClothingEyesGlassesSunglasses
  id: ClothingEyesSandevistan
  name: сандэвистан
  description: Военная киберимплантация. На миг разгоняет носителя до предела — мир будто замирает.
  components:
  # Красная подсветка оптики — отличает имплант от обычных очков (спрайт от родителя).
  - type: Sprite
    color: "#ff3b3b"
  - type: Sandevistan

# Арена-версия сандэвистана: те же способности, но даёт броню как у бронежилета (15% по всем
# резистам) и блокирует любое оружие, кроме перчаток полярной звезды. В пул НЕ добавлять.
- type: entity
  parent: ClothingEyesSandevistan
  id: ClothingEyesSandevistanArena
  suffix: Arena
  name: сандэвистан «полярная звезда»
  description: "Боевая киберимплантация для арены: разгоняет носителя и замирает мир. Замкнута на стиль полярной звезды — в руках не стерпит ничего, кроме её перчаток."
  components:
  # Синяя оптика — отличает арена-версию.
  - type: Sprite
    color: "#3ba0ff"
  # Усиленная арена-версия: дольше длится, короче перезарядка, выше скорость носителя и
  # сильнее «замирание» врагов (мир вокруг почти стоит).
  - type: Sandevistan
    duration: 9
    cooldown: 12
    speedModifier: 2.3
    slowModifier: 0.15
  # Пассивная броня 25% по всем типам — пережить сближение с дальнобоем вне фазы.
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.75
        Slash: 0.75
        Piercing: 0.75
        Heat: 0.75
        Cold: 0.75
        Shock: 0.75
        Caustic: 0.75
        Radiation: 0.75
  # Постоянная мобильность (даже когда способность не активна) — чтобы не быть беспомощным
  # в окне между активациями: всегда можешь закрывать дистанцию до стрелка.
  - type: ClothingSpeedModifier
    walkModifier: 1.2
    sprintModifier: 1.2
  - type: SandevistanArenaLock
