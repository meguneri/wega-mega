- type: entity
  id: BaseMobMegafauna
  abstract: true
  components:
  - type: Sprite
    noRot: true
    drawdepth: Mobs
  - type: Physics
    bodyType: KinematicController
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.75
        density: 50
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: RequireProjectileTarget
    active: false
  - type: Actions
  - type: Clickable
  - type: InteractionOutline
  - type: LagCompensation
  - type: NoSlip
  - type: MobState
  - type: CombatMode
  - type: Damageable
  - type: Injurable
    damageContainer: Biological
  - type: Megafauna
  - type: NPCAggression
  - type: NPCIgnoringOptimize
  - type: NpcFactionMember
    factions:
    - LavalandFauna
  - type: LavalandVisitor
    immuneToStorm: true
  - type: Unrevivable
    analyzable: false
  - type: Tag
    tags:
    - CannotSuicide
    - DoorBumpOpener
    - StunImmune
    - SlowImmune

- type: entity
  parent: BaseMobMegafauna
  id: BaseMobMegafaunaMover
  abstract: true
  components:
  - type: InputMover
  - type: Input
    context: "human"
  - type: MobMover
  - type: MovementSpeedModifier

#region Blood Drunk Miner
- type: entity
  parent: [ MobHuman, BaseMobMegafauna ]
  id: MobBloodDrunkMiner
  name: unknown miner
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 1200
      behaviors:
      - !type:GibBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 1500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          Ash:
            min: 1
            max: 1
      - !type:BurnBodyBehavior { }
      - !type:PlaySoundBehavior
        sound:
          collection: MeatLaserImpact
  - type: NpcFactionMember
    factions:
      - AllHostile
  - type: Loadout
    prototypes:
      - BloodDrunkMinerGear
  - type: InputMover
  - type: MobMover
  - type: LavaWalking
  - type: ScaleVisuals
    scale: 1.172, 1.172
  - type: MobThresholds
    thresholds:
      0: Alive
      900: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      540: 0.7
      720: 0.5
      900: 0.3
  - type: Respirator
    saturation: 8.0
    suffocationThreshold: -6.0
    maxSaturation: 8.0
    minSaturation: -4.0
    updateIntervalMultiplier: 0.8
  - type: BloodDrunkMiner
  - type: MegafaunaDamageContributor
    achievement: MinerBoss
  - type: NPCHandSwitcher
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: NPCUseActionOnTarget
    actionId: ActionBloodDrunkMinerDash
  - type: DnaModifier
    upper: null
    lowest: null
  - type: TrophyHunter
    trophy: TrophyLavalandBDMEye
    dropChance: 1 # Guaranteed, since it's the boss
  - type: Butcherable
    spawned:
    - id: FoodMeatHuman
      amount: 5
    - id: GemStabilizedBaroxuldium
  - type: NavMapBeacon
    defaultText: nav-map-beacon-lavaland-signal-bdm
    defaultDesc: nav-map-beacon-lavaland-signal-bdm-desc
    color: "#a46106"
  - type: Tag
    tags:
    - CannotSuicide
    - DoorBumpOpener
    - StunImmune
    - SlowImmune

- type: startingGear
  id: BloodDrunkMinerGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitExplorer
    ears: ClothingHeadsetCargo
    eyes: ClothingEyesGlassesMeson
    mask: ClothingMaskGasExplorer
    gloves: ClothingHandsGlovesCombat
    shoes: ClothingShoesBootsSalvage
    underwearbottom: ClothingUnderBottomGrey
    head: ClothingHeadHatHoodExplorerBDM
    outerClothing: ClothingOuterArmorExplorerSuitBDM
    suitstorage: OxygenTankFilled
  inhand:
    - WeaponCleawingSaw
    - WeaponProtoKineticAcceleratorBDM
#endregion

#region Hierophant
- type: entity
  parent: BaseMobMegafauna
  id: MobHierophant
  name: hierophant
  description: "A huge, mysterious scepter made of alien metal and seemingly endowed with its own intelligence. Perhaps its purpose is to defend the structure it resides in."
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.35,-0.6,0.35,0.6"
        density: 50
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: Damageable
    damageModifierSet: Hierophant
  - type: Injurable
    damageContainer: Inorganic
  - type: Sprite
    sprite: _Wega/Mobs/Lavaland/hierophant.rsi
    state: hierophant
  - type: MeleeWeapon
    altDisarm: false
    damage:
     types:
       Blunt: 20
  - type: MobThresholds
    thresholds:
      0: Alive
      2500: Dead
  - type: AmbientSound
    sound:
      path: "/Audio/_Wega/Mobs/Lavaland/hiero_bgm.ogg"
    enabled: false
    volume: 2
    range: 15
  - type: PointLight
    color: "#9900ff"
    castShadows: false
    softness: 1
    radius: 2.5
    energy: 2.5
  - type: Megafauna
    bossMusic:
      path: "/Audio/_Wega/Mobs/Lavaland/hiero_bgm.ogg"
  - type: HierophantBoss
    rewards:
    - HierophantClubRod
    - GemCompactedDilithium
  - type: MegafaunaDamageContributor
    achievement: HierophantBoss
  - type: HTN
    rootTask:
      task: HierophantBehaviorCompound
  - type: NPCUseActionsOnTarget
    actionIds:
    - ActionHierophantBlink
    - ActionHierophantCross
    - ActionHierophantChaser
    - ActionHierophantDamageArea
    actionChances:
      ActionHierophantBlink: 0.5
      ActionHierophantCross: 0.5
      ActionHierophantChaser: 0.5
      ActionHierophantDamageArea: 0.5
  - type: TrophyHunter
    trophy: TrophyLavalandHierophantVortexTalisman
    dropChance: 1 # Guaranteed, since it's the boss
    collectSound:
      path: "/Audio/Effects/singularity_collapse.ogg" # More Cinema

