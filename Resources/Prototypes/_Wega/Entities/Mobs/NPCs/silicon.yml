- type: entity
  parent: [ MobSiliconBase, BaseVehicle]
  id: MobSiliconBaseVehicle # for vehicles
  abstract: true
  components:
  - type: NoSlip
  - type: GhostTakeoverAvailable
  - type: GhostRole
    makeSentient: true
  - type: UnpoweredFlashlight
  - type: PointLight
    enabled: false
    radius: 3.5
    softness: 2
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true

- type: entity
  parent: MobSiliconBaseVehicle
  id: MobTaxiBot
  name: taxibot
  description: Give a ride?
  components:
  - type: Sprite
    sprite: Mobs/Silicon/Bots/taxibot.rsi
    layers:
    - state: taxibot
      map: ["enum.VehicleVisualLayers.AutoAnimate"]
  - type: GhostRole
    name: ghost-role-information-taxibot-name
    description: ghost-role-information-taxibot-description
  - type: Strap
    buckleOffset: "0, 0"
  - type: Construction
    graph: TaxiBot
    node: bot
  - type: Instrument
    allowPercussion: false
  - type: UserInterface
    interfaces:
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
  - type: MovementSpeedModifier
    baseAcceleration: 1
    baseFriction: 1
    baseWalkSpeed: 4.5
    baseSprintSpeed: 7
  - type: AmbientSound
    sound: "/Audio/Effects/Vehicle/vehicleengineidle.ogg"
    range: 10
    volume: -10
    enabled: true

- type: entity
  name: Borgi
  parent: [ MobSiliconBase, FlyingMobBase ] # чтоб не улетал
  id: Borgi
  description: PAI is still walking now! Unbelievable!
  components:
  - type: Sprite
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: borgi
      sprite: _Wega/Mobs/Silicon/borgi.rsi
  - type: DamageStateVisuals
    states:
      Alive:
        Base: borgi
      Dead:
        Base: borgi-dead
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Dead
  - type: InteractionPopup
    interactSuccessString: petting-success-dog
    interactFailureString: petting-failure-generic
    interactSuccessSpawn: EffectHearts
    interactSuccessSound:
      path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: MeleeWeapon
    altDisarm: false
    hidden: true
    animation: WeaponArcSlash
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
    attackRate: 1
    damage:
      types:
        Structural: 12 # если застрял
        Slash: 11
  - type: CombatMode
    combatToggleAction: ActionCombatModeToggle
  - type: Puller
    needsHands: false
  - type: Prying
    pryPowered: true
    force: true
    speedModifier: 1
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: NpcFactionMember
    factions:
    - Passive