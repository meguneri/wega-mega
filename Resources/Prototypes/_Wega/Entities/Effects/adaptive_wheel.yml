# Колесо адаптации (в духе Махораги): постоянно висит над головой носителя адаптивной брони
# и следует за ним. Само колесо (ступица + спицы-наконечники + 8 колец) стоит неподвижно и
# прокручивается целиком на один оборот в момент адаптации; сервер задаёт цвет свечения по типу
# урона и зажигает кольца по мере адаптации. Спавнится из AdaptiveArmorSystem при надевании брони
# и удаляется при снятии.
- type: entity
  id: EffectMahoragaWheel
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    drawdepth: Effects
    noRot: true
    # Приподнято над головой носителя.
    scale: 0.8,0.8
    offset: 0,0.95
    sprite: _Wega/Effects/mahoraga_wheel.rsi
    layers:
    # Восемь секторов свечения по 45° (glow_sec0..7). Каждый сектор тинтуется клиентом
    # независимо по адаптированному типу урона: при одном типе все секторы одного цвета,
    # при двух — по 4 сектора на тип, и т.д. Скрыты пока нет активных адаптаций.
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Sector0"]
      state: glow_sec0
      visible: false
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Sector1"]
      state: glow_sec1
      visible: false
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Sector2"]
      state: glow_sec2
      visible: false
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Sector3"]
      state: glow_sec3
      visible: false
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Sector4"]
      state: glow_sec4
      visible: false
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Sector5"]
      state: glow_sec5
      visible: false
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Sector6"]
      state: glow_sec6
      visible: false
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Sector7"]
      state: glow_sec7
      visible: false
    # Спицы с 8 кольцами (доворачиваются на +45° при каждой адаптации).
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Spokes"]
      state: spokes
    # Неподвижная рама (обод + ступица) поверх спиц.
    - shader: unshaded
      map: ["enum.AdaptiveWheelLayers.Frame"]
      state: frame
  - type: Appearance
  - type: AdaptiveWheel
  - type: Tag
    tags:
    - HideContextMenu

# Одноразовая расходящаяся ударная волна — выбрасывается в момент поглощения удара, тинтуется по типу.
# Исходит от самого колеса над головой (тот же offset, что и у колеса), а не от торса носителя.
- type: entity
  id: EffectAdaptiveShockwave
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    drawdepth: Effects
    noRot: true
    scale: 1.3,1.3
    offset: 0,0.95
    sprite: _Wega/Effects/adaptive_shockwave.rsi
    layers:
    - shader: unshaded
      state: pulse
  - type: Appearance
  - type: AdaptiveShockwave
  - type: TimedDespawn
    lifetime: 0.55
  - type: Tag
    tags:
    - HideContextMenu
