# Визуальные эффекты приёмов катаны Рэнгоку. Спавнятся RengokuKatanaSystem:
#   * на задетых целях (вспышка пламени),
#   * веером перед носителем (взмах Первой формы),
#   * кольцом и следом вдоль рывка (Девятая форма).
# Каждый эффект собран из ванильных огненных слоёв, скомпонованных так, чтобы
# читались как «Дыхание Пламени»:
#   explosion.rsi/explosionfast — резкая огненная вспышка (0.48с)
#   fire.rsi/fire               — языки пламени (несколько слоёв со смещением)
#   sparks.rsi/sparks           — разлетающиеся искры-угли (перекрашены в тёплый)
# Все слои unshaded — светятся сами и не темнеют от освещения карты.
# lifetime подобран так, чтобы вспышка не зацикливалась.

# Лёгкий язык пламени — веер Первой формы и кольцо Девятой.
- type: entity
  id: EffectRengokuFlame
  name: flame
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - sprite: Effects/fire.rsi
      state: fire
      shader: unshaded
      scale: 1.2, 1.2
      color: "#FFB454"
    - sprite: Effects/sparks.rsi
      state: sparks
      shader: unshaded
      scale: 0.9, 0.9
      color: "#FFD27A"
  - type: PointLight
    radius: 3
    energy: 4
    color: "#FF7A00"
    netsync: false
  - type: TimedDespawn
    lifetime: 0.4
  - type: Tag
    tags:
    - HideContextMenu

# Огненный след, остающийся за носителем во время рывка Девятой формы.
- type: entity
  id: EffectRengokuTrail
  name: flame trail
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - sprite: Effects/fire.rsi
      state: fire
      shader: unshaded
      scale: 0.95, 0.95
      color: "#FF9A3C"
  - type: PointLight
    radius: 2.5
    energy: 3
    color: "#FF6A00"
    netsync: false
  - type: TimedDespawn
    lifetime: 0.45
  - type: Tag
    tags:
    - HideContextMenu

# Вспышка пламени НА задетой Первой формой цели.
- type: entity
  id: EffectRengokuFirstForm
  name: flame arc
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - sprite: Effects/explosion.rsi
      state: explosionfast
      shader: unshaded
      scale: 1.0, 1.0
      color: "#FFB454"
    - sprite: Effects/fire.rsi
      state: fire
      shader: unshaded
      scale: 1.4, 1.4
      color: "#FFC85A"
    - sprite: Effects/fire.rsi
      state: fire
      shader: unshaded
      scale: 1.1, 1.1
      offset: 0.15, 0.2
      color: "#FF8A2E"
    - sprite: Effects/sparks.rsi
      state: sparks
      shader: unshaded
      scale: 1.2, 1.2
      color: "#FFD27A"
  - type: PointLight
    radius: 4.5
    energy: 6
    color: "#FF7A00"
    netsync: false
  - type: TimedDespawn
    lifetime: 0.5
  - type: Tag
    tags:
    - HideContextMenu

# Центральная вспышка Девятой формы — в точке приземления рывка.
- type: entity
  id: EffectRengokuNinthForm
  name: rengoku
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - sprite: Effects/explosion.rsi
      state: explosionfast
      shader: unshaded
      scale: 3.0, 3.0
      color: "#FF7A2E"
    - sprite: Effects/explosion.rsi
      state: explosionfast
      shader: unshaded
      scale: 1.8, 1.8
      color: "#FFD15A"
    - sprite: Effects/fire.rsi
      state: fire
      shader: unshaded
      scale: 3.2, 3.2
      color: "#FF9030"
    - sprite: Effects/sparks.rsi
      state: sparks
      shader: unshaded
      scale: 2.6, 2.6
      color: "#FFD27A"
  - type: PointLight
    radius: 13
    energy: 15
    color: "#FF4500"
    netsync: false
  - type: TimedDespawn
    lifetime: 0.6
  - type: Tag
    tags:
    - HideContextMenu

# Эффект на КАЖДОЙ задетой Девятой формой цели — она вспыхивает.
- type: entity
  id: EffectRengokuNinthHit
  name: flame burst
  categories: [ HideSpawnMenu ]
  save: false
  components:
  - type: Transform
    noRot: true
  - type: Sprite
    drawdepth: Effects
    noRot: true
    layers:
    - sprite: Effects/explosion.rsi
      state: explosionfast
      shader: unshaded
      scale: 1.4, 1.4
      color: "#FF8838"
    - sprite: Effects/fire.rsi
      state: fire
      shader: unshaded
      scale: 1.8, 1.8
      color: "#FFB050"
    - sprite: Effects/sparks.rsi
      state: sparks
      shader: unshaded
      scale: 1.5, 1.5
      color: "#FFD27A"
  - type: PointLight
    radius: 5
    energy: 6
    color: "#FF7A00"
    netsync: false
  - type: TimedDespawn
    lifetime: 0.55
  - type: Tag
    tags:
    - HideContextMenu
