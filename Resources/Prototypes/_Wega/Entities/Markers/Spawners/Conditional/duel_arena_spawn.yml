# DuelArenaSpawnMarker — невидимая точка появления бойца на арене.
# Ставится при маппинге, по 2+ штуки на каждую арену-карту (например, по противоположным углам).
# Контроллер арена-ротации (DuelRotation) после загрузки арены собирает все такие маркеры на её
# гриде и в начале раунда телепортирует на них дуэлянтов.
#
# На одиночную арену (без контроллера ротации) не влияет — там бойцы не телепортируются, маркеры
# просто игнорируются. Безопасно оставлять на карте в любом случае.

- type: entity
  id: DuelArenaSpawnMarker
  parent: MarkerBase
  name: Duel Arena Spawn
  suffix: Duel Rotation
  description: Невидимая точка появления бойца на арене. Контроллер ротации телепортирует сюда дуэлянтов.
  components:
  - type: Sprite
    layers:
      - state: green
  - type: DuelArenaSpawn
