# DuelArenaEntryMarker — кнопка входа на арену с хаба ротации.
# Ставится на хаб-карту (где стоит DuelRotationController). При НАЖАТИИ игроком собирает ВСЕХ
# мобов на гриде хаба (игроков И NPC) и переносит их на спавн-маркеры арены с заданным ArenaIndex.
# Бой при этом НЕ стартует — раунд запускается отдельно кнопкой старта на самой арене.
# Дальше (после первого боя) ротация идёт автоматически.
#
# Это настоящая нажимаемая кнопка (на базе SignalButton) — линковать ничего не нужно, просто кликни.
# ArenaIndex — индекс арены в списке arenas контроллера (0 = первая, 1 = вторая, ...).

- type: entity
  parent: SignalButton
  id: DuelArenaEntryMarker0
  name: arena entry button
  suffix: Duel Rotation, Arena 0
  description: Кнопка входа на первую арену. Телепортирует игроков с хаба и стартует раунд.
  components:
  - type: DuelArenaEntry
    arenaIndex: 0

- type: entity
  parent: SignalButton
  id: DuelArenaEntryMarker1
  name: arena entry button
  suffix: Duel Rotation, Arena 1
  description: Кнопка входа на вторую арену. Телепортирует игроков с хаба и стартует раунд.
  components:
  - type: DuelArenaEntry
    arenaIndex: 1

# ── Персональные кнопки выбора спавна ─────────────────────────────────────────
# В отличие от кнопок выше, эти переносят ТОЛЬКО нажавшего — на спавн-маркер арены с тем же
# номером (spawnIndex). На хабе ставят по кнопке на каждое место спавна: каждый боец сам жмёт
# «свою» и встаёт в нужный угол. arenaIndex — на какую арену (0 = первая); spawnIndex должен
# совпадать с DuelArenaSpawn.spawnIndex нужного маркера на карте арены.

- type: entity
  parent: SignalButton
  id: DuelArenaEntrySpawn0
  name: arena spawn button (1)
  suffix: Duel Rotation, Arena 0, Spawn 0
  description: Кнопка входа на первую арену, спавн №1. Переносит только нажавшего на эту точку.
  components:
  - type: DuelArenaEntry
    arenaIndex: 0
    spawnIndex: 0

- type: entity
  parent: SignalButton
  id: DuelArenaEntrySpawn1
  name: arena spawn button (2)
  suffix: Duel Rotation, Arena 0, Spawn 1
  description: Кнопка входа на первую арену, спавн №2. Переносит только нажавшего на эту точку.
  components:
  - type: DuelArenaEntry
    arenaIndex: 0
    spawnIndex: 1
