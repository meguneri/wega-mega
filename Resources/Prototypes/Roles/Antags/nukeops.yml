    nameSegments:
    - NamesSyndicateNormal
    nameFormat: name-format-nukie-operator
  mindRoles:
  - MindRoleNukeops

- type: antagSpecifier
  parent: BaseNukeops
  id: LoneOp
  spawnerPrototype: SpawnPointLoneNukeOperative
