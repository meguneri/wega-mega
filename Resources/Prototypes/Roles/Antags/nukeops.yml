- type: antagSpecifier
  abstract: true
  parent: RestrictedAntag
  id: BaseNukeops
  prefRoles:
  - GenericTeamAntagonist # For antag ban purposes
  roleLoadout:
  - RoleSurvivalNukie
  components:
  - type: NukeOperative
  - type: SurgicalSkill # Corvax-Wega-Surgery
  - type: NpcFactionMember
    factions:
    - Syndicate

- type: antagSpecifier
  parent: BaseNukeops
  id: NukeopsCommander
  prefRoles:
  - NukeopsCommander
  spawnerPrototype: SpawnPointNukeopsCommander
  startingGear: SyndicateCommanderGearFull
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesSyndicateElite
    nameFormat: name-format-nukie-commander
  mindRoles:
  - MindRoleNukeopsCommander

- type: antagSpecifier
  parent: BaseNukeops
  id: NukeopsMedic
  prefRoles:
  - NukeopsMedic
  spawnerPrototype: SpawnPointNukeopsMedic
  startingGear: SyndicateOperativeMedicFull
  components:
  - type: RandomMetadata
    nameSegments:
    - NamesSyndicateNormal
    nameFormat: name-format-nukie-agent
  - type: SurgicalSkill # Corvax-Wega-Surgery
    modifier: 0.4 # Corvax-Wega-Surgery
  mindRoles:
  - MindRoleNukeopsMedic

- type: antagSpecifier
  parent: BaseNukeops
  id: NukeopsOperative
  prefRoles:
  - Nukeops
  spawnerPrototype: SpawnPointNukeopsOperative
  startingGear: SyndicateOperativeGearFull
  components:
