- type: entity
  parent: BaseItem
  id: BaseAnomalyCore
  abstract: true
  name: anomaly core
  description: The core of a destroyed incomprehensible object.
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/gravity_core.rsi
    noRot: true
    layers:
    - state: core
    - state: pulse
      # map: ["decay"] Corvax-Wega-Change
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AnomalyCoreVisuals.Decaying:
        decay:
          True: { visible: true }
          False: { visible: false }
  - type: Item
    size: Tiny
## Corvax-Wega-Anomaly-start
  - type: TriggerOnUse
  - type: EmitSoundOnTrigger
    sound:
      collection: RadiationPulse
## Corvax-Wega-Anomaly-end
  - type: UseDelay
    delay: 2
  - type: Tag
    tags:
    - ForceableFollow
    - AnomalyCore # Corvax-Wega-add
  - type: AnomalyCore
    timeToDecay: 600
    startPrice: 10000
    endPrice: 200

## Corvax-Wega-Anomaly-start
- type: entity
  parent: BaseAnomalyCore
  id: AnomalyCorePyroclastic
  suffix: Pyroclastic
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/pyro_core.rsi
  - type: PointLight
    radius: 1.5
    energy: 2.7
    color: "#E25822"
    castShadows: false
  - type: IgnitionSource
    temperature: 700
    ignited: true
  - type: Gun
    fireRate: 0.75
    soundGunshot:
      path: /Audio/Magic/fireball.ogg
    projectileSpeed: 25
  - type: BasicEntityAmmoProvider
    proto: ProjectileAnomalyFireballMax
    capacity: 3
    count: 3
  - type: AmmoCounter
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 30

- type: entity
  parent: BaseAnomalyCore
  id: AnomalyCoreGravity
  suffix: Gravity
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/gravity_core.rsi
  - type: PointLight
    radius: 1.5
    energy: 10
    color: "#1e070e"
    castShadows: false
  - type: MeleeThrowOnHit
  - type: MeleeWeapon
    attackRate: 0.5
    angle: 0
    animation: WeaponArcFist
    wideAnimationRotation: -135
    damage:
      types:
        Blunt: 0
    soundHit:
      path: "/Audio/Effects/radpulse8.ogg"
  # Corvax-Wega-Add-start
  - type: Tag
    tags:
    - ForceableFollow
    - AnomalyCore
    - GravityCore
  # Corvax-Wega-Add-end

- type: entity
  parent: BaseAnomalyCore
  id: AnomalyCoreIce
  suffix: Ice
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/ice_core.rsi
  - type: PointLight
    radius: 1.5
    energy: 2.7
    color: "#befaff"
    castShadows: false
  - type: Gun
    fireRate: 0.75
    soundGunshot:
      path: /Audio/Magic/fireball.ogg
    projectileSpeed: 25
  - type: BasicEntityAmmoProvider
    proto: ProjectileIcicle
    capacity: 3
    count: 3
  - type: AmmoCounter
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 30

- type: entity
  parent: BaseAnomalyCore
  id: AnomalyCoreFlesh
  description: The core of a destroyed flesh anomaly. Pulsates sickeningly, but might be a hearty meal if cooked.
  suffix: Flesh
  components:
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/flesh_core.rsi
  - type: PointLight
    radius: 1.5
    energy: 3.5
    color: "#cb5b7e"
    castShadows: false
  - type: Healing
    damageContainers:
    - Biological
    damage:
      types: # these are all split across multiple types
        Blunt: -200
        Piercing: -200
        Slash: -200
        Heat: -200
        Cold: -200
        Shock: -200
        Poison: -150
        Radiation: -200
    bloodlossModifier: -20
    delay: 1
    selfHealPenaltyMultiplier: 0
    healingBeginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    healingEndSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125

- type: entity
  parent: BaseAnomalyCore
  id: AnomalyCoreRock
  suffix: Rock
  components:
  - type: ItemToggle
  - type: MiningScanner
    range: 10
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/rock_core.rsi
  - type: PointLight
    radius: 1.5
    energy: 3.5
    color: "#5ca8cb"
    castShadows: false
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Ambience/Objects/light_hum.ogg
      params:
        volume: -10
        maxDistance: 1

- type: entity
  parent: BaseAnomalyCore
  id: AnomalyCoreLiquid
  suffix: Liquid
  components:
  - type: Injector
    solutionName: hypospray
    ignoreClosed: false
    activeModeProtoId: HyposprayDynamicMode
    allowedModes:
    - HyposprayDynamicMode
    - HyposprayInjectMode
  - type: Spillable
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    exactVolume: true
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 10
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.AnomalyCoreVisuals.Decaying:
        decay:
          True: { visible: true }
          False: { visible: false }
  - type: Item
    size: Tiny
  - type: EmitSoundOnUse #placeholder for future unical mechanic
    sound:
      collection: RadiationPulse
  - type: UseDelay
    delay: 2
  - type: Tag
    tags:
    - ForceableFollow
    - AnomalyCore # Corvax-Wega-add
  - type: AnomalyCore
    timeToDecay: 600
    startPrice: 10000
    endPrice: 200
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/liquid_core.rsi
    noRot: true
    layers:
    - state: core
    - state: pulse
      map: ["decay"]
  - type: PointLight
    radius: 1.5
    energy: 3.5
    color: "#ffffff"
    castShadows: false

- type: entity
  parent: BaseAnomalyCore
  id: AnomalyCoreBluespace
  suffix: Bluespace
  components:
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: Item
    size: Ginormous
    shape:
    - 0,0,0,0
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,19,9
    storageOpenSound: /Audio/Effects/radpulse8.ogg
    storageCloseSound: /Audio/Effects/radpulse5.ogg
    storageInsertSound: /Audio/Effects/radpulse12.ogg
    storageRemoveSound: /Audio/Effects/radpulse1.ogg
  - type: Sprite
    sprite: Structures/Specific/Anomalies/Cores/bluespace_core.rsi
  - type: PointLight
    radius: 1.5
    energy: 3.5
    color: "#00ccff"
    castShadows: false
  # Corvax-Wega-Add-start
  - type: Tag
    tags:
    - ForceableFollow
    - AnomalyCore
    - BluespaceCore
  # Corvax-Wega-Add-end

- type: entity
