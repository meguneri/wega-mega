- type: entity
  abstract: true
  parent: [SolutionFood, SolutionToolSmall, Clothing]
  id: ClothingHandsBase
  components:
  - type: Sprite
    state: icon
  - type: Clothing
    slots: [gloves]
  - type: DiseaseProtection # Corvax-Wega-Disease
    protection: 0.05 # Corvax-Wega-Disease
  - type: Edible
    requiresSpecialDigestion: true
  - type: Item
    size: Small
    storedRotation: -90
  - type: Solution
    solution:
      reagents:
      - ReagentId: Fiber
        Quantity: 15
  - type: Tag
    tags:
    - ClothMade
    - WhitelistChameleon
  - type: DamageOnInteractProtection
    damageProtection:
      flatReductions:
        Heat: 5 # the average lightbulb only does around four damage!
  # Corvax-Wega-Dirtable-start
  - type: Dirtable
    dirtState: gloves
    equippedDirtState: equipped-gloves
  # Corvax-Wega-Dirtable-end

- type: entity
  abstract: true
  parent: ClothingHandsBase
  id: ClothingHandsButcherable
  components:
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 1
  - type: PhysicalComposition # 50% of the amount of cloth you'd obtain upon butchering
    materialComposition:
      Cloth: 50
  - type: Tag
    tags:
    - ClothMade
    - Recyclable
    - WhitelistChameleon

# gloves that cover the fingertips and have synthetic fibers
- type: entity
  abstract: true
  parent: ClothingHandsButcherable
  id: ClothingHandsGlovesSyntheticBase
  components:
  - type: Fiber
    fiberMaterial: fibers-synthetic
  - type: FingerprintMask
    # Corvax-Wega-Edit-Start
  - type: Tag
    tags:
    - Gloves
    # Corvax-Wega-Edit-End

- type: entity
  abstract: true
  parent: BaseItem
  id: RingBase
  components:
  - type: Clothing
    slots: [ gloves, neck ]
  - type: Sprite
    sprite: Clothing/Hands/Rings/basic.rsi
  - type: Appearance
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Ring

- type: entity
  abstract: true
  id: GoldRingBase
  components:
  - type: StaticPrice
    price: 300

- type: entity
  abstract: true
  id: SilverRingBase
  name: silver ring
  description: Looks slightly less valuable than a gold one.
  components:
  - type: StaticPrice
    price: 275
