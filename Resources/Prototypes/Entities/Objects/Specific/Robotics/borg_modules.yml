# generic modules
- type: entity
  id: BorgModulePrying
  parent: [ BaseBorgModule ]
  name: prying module
  description: A universal cyborg module which allows the unit to pry open doors.
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-tools
  - type: ComponentBorgModule
    components:
    - type: Prying
      speedModifier: 1.5
      useSound:
        path: /Audio/Items/jaws_pry.ogg

- type: entity
  id: BorgModuleCable
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: cable cyborg module
  description: A universal cyborg module which allows the unit to install and manipulate electrical systems.
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-cables
  - type: ItemBorgModule
    hands:
    - item: CableApcStack10
      hand:
        emptyRepresentative: CabelIcon # Corvax-Wega-Robot
        emptyLabel: borg-slot-cables-empty
        whitelist:
          tags:
          - CableCoil
    - item: CableMVStack10
      hand:
        emptyRepresentative: CabelIcon # Corvax-Wega-Robot
        emptyLabel: borg-slot-cables-empty
        whitelist:
          tags:
          - CableCoil
    - item: CableHVStack10
      hand:
        emptyRepresentative: CabelIcon # Corvax-Wega-Robot
        emptyLabel: borg-slot-cables-empty
        whitelist:
          tags:
          - CableCoil
    - item: Wirecutter
    - item: Crowbar
    - item: trayScanner
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: wire-module }

- type: entity
  id: BorgModuleArtistry
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: artistry cyborg module
  description: A module for arts & crafts whilst the station burns!
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-artistry
  - type: ItemBorgModule
    hands:
    - item: SprayPainterBorg
    - item: CrayonBorg
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: artistry-module }

- type: entity
  id: BorgModuleFireExtinguisher
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: thruster cyborg module
  description: NT assigned a team to design a jetpack for cyborg units, but they ran out of funding and just made a bigger fire extinguisher. It comes with a integrated GPS and mass scanner though!
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-fire-extinguisher
  - type: ItemBorgModule
    hands:
    - item: BorgFireExtinguisher
    - item: BorgHandheldGPSBasic
    - item: HandheldStationMapUnpowered
    - item: HandHeldMassScannerBorg
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: extinguisher-module }

- type: entity
  id: BorgModuleTool
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: tool cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-tools
  - type: ItemBorgModule
    hands:
    - item: Crowbar
    - item: Wrench
    - item: Screwdriver
    - item: Wirecutter
    - item: WelderIndustrial
    - item: Multitool
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: tool-module }

- type: entity
  id: BorgModuleInflatable
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: inflatable cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-inflatable
  - type: ItemBorgModule
    hands:
    - item: InflatableDoorStack
      hand:
        emptyRepresentative: InflatableDoorStack
        emptyLabel: borg-slot-inflatable-door-empty
        whitelist:
          tags:
          - Inflatable
    - item: InflatableWallStack
      hand:
        emptyRepresentative: InflatableWallStack
        emptyLabel: borg-slot-inflatable-wall-empty
        whitelist:
          tags:
          - Inflatable
# Corvax-Wega-Robot-Start
    - item: BorgGeneratorInflatableWall
# Corvax-Wega-Robot-End
