- proto: Paper
  entities:
  - uid: 540
    mapInit: true
    paused: true
    components:
    - type: Transform
      pos: 38.196617,38.482136
      parent: 2
    - type: Paper
      content: >-
        тож, вот и пришло время этого блокнота. С этого момента это будет мой дневник.

        Начал я свой день как обычно, с утренней пробежки. Я конечно не спортсмен, но за телосложением слежу.

        В общем, мой сегодняшний маршрут ничем не отличался от прошлых, оббежать торговый центр несколько раз.

        Ох уж этот поток мыслей, никогда не вёл дневник, но видимо придётся.

        Так, не отвлекаюсь. В этот торговый центр я успел забежать и прикупить пару ручек дочери в школу, и как раз этот блокнот, всё же удачно забежал. Я перецепился черещ то ли ветку, то ли камень, это уже не важно. Упав, я понял что упал не на землю, а на мягкий влажный, жёлтый ковёр. С возникшим вопросом “Что чёрт возьми произошло?” я открыл глаза и впал в состояние шока. Я не видел ни шелестящих зелёных листьев дерева, ни голубого неба с ярким, августовским солнцем, ни грунтовой тропинки, по которой я как раз бежал. Я видел лишь коридоры. Коридоры облепленные жёлтыми обоями. Я конечно и сейчас их вижу, но за те пару часов что я пробыл здесь, я уже к ним привык.

        В этом месте заниматься нечем, абсолютно нечем. Сплошное одиночество, рядом ни души. Только я и мои мысли, больше никого, и ничьих мыслей, только мои. Кроме того чтобы думать, о себе, о будущем, тут можно только походить, прогуляться по этому месту, в поисках выхода. Надеюсь я его найду, ведь если я сюда попал, то я же смогу выбраться?

        Так, продолжу описывать мои впечатления первые. Я по началу подумал что это какой-то подвал, или сеть подземных туннелей, но, я не увидел ничего над собой куда я бы мог упасть. А во-вторых, мне было бы больно падать с высоты, так что это не подвал. Но я так и не узнал что это за место. Я не верю во всякую чужь по типу альтернативных миров, но это заставляет задуматься. Скорее всего всё что я пишу тут, и моё пребывание в этом месте это сон, и я просто сильно ударился когда падал.

        Как бы там ни было, есть ещё одно занятие как можно убить скуку. Как раз таки ведение этого блокнота. Само это место скучное, и меня уже начинает бесить этот постоянный шум потолочных ламп. Он так даёт в голову, не могу.

        Меня клонит уже в сон, я не знаю сколько сейчас времени, ни телефона, ни часов с собой не брал, но спать охота. Надеюсь вскоре увижу свою любимую дочу. Спокойной ночи, моя звёздочка.
    - type: Flammable
